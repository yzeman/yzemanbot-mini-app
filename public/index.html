<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YzemanBot - Earn COINS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* --- Your Existing Styles (Keep as they are) --- */
        :root {
            --primary: #4CAF50; --secondary: #2196F3; --warning: #FF9800; --danger: #f44336;
            --dark: #1a1a2e; --darker: #16213e; --light: #ffffff; --gray: #888888;
            --success: #00c853; --gold: #FFD700;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--dark); color: var(--light); min-height: 100vh; padding-bottom: 80px;
        }
        /* ... (keep all your existing CSS styles from your current working index.html) ... */
        /* Make sure you have styles for .task-card, .modal, .timer-popup, etc. */
        
        /* --- NEW STYLES FOR TASK WORKFLOW --- */
        .task-card.waiting {
            opacity: 0.7;
            cursor: wait;
            position: relative;
        }
        .task-card.waiting::after {
            content: "⏳";
            position: absolute;
            top: 5px;
            right: 5px;
            font-size: 16px;
        }
        .claim-reward-btn {
            background: var(--gold);
            color: var(--dark);
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
            width: 100%;
            transition: transform 0.2s;
        }
        .claim-reward-btn:hover {
            transform: scale(1.02);
        }
        .timer-popup {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: var(--darker);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            z-index: 2000;
            border: 1px solid var(--gold);
            animation: slideUp 0.3s ease;
            display: none;
        }
        .timer-popup.active {
            display: block;
        }
        .timer-popup .time-left {
            font-size: 36px;
            font-weight: bold;
            color: var(--gold);
            margin: 10px 0;
        }
        .timer-popup button {
            background: var(--primary);
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            color: white;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Your existing HTML structure (header, balance card, feature grid, tabs) -->
    <div class="header"><!-- ... --></div>
    <div class="feature-grid"><!-- ... --></div>
    <div class="tabs"><!-- ... --></div>

    <!-- Earn Tab Content -->
    <div class="tab-content active" id="earnTab">
        <!-- ... Ad streak section, Watch Ad card ... -->
        
        <div class="section-title"><i class="fas fa-tasks"></i><span>Quick Tasks</span></div>
        <div class="task-grid" id="quickTasksGrid">
            <!-- Game Task -->
            <div class="task-card game" data-task="game" data-points="50000000" data-url="https://www.wikigame.top/register?ref=WGMNKOP32XDYR" data-time="60">
                <i class="fas fa-gamepad"></i>
                <div class="task-name">Play & Earn</div>
                <div class="task-reward">+50 COINS</div>
                <div class="task-status"></div>
            </div>
            <!-- Website Task -->
            <div class="task-card website" data-task="website" data-points="5000000" data-url="https://yzeupdates.lat/articles" data-time="120">
                <i class="fas fa-globe"></i>
                <div class="task-name">Visit Website</div>
                <div class="task-reward">+5 COINS</div>
                <div class="task-status"></div>
            </div>
        </div>

        <div class="section-title"><i class="fas fa-share-alt"></i><span>Follow & Earn</span></div>
        <div class="task-grid" id="socialTasksGrid">
            <!-- Social Tasks -->
            <div class="task-card youtube" data-task="youtube" data-points="10000000" data-url="https://youtube.com/@yzemanbot?si=VuHuAADByaIuxL7p" data-time="30">
                <i class="fab fa-youtube"></i>
                <div class="task-name">Subscribe on YouTube</div>
                <div class="task-reward">+10 COINS</div>
                <div class="task-status"></div>
            </div>
            <div class="task-card twitter" data-task="twitter" data-points="10000000" data-url="https://x.com/yzemanbot?s=21" data-time="30">
                <i class="fab fa-twitter"></i>
                <div class="task-name">Follow on X</div>
                <div class="task-reward">+10 COINS</div>
                <div class="task-status"></div>
            </div>
            <div class="task-card facebook" data-task="facebook" data-points="10000000" data-url="https://www.facebook.com/share/16zQ1s6iLj/?mibextid=wwXIfr" data-time="30">
                <i class="fab fa-facebook"></i>
                <div class="task-name">Like on Facebook</div>
                <div class="task-reward">+10 COINS</div>
                <div class="task-status"></div>
            </div>
            <div class="task-card instagram" data-task="instagram" data-points="10000000" data-url="https://www.instagram.com/yzemanbot?igsh=ajZqZzN3Nzhocmc2&utm_source=qr" data-time="30">
                <i class="fab fa-instagram"></i>
                <div class="task-name">Follow on Instagram</div>
                <div class="task-reward">+10 COINS</div>
                <div class="task-status"></div>
            </div>
            <div class="task-card tiktok" data-task="tiktok" data-points="10000000" data-url="https://www.tiktok.com/@yzeman.bot?_r=1&_t=ZS-95Z0ezLaxAW" data-time="30">
                <i class="fab fa-tiktok"></i>
                <div class="task-name">Follow on TikTok</div>
                <div class="task-reward">+10 COINS</div>
                <div class="task-status"></div>
            </div>
            <div class="task-card telegram" data-task="telegram" data-points="10000000" data-url="https://t.me/YzemanEarnBotChannel" data-time="30">
                <i class="fab fa-telegram"></i>
                <div class="task-name">Join Telegram</div>
                <div class="task-reward">+10 COINS</div>
                <div class="task-status"></div>
            </div>
        </div>
    </div>

    <!-- Other Tabs (Refer, Wallet, Bonus) - Keep your existing HTML for these -->
    <div class="tab-content" id="referTab"><!-- ... --></div>
    <div class="tab-content" id="walletTab"><!-- ... --></div>
    <div class="tab-content" id="bonusTab"><!-- ... --></div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav"><!-- ... --></div>

    <!-- Confirmation Modal -->
    <div class="modal" id="confirmationModal">
        <div class="modal-content">
            <div class="modal-title">💰 Earn COINS!</div>
            <div class="modal-message" id="modalMessage"></div>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-yes" id="modalYesBtn">Yes, I'm ready</button>
                <button class="modal-btn modal-btn-no" id="modalNoBtn">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Timer Popup (Shows while task is in progress) -->
    <div class="timer-popup" id="timerPopup">
        <i class="fas fa-hourglass-half"></i>
        <div>Please complete the action in the new tab...</div>
        <div class="time-left" id="timerTimeLeft">00:00</div>
        <button id="cancelTaskBtn">Cancel Task</button>
    </div>

    <div class="notification" id="notification"></div>

    <script src="https://cdn.jsdelivr.net/npm/@adsgram/telegram-sdk@latest/dist/adsgram.umd.js"></script>
    <script src="/app.js"></script>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.expand(); tg.ready(); }

        // --- Helper Functions ---
        function showNotification(msg, isError = false) {
            const notif = document.getElementById('notification');
            if (notif) {
                notif.textContent = msg;
                notif.style.background = isError ? '#ff5252' : '#00c853';
                notif.style.display = 'block';
                setTimeout(() => notif.style.display = 'none', 4000);
            }
        }

        async function callApi(endpoint, data) {
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ...data, initData: tg.initData })
                });
                return await response.json();
            } catch (err) {
                console.error(`API Error (${endpoint}):`, err);
                return null;
            }
        }

        // --- Task Completion Logic (Backend-Verified) ---
        let activeTask = null;
        let taskWindow = null;
        let timerInterval = null;
        let taskStartTime = null;
        let taskRequiredTime = 0;

        async function checkIfTaskCompleted(taskName) {
            const result = await callApi('/api/check-task', { taskName });
            return result?.completed || false;
        }

        async function completeTaskOnServer(taskName, points) {
            const result = await callApi('/api/complete-task', { taskName, points, proof: 'user_completed' });
            if (result?.success) {
                showNotification(result.message);
                if (activeTask) {
                    const taskCard = document.querySelector(`.task-card[data-task="${activeTask}"]`);
                    if (taskCard) {
                        taskCard.classList.add('completed');
                        taskCard.style.opacity = '0.6';
                        taskCard.style.cursor = 'default';
                        const statusDiv = taskCard.querySelector('.task-status');
                        if (statusDiv) statusDiv.innerHTML = '<span class="completed-badge">✓ Done</span>';
                    }
                }
                return true;
            } else {
                showNotification(result?.error || 'Failed to claim reward. Try again?', true);
                return false;
            }
        }

        function startTaskTimer(taskName, requiredSeconds, url, points) {
            if (timerInterval) clearInterval(timerInterval);
            activeTask = taskName;
            taskRequiredTime = requiredSeconds;
            taskStartTime = Date.now();

            // Open the link in a new tab
            taskWindow = window.open(url, '_blank');

            const timerPopup = document.getElementById('timerPopup');
            const timerTimeLeft = document.getElementById('timerTimeLeft');
            timerPopup.classList.add('active');

            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - taskStartTime) / 1000);
                const remaining = Math.max(0, taskRequiredTime - elapsed);
                const minutes = Math.floor(remaining / 60);
                const seconds = remaining % 60;
                timerTimeLeft.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

                if (remaining <= 0) {
                    // Time's up! Stop timer and give reward.
                    clearInterval(timerInterval);
                    timerInterval = null;
                    timerPopup.classList.remove('active');
                    if (taskWindow && !taskWindow.closed) taskWindow.close();
                    showNotification(`Time's up! You earned ${(points / 1000000).toFixed(1)} COINS!`);
                    completeTaskOnServer(taskName, points);
                    activeTask = null;
                    taskWindow = null;
                }
            }, 1000);
        }

        function cancelCurrentTask() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            if (taskWindow && !taskWindow.closed) taskWindow.close();
            document.getElementById('timerPopup').classList.remove('active');
            showNotification('Task cancelled. No reward given.', true);
            activeTask = null;
            taskWindow = null;
        }

        // --- Task Button Handler ---
        async function handleTaskClick(taskCard) {
            if (activeTask) {
                showNotification('Please complete your current task first!', true);
                return;
            }

            const taskName = taskCard.dataset.task;
            const points = parseInt(taskCard.dataset.points);
            const url = taskCard.dataset.url;
            const requiredTime = parseInt(taskCard.dataset.time); // in seconds

            // Check if already completed
            const isCompleted = await checkIfTaskCompleted(taskName);
            if (isCompleted) {
                showNotification('You have already completed this task!', true);
                return;
            }

            // Show confirmation modal
            const modal = document.getElementById('confirmationModal');
            const modalMessage = document.getElementById('modalMessage');
            modalMessage.innerHTML = `You are about to earn ${(points / 1000000).toFixed(1)} COINS!<br><br>A new tab will open. Please stay on that page for ${Math.floor(requiredTime / 60)} minute${requiredTime > 60 ? 's' : ''} to claim your reward.`;
            modal.style.display = 'flex';

            // Store task info for the "Yes" button
            window.pendingTask = { taskName, points, url, requiredTime, taskCard };
        }

        // --- Initialize Task Buttons and Check Completion Status ---
        async function initTasks() {
            const allTaskCards = document.querySelectorAll('.task-card[data-task]');
            for (const card of allTaskCards) {
                const taskName = card.dataset.task;
                const isCompleted = await checkIfTaskCompleted(taskName);
                if (isCompleted) {
                    card.classList.add('completed');
                    card.style.opacity = '0.6';
                    card.style.cursor = 'default';
                    const statusDiv = card.querySelector('.task-status');
                    if (statusDiv) statusDiv.innerHTML = '<span class="completed-badge">✓ Done</span>';
                }
                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (!card.classList.contains('completed')) {
                        handleTaskClick(card);
                    } else {
                        showNotification('Task already completed!', true);
                    }
                });
            }
        }

        // --- Modal Event Listeners ---
        document.getElementById('modalYesBtn').onclick = () => {
            document.getElementById('confirmationModal').style.display = 'none';
            if (window.pendingTask) {
                const { taskName, points, url, requiredTime, taskCard } = window.pendingTask;
                startTaskTimer(taskName, requiredTime, url, points);
                window.pendingTask = null;
            }
        };
        document.getElementById('modalNoBtn').onclick = () => {
            document.getElementById('confirmationModal').style.display = 'none';
            window.pendingTask = null;
        };
        document.getElementById('cancelTaskBtn').onclick = cancelCurrentTask;

        // Close modal if clicking outside
        window.onclick = (e) => {
            const modal = document.getElementById('confirmationModal');
            if (e.target === modal) {
                modal.style.display = 'none';
                window.pendingTask = null;
            }
        };

        // --- Tab Switching (Keep your existing tab logic) ---
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const tabName = tab.dataset.tab;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tabName + 'Tab').classList.add('active');
            });
        });

        // --- Initial Load ---
        document.addEventListener('DOMContentLoaded', () => {
            // Set static display values
            document.getElementById('dailyAdGoal').textContent = '20';
            document.getElementById('dailyGoalReward').textContent = '0.5';
            document.getElementById('weeklyAdGoal').textContent = '100';
            document.getElementById('weeklyGoalReward').textContent = '5';
            const nextTierReqEl = document.getElementById('nextTierReq');
            if (nextTierReqEl) nextTierReqEl.textContent = '150';

            // Initialize the task system
            initTasks();

            console.log('✅ YzemanBot loaded with secure task system!');
        });
    </script>
</body>
</html>

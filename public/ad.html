<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Watch Ad - YzemanBot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }
        .container { text-align: center; max-width: 350px; width: 100%; }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(255,255,255,0.15);
            border-top-color: #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 25px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #statusText { color: white; font-size: 18px; font-weight: 500; margin-bottom: 10px; }
        #debug {
            color: #888; font-size: 13px; margin-top: 20px;
            padding: 10px; background: rgba(0,0,0,0.3);
            border-radius: 8px; word-break: break-word;
        }
        .close-btn {
            position: fixed; top: 10px; right: 10px; z-index: 10000;
            background: rgba(255,255,255,0.2); color: white;
            border: none; padding: 8px 15px; border-radius: 20px;
            font-size: 14px; cursor: pointer;
        }
    </style>
    <script src="https://webgl.unity3d.com/unity-ads/4.12.0/unity-ads.js"></script>
</head>
<body>
    <button class="close-btn" id="closeBtn">✕ Close</button>
    <div class="container">
        <div class="spinner"></div>
        <div id="statusText">Loading ad...</div>
        <div id="debug">Starting...</div>
    </div>

    <script>
        // UPDATED CONFIGURATION
        const CONFIG = {
            adsgramBlockId: '27449',  // ← NEW BLOCK ID
            unityGameId: '6087630',
            unityPlacementId: 'Rewarded_Video_-_Telegram'
        };
        
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('userId') || 'guest';
        const rewardAmount = parseInt(urlParams.get('reward')) || 557;
        
        let rewardGiven = false;
        
        function debug(msg) {
            console.log('[Ad]', msg);
            document.getElementById('debug').textContent = msg;
        }
        
        function updateStatus(msg) {
            document.getElementById('statusText').textContent = msg;
        }
        
        function sendToParent(data) {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage(data, '*');
            } else if (window.opener) {
                window.opener.postMessage(data, '*');
                setTimeout(() => window.close(), 800);
            }
        }
        
        function sendReward() {
            if (rewardGiven) return;
            rewardGiven = true;
            debug('✅ Sending reward: ' + rewardAmount);
            sendToParent({ event: 'reward-earned', amount: rewardAmount });
        }
        
        function sendError(msg) {
            if (rewardGiven) return;
            debug('❌ ' + msg);
            sendToParent({ event: 'ad-failed', error: msg });
        }
        
        document.getElementById('closeBtn').onclick = () => sendError('Closed by user');
        
        // Load AdsGram SDK
        function loadAdsGram() {
            return new Promise((resolve) => {
                if (typeof AdsGram !== 'undefined') { resolve(true); return; }
                debug('Loading AdsGram SDK...');
                const script = document.createElement('script');
                script.src = 'https://sdk.adsgram.ai/js/adsgram.min.js';
                script.onload = () => { debug('AdsGram loaded'); resolve(true); };
                script.onerror = () => { debug('AdsGram failed to load'); resolve(false); };
                document.head.appendChild(script);
            });
        }
        
        // Try AdsGram
        async function tryAdsGram() {
            debug('Trying AdsGram...');
            updateStatus('Loading AdsGram...');
            
            const loaded = await loadAdsGram();
            if (!loaded) return false;
            
            try {
                const adsgram = new AdsGram({ blockId: CONFIG.adsgramBlockId });
                const result = await adsgram.showRewardedVideo();
                debug('AdsGram result: ' + JSON.stringify(result));
                
                if (result && (result.completed || result.done)) {
                    return true;
                }
                return false;
            } catch (e) {
                debug('AdsGram error: ' + (e.message || e.code));
                return false;
            }
        }
        
        // Try Unity Ads
        function tryUnityAds() {
            return new Promise((resolve) => {
                debug('Trying Unity Ads...');
                updateStatus('Loading Unity Ads...');
                
                if (typeof UnityAds === 'undefined') {
                    debug('Unity not available');
                    resolve(false);
                    return;
                }
                
                let resolved = false;
                setTimeout(() => { if (!resolved) { resolved = true; resolve(false); } }, 25000);
                
                UnityAds.initialize(CONFIG.unityGameId, false);
                
                UnityAds.addListener('onUnityAdsAdLoaded', (placementId) => {
                    debug('Unity loaded: ' + placementId);
                    UnityAds.show(userId, placementId);
                });
                
                UnityAds.addListener('onUnityAdsShowComplete', (placementId, state) => {
                    if (resolved) return;
                    resolved = true;
                    if (state === 'complete') { resolve(true); } else { resolve(false); }
                });
                
                UnityAds.addListener('onUnityAdsShowFailed', () => { if (!resolved) { resolved = true; resolve(false); } });
                UnityAds.addListener('onUnityAdsFailedToLoad', () => { if (!resolved) { resolved = true; resolve(false); } });
                
                UnityAds.load(CONFIG.unityPlacementId);
            });
        }
        
        // Main flow
        (async function() {
            // Try AdsGram first
            const adsGramOk = await tryAdsGram();
            if (adsGramOk) { sendReward(); return; }
            
            // Fallback to Unity
            debug('AdsGram failed, trying Unity...');
            const unityOk = await tryUnityAds();
            if (unityOk) { sendReward(); return; }
            
            // Both failed
            sendError('No ads available');
        })();
        
        setTimeout(() => { if (!rewardGiven) sendError('Timeout'); }, 60000);
    </script>
</body>
</html>

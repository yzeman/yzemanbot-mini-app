<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Watch Ad - YzemanBot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 350px;
            width: 100%;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 25px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #statusText {
            color: white;
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 10px;
        }
        #debug {
            color: #888;
            font-size: 13px;
            margin-top: 20px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            word-break: break-word;
        }
        .error .spinner {
            border-top-color: #ff5252;
            animation: none;
        }
        .success .spinner {
            border-top-color: #4CAF50;
            animation: none;
        }
    </style>
    
    <!-- Ad SDKs -->
    <script src="https://webgl.unity3d.com/unity-ads/4.12.0/unity-ads.js"></script>
</head>
<body>
    <div class="container" id="container">
        <div class="spinner" id="spinner"></div>
        <div id="statusText">Initializing...</div>
        <div id="debug">Starting ad system...</div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION - VERIFY THESE VALUES
        // ============================================
        const CONFIG = {
            // AdsGram Block ID from your dashboard
            adsgramBlockId: '27428',
            // Unity Game ID from your dashboard
            unityGameId: '6087630',
            // Unity Placement ID - EXACT name from dashboard
            unityPlacementId: 'Rewarded_Video_-_Telegram'
        };
        
        // ============================================
        // GLOBAL VARIABLES
        // ============================================
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('userId') || 'guest';
        const rewardAmount = parseInt(urlParams.get('reward')) || 557;
        
        let tg = null;
        let rewardGiven = false;
        let adCompleted = false;
        
        // ============================================
        // UI HELPER FUNCTIONS
        // ============================================
        function updateStatus(message, type = 'info') {
            document.getElementById('statusText').textContent = message;
            const container = document.getElementById('container');
            container.classList.remove('error', 'success');
            if (type === 'error') container.classList.add('error');
            if (type === 'success') container.classList.add('success');
        }
        
        function debug(message) {
            console.log('[Ad Debug]', message);
            const debugEl = document.getElementById('debug');
            if (debugEl) {
                debugEl.textContent = message;
            }
        }
        
        // ============================================
        // REWARD FUNCTIONS
        // ============================================
        function sendReward() {
            if (rewardGiven) return;
            rewardGiven = true;
            
            debug('✅ Sending reward: ' + rewardAmount + ' points');
            updateStatus('Ad completed! +' + rewardAmount + ' points', 'success');
            
            const rewardData = JSON.stringify({ 
                event: 'reward-earned', 
                amount: rewardAmount 
            });
            
            if (tg) {
                tg.sendData(rewardData);
                setTimeout(() => tg.close(), 800);
            } else if (window.opener) {
                window.opener.postMessage(JSON.parse(rewardData), '*');
                setTimeout(() => window.close(), 800);
            } else {
                // Fallback - redirect back to main app
                debug('No opener found, redirecting...');
                setTimeout(() => {
                    window.location.href = '/';
                }, 1500);
            }
        }
        
        function sendError(errorMsg) {
            if (rewardGiven) return;
            
            debug('❌ Error: ' + errorMsg);
            updateStatus(errorMsg, 'error');
            
            const errorData = JSON.stringify({ 
                event: 'ad-failed', 
                error: errorMsg 
            });
            
            if (tg) {
                tg.sendData(errorData);
                setTimeout(() => tg.close(), 2000);
            } else if (window.opener) {
                window.opener.postMessage(JSON.parse(errorData), '*');
                setTimeout(() => window.close(), 2000);
            }
        }
        
        // ============================================
        // TELEGRAM INITIALIZATION
        // ============================================
        function initTelegram() {
            debug('Checking Telegram WebApp...');
            
            if (window.Telegram?.WebApp) {
                tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
                debug('✅ Telegram WebApp ready');
                return true;
            } else {
                debug('⚠️ Not in Telegram WebApp (testing in browser)');
                return false;
            }
        }
        
        // ============================================
        // ADSGRAM IMPLEMENTATION
        // ============================================
        async function tryAdsGram() {
            return new Promise(async (resolve) => {
                debug('📺 Trying AdsGram...');
                updateStatus('Loading AdsGram...');
                
                // Check if AdsGram is available
                if (typeof window.AdsGram === 'undefined') {
                    debug('❌ AdsGram SDK not loaded');
                    resolve(false);
                    return;
                }
                
                try {
                    const adsgram = new window.AdsGram({ 
                        blockId: CONFIG.adsgramBlockId 
                    });
                    
                    debug('AdsGram initialized, showing ad...');
                    
                    const result = await adsgram.showRewardedVideo();
                    
                    debug('AdsGram result: ' + JSON.stringify(result));
                    
                    if (result && (result.completed === true || result.done === true)) {
                        debug('✅ AdsGram ad completed');
                        resolve(true);
                    } else {
                        debug('❌ AdsGram ad not completed');
                        resolve(false);
                    }
                    
                } catch (error) {
                    debug('❌ AdsGram error: ' + (error.message || error.code || 'unknown'));
                    resolve(false);
                }
            });
        }
        
        // ============================================
        // UNITY ADS IMPLEMENTATION
        // ============================================
        function tryUnityAds() {
            return new Promise((resolve) => {
                debug('🎮 Trying Unity Ads...');
                updateStatus('Loading Unity Ads...');
                
                if (typeof window.UnityAds === 'undefined') {
                    debug('❌ Unity Ads SDK not loaded');
                    resolve(false);
                    return;
                }
                
                let resolved = false;
                
                // Timeout after 25 seconds
                const timeout = setTimeout(() => {
                    if (!resolved) {
                        resolved = true;
                        debug('❌ Unity Ads timeout');
                        resolve(false);
                    }
                }, 25000);
                
                // Initialize Unity Ads
                window.UnityAds.initialize(CONFIG.unityGameId, false);
                
                // Ad loaded successfully
                window.UnityAds.addListener('onUnityAdsAdLoaded', (placementId) => {
                    debug('✅ Unity ad loaded: ' + placementId);
                    updateStatus('Ad ready! Starting video...');
                    window.UnityAds.show(userId, placementId);
                });
                
                // Ad completed
                window.UnityAds.addListener('onUnityAdsShowComplete', (placementId, state) => {
                    clearTimeout(timeout);
                    if (resolved) return;
                    resolved = true;
                    
                    debug('Unity complete: ' + state);
                    
                    if (state === 'complete') {
                        debug('✅ Unity ad completed');
                        resolve(true);
                    } else {
                        debug('❌ Unity ad skipped: ' + state);
                        resolve(false);
                    }
                });
                
                // Ad show failed
                window.UnityAds.addListener('onUnityAdsShowFailed', (placementId, error, message) => {
                    clearTimeout(timeout);
                    if (resolved) return;
                    resolved = true;
                    debug('❌ Unity show failed: ' + message);
                    resolve(false);
                });
                
                // Ad failed to load
                window.UnityAds.addListener('onUnityAdsFailedToLoad', (placementId, error, message) => {
                    clearTimeout(timeout);
                    if (resolved) return;
                    resolved = true;
                    debug('❌ Unity load failed: ' + message);
                    resolve(false);
                });
                
                // Start loading
                debug('Loading placement: ' + CONFIG.unityPlacementId);
                window.UnityAds.load(CONFIG.unityPlacementId);
            });
        }
        
        // ============================================
        // DYNAMICALLY LOAD ADSGRAM SDK
        // ============================================
        function loadAdsGramSDK() {
            return new Promise((resolve) => {
                if (typeof window.AdsGram !== 'undefined') {
                    resolve(true);
                    return;
                }
                
                debug('Loading AdsGram SDK...');
                const script = document.createElement('script');
                script.src = 'https://sdk.adsgram.ai/js/adsgram.min.js';
                script.onload = () => {
                    debug('✅ AdsGram SDK loaded');
                    resolve(true);
                };
                script.onerror = () => {
                    debug('❌ Failed to load AdsGram SDK');
                    resolve(false);
                };
                document.head.appendChild(script);
            });
        }
        
        // ============================================
        // MAIN AD FLOW
        // ============================================
        async function startAdFlow() {
            // Initialize Telegram
            const inTelegram = initTelegram();
            
            // Load AdsGram SDK
            const adsgramLoaded = await loadAdsGramSDK();
            debug('AdsGram SDK loaded: ' + adsgramLoaded);
            
            // Try AdsGram first
            if (adsgramLoaded) {
                const adsGramSuccess = await tryAdsGram();
                if (adsGramSuccess) {
                    sendReward();
                    return;
                }
                debug('AdsGram failed, falling back to Unity...');
            }
            
            // Try Unity Ads as backup
            const unitySuccess = await tryUnityAds();
            if (unitySuccess) {
                sendReward();
                return;
            }
            
            // Both failed
            sendError('No ads available. Please try again in a few minutes.');
        }
        
        // ============================================
        // START EVERYTHING
        // ============================================
        startAdFlow();
        
        // Emergency fallback timeout (60 seconds)
        setTimeout(() => {
            if (!rewardGiven && !adCompleted) {
                debug('⏰ Emergency timeout reached');
                sendError('Ad loading timeout. Please try again.');
            }
        }, 60000);
    </script>
</body>
</html>

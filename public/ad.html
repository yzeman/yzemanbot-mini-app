<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Watch Ad - YzemanBot</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #status {
            color: white;
            text-align: center;
            padding: 20px;
            max-width: 300px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .debug {
            font-size: 12px;
            color: #888;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="status">
        <div class="spinner"></div>
        <div id="statusText">Initializing...</div>
        <div class="debug" id="debug"></div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const CONFIG = {
            adsgramBlockId: '27428',
            unityGameId: '6087630',
            unityPlacementId: 'Rewarded_Video_-_Telegram'
        };
        
        // Get user info from URL
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('userId') || 'guest';
        const rewardAmount = parseInt(urlParams.get('reward')) || 557;
        
        let rewardGiven = false;
        let tg = null;
        
        // ============================================
        // HELPER FUNCTIONS
        // ============================================
        function updateStatus(message, isError = false) {
            document.getElementById('statusText').textContent = message;
            if (isError) {
                document.querySelector('.spinner').style.borderTopColor = '#ff5252';
            }
        }
        
        function debug(message) {
            console.log('[Ad Debug]', message);
            document.getElementById('debug').textContent = message;
        }
        
        function sendReward() {
            if (rewardGiven) return;
            rewardGiven = true;
            
            debug('Sending reward: ' + rewardAmount);
            
            if (tg) {
                tg.sendData(JSON.stringify({ 
                    event: 'reward-earned', 
                    amount: rewardAmount 
                }));
                setTimeout(() => tg.close(), 500);
            } else {
                window.opener?.postMessage({ event: 'reward-earned', amount: rewardAmount }, '*');
                setTimeout(() => window.close(), 500);
            }
        }
        
        function sendError(errorMsg) {
            debug('Error: ' + errorMsg);
            updateStatus(errorMsg, true);
            
            if (tg) {
                tg.sendData(JSON.stringify({ 
                    event: 'ad-failed', 
                    error: errorMsg 
                }));
                setTimeout(() => tg.close(), 2000);
            }
        }
        
        // ============================================
        // INITIALIZE TELEGRAM
        // ============================================
        function initTelegram() {
            return new Promise((resolve) => {
                if (window.Telegram?.WebApp) {
                    tg = window.Telegram.WebApp;
                    tg.ready();
                    tg.expand();
                    debug('Telegram ready');
                    resolve(true);
                } else {
                    debug('Not in Telegram WebApp');
                    resolve(false);
                }
            });
        }
        
        // ============================================
        // ADSGRAM IMPLEMENTATION
        // ============================================
        async function tryAdsGram() {
            return new Promise(async (resolve) => {
                try {
                    updateStatus('Loading AdsGram...');
                    
                    // Wait for AdsGram to be available
                    let attempts = 0;
                    while (typeof AdsGram === 'undefined' && attempts < 20) {
                        await new Promise(r => setTimeout(r, 250));
                        attempts++;
                    }
                    
                    if (typeof AdsGram === 'undefined') {
                        debug('AdsGram not loaded');
                        resolve(false);
                        return;
                    }
                    
                    debug('AdsGram initializing...');
                    const adsgram = new AdsGram({ blockId: CONFIG.adsgramBlockId });
                    
                    // Set timeout for ad loading
                    const timeout = setTimeout(() => {
                        debug('AdsGram timeout');
                        resolve(false);
                    }, 20000);
                    
                    try {
                        const result = await adsgram.showRewardedVideo();
                        clearTimeout(timeout);
                        
                        debug('AdsGram result: ' + JSON.stringify(result));
                        
                        if (result && (result.completed || result.done)) {
                            sendReward();
                            resolve(true);
                        } else {
                            resolve(false);
                        }
                    } catch (err) {
                        clearTimeout(timeout);
                        debug('AdsGram error: ' + (err.message || err.code || 'unknown'));
                        resolve(false);
                    }
                    
                } catch (err) {
                    debug('AdsGram exception: ' + err.message);
                    resolve(false);
                }
            });
        }
        
        // ============================================
        // UNITY ADS IMPLEMENTATION
        // ============================================
        function tryUnityAds() {
            return new Promise((resolve) => {
                try {
                    updateStatus('Loading Unity Ads...');
                    
                    if (typeof UnityAds === 'undefined') {
                        debug('Unity Ads SDK not loaded');
                        resolve(false);
                        return;
                    }
                    
                    debug('Unity initializing...');
                    
                    let resolved = false;
                    const timeout = setTimeout(() => {
                        if (!resolved) {
                            debug('Unity timeout');
                            resolved = true;
                            resolve(false);
                        }
                    }, 25000);
                    
                    UnityAds.initialize(CONFIG.unityGameId, false);
                    
                    UnityAds.addListener('onUnityAdsAdLoaded', (placementId) => {
                        debug('Unity ad loaded: ' + placementId);
                        updateStatus('Ad ready! Starting...');
                        UnityAds.show(userId, placementId);
                    });
                    
                    UnityAds.addListener('onUnityAdsShowComplete', (placementId, state) => {
                        clearTimeout(timeout);
                        if (resolved) return;
                        resolved = true;
                        
                        debug('Unity complete: ' + state);
                        if (state === 'complete') {
                            sendReward();
                            resolve(true);
                        } else {
                            resolve(false);
                        }
                    });
                    
                    UnityAds.addListener('onUnityAdsShowFailed', (placementId, error, message) => {
                        clearTimeout(timeout);
                        if (resolved) return;
                        resolved = true;
                        debug('Unity show failed: ' + message);
                        resolve(false);
                    });
                    
                    UnityAds.addListener('onUnityAdsFailedToLoad', (placementId, error, message) => {
                        clearTimeout(timeout);
                        if (resolved) return;
                        resolved = true;
                        debug('Unity load failed: ' + message);
                        resolve(false);
                    });
                    
                    debug('Loading Unity placement: ' + CONFIG.unityPlacementId);
                    UnityAds.load(CONFIG.unityPlacementId);
                    
                } catch (err) {
                    debug('Unity exception: ' + err.message);
                    resolve(false);
                }
            });
        }
        
        // ============================================
        // MAIN FLOW
        // ============================================
        async function startAdFlow() {
            await initTelegram();
            
            debug('Starting ad flow...');
            
            // Try AdsGram first
            const adsGramSuccess = await tryAdsGram();
            if (adsGramSuccess) {
                debug('✅ AdsGram success');
                return;
            }
            
            debug('AdsGram failed, trying Unity...');
            
            // Try Unity as backup
            const unitySuccess = await tryUnityAds();
            if (unitySuccess) {
                debug('✅ Unity success');
                return;
            }
            
            // Both failed
            debug('❌ Both ad networks failed');
            sendError('No ads available. Please try again later.');
        }
        
        // Start everything
        startAdFlow();
        
        // Emergency timeout
        setTimeout(() => {
            if (!rewardGiven) {
                debug('Emergency timeout');
                sendError('Ad loading timeout');
            }
        }, 60000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Watch Ad</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            color: white;
        }
        .container { text-align: center; max-width: 350px; width: 100%; }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(255,255,255,0.15);
            border-top-color: #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 25px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #statusText { font-size: 18px; font-weight: 500; margin-bottom: 20px; }
        #debug {
            color: #aaa; font-size: 13px; margin-top: 20px;
            padding: 10px; background: rgba(0,0,0,0.3);
            border-radius: 8px;
        }
        .close-btn {
            position: fixed; top: 10px; right: 10px; z-index: 10000;
            background: rgba(255,255,255,0.2); color: white;
            border: none; padding: 10px 18px; border-radius: 20px;
            font-size: 14px; cursor: pointer;
        }
        .demo-btn {
            background: #4CAF50; color: white;
            border: none; padding: 15px 30px; border-radius: 10px;
            font-size: 16px; margin-top: 20px; cursor: pointer;
        }
    </style>
    <script src="https://webgl.unity3d.com/unity-ads/4.12.0/unity-ads.js"></script>
</head>
<body>
    <button class="close-btn" id="closeBtn">✕ Close</button>
    <div class="container">
        <div class="spinner" id="spinner"></div>
        <div id="statusText">Loading ad...</div>
        <div id="debug">Initializing...</div>
        <button class="demo-btn" id="demoBtn" style="display:none;">🎁 Claim Reward (Demo)</button>
    </div>

    <script>
        const CONFIG = {
            adsgramBlockId: '27449',
            unityGameId: '6087630',
            unityPlacementId: 'Rewarded_Video_-_Telegram'
        };
        
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('userId') || 'guest';
        const rewardAmount = parseInt(urlParams.get('reward')) || 557;
        
        let rewardGiven = false;
        
        function debug(msg) {
            console.log('[Ad]', msg);
            document.getElementById('debug').textContent = msg;
        }
        
        function updateStatus(msg, isError) {
            document.getElementById('statusText').textContent = msg;
            if (isError) {
                document.getElementById('spinner').style.borderTopColor = '#ff5252';
            }
        }
        
        function sendToParent(data) {
            debug('Sending: ' + JSON.stringify(data));
            if (window.parent && window.parent !== window) {
                window.parent.postMessage(data, '*');
            }
        }
        
        function sendReward() {
            if (rewardGiven) return;
            rewardGiven = true;
            updateStatus('✅ Completed! +' + rewardAmount + ' points', false);
            sendToParent({ event: 'reward-earned', amount: rewardAmount });
            setTimeout(() => { if (window.parent) window.parent.postMessage({ event: 'close-ad' }, '*'); }, 500);
        }
        
        function sendError(msg) {
            if (rewardGiven) return;
            updateStatus('❌ ' + msg, true);
            sendToParent({ event: 'ad-failed', error: msg });
        }
        
        // Close button
        document.getElementById('closeBtn').onclick = () => sendError('Closed by user');
        
        // Demo button (shows after 5 seconds if no ad)
        setTimeout(() => {
            if (!rewardGiven) {
                document.getElementById('demoBtn').style.display = 'block';
                document.getElementById('demoBtn').onclick = () => {
                    debug('Demo reward claimed');
                    sendReward();
                };
            }
        }, 5000);
        
        // Load AdsGram SDK
        function loadAdsGram() {
            return new Promise((resolve) => {
                if (typeof window.AdsGram !== 'undefined') { resolve(true); return; }
                debug('Loading AdsGram SDK...');
                const script = document.createElement('script');
                script.src = 'https://sdk.adsgram.ai/js/adsgram.min.js';
                script.onload = () => { debug('AdsGram SDK loaded'); resolve(true); };
                script.onerror = () => { debug('AdsGram SDK failed'); resolve(false); };
                document.head.appendChild(script);
            });
        }
        
        // Try AdsGram
        async function tryAdsGram() {
            debug('Trying AdsGram...');
            updateStatus('Loading AdsGram...', false);
            
            const loaded = await loadAdsGram();
            if (!loaded) { debug('AdsGram SDK not loaded'); return false; }
            
            try {
                const adsgram = new window.AdsGram({ blockId: CONFIG.adsgramBlockId });
                debug('Showing AdsGram ad...');
                const result = await adsgram.showRewardedVideo();
                debug('Result: ' + JSON.stringify(result));
                return !!(result && (result.completed || result.done));
            } catch (e) {
                debug('AdsGram error: ' + (e.message || e.code || 'unknown'));
                return false;
            }
        }
        
        // Try Unity Ads
        function tryUnityAds() {
            return new Promise((resolve) => {
                debug('Trying Unity Ads...');
                updateStatus('Loading Unity Ads...', false);
                
                if (typeof window.UnityAds === 'undefined') {
                    debug('Unity SDK not available');
                    resolve(false);
                    return;
                }
                
                let resolved = false;
                const timeout = setTimeout(() => {
                    if (!resolved) { resolved = true; debug('Unity timeout'); resolve(false); }
                }, 20000);
                
                window.UnityAds.initialize(CONFIG.unityGameId, false);
                
                window.UnityAds.addListener('onUnityAdsAdLoaded', (placementId) => {
                    debug('Unity ad loaded');
                    window.UnityAds.show(userId, placementId);
                });
                
                window.UnityAds.addListener('onUnityAdsShowComplete', (placementId, state) => {
                    clearTimeout(timeout);
                    if (resolved) return;
                    resolved = true;
                    debug('Unity state: ' + state);
                    resolve(state === 'complete');
                });
                
                window.UnityAds.addListener('onUnityAdsShowFailed', (placementId, error, message) => {
                    clearTimeout(timeout);
                    if (resolved) return;
                    resolved = true;
                    debug('Unity failed: ' + message);
                    resolve(false);
                });
                
                window.UnityAds.addListener('onUnityAdsFailedToLoad', (placementId, error, message) => {
                    clearTimeout(timeout);
                    if (resolved) return;
                    resolved = true;
                    debug('Unity load failed: ' + message);
                    resolve(false);
                });
                
                debug('Loading Unity placement...');
                window.UnityAds.load(CONFIG.unityPlacementId);
            });
        }
        
        // Main flow
        (async function() {
            const adsGramOk = await tryAdsGram();
            if (adsGramOk) { sendReward(); return; }
            
            debug('AdsGram failed, trying Unity...');
            const unityOk = await tryUnityAds();
            if (unityOk) { sendReward(); return; }
            
            debug('Both networks failed - use Demo button');
            updateStatus('No ads available - Use Demo', true);
        })();
    </script>
</body>
</html>

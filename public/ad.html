<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Watch Ad - YzemanBot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 350px;
            width: 100%;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.15);
            border-top-color: #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 25px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #statusText {
            color: white;
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 10px;
        }
        #debug {
            color: #888;
            font-size: 13px;
            margin-top: 20px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            word-break: break-word;
        }
        .error .spinner {
            border-top-color: #ff5252;
            animation: none;
        }
        .success .spinner {
            border-top-color: #4CAF50;
            animation: none;
        }
    </style>
    
    <!-- Unity Ads SDK -->
    <script src="https://webgl.unity3d.com/unity-ads/4.12.0/unity-ads.js"></script>
</head>
<body>
    <div class="container" id="container">
        <div class="spinner" id="spinner"></div>
        <div id="statusText">Initializing...</div>
        <div id="debug">Starting ad system...</div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const CONFIG = {
            adsgramBlockId: '27428',
            unityGameId: '6087630',
            unityPlacementId: 'Rewarded_Video_-_Telegram'
        };
        
        // ============================================
        // GLOBAL VARIABLES
        // ============================================
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('userId') || 'guest';
        const rewardAmount = parseInt(urlParams.get('reward')) || 557;
        
        let tg = null;
        let rewardGiven = false;
        
        // ============================================
        // UI HELPER FUNCTIONS
        // ============================================
        function updateStatus(message, type) {
            document.getElementById('statusText').textContent = message;
            const container = document.getElementById('container');
            container.classList.remove('error', 'success');
            if (type === 'error') container.classList.add('error');
            if (type === 'success') container.classList.add('success');
        }
        
        function debug(message) {
            console.log('[Ad Debug]', message);
            const debugEl = document.getElementById('debug');
            if (debugEl) {
                debugEl.textContent = message;
            }
        }
        
        // ============================================
        // REWARD FUNCTIONS
        // ============================================
        function sendReward() {
            if (rewardGiven) return;
            rewardGiven = true;
            
            debug('✅ Sending reward: ' + rewardAmount + ' points');
            updateStatus('Ad completed! +' + rewardAmount + ' points', 'success');
            
            const rewardData = JSON.stringify({ 
                event: 'reward-earned', 
                amount: rewardAmount 
            });
            
            if (tg) {
                tg.sendData(rewardData);
                setTimeout(function() { tg.close(); }, 800);
            } else if (window.opener) {
                window.opener.postMessage(JSON.parse(rewardData), '*');
                setTimeout(function() { window.close(); }, 800);
            } else {
                setTimeout(function() {
                    window.location.href = '/';
                }, 1500);
            }
        }
        
        function sendError(errorMsg) {
            if (rewardGiven) return;
            
            debug('❌ Error: ' + errorMsg);
            updateStatus(errorMsg, 'error');
            
            var errorData = JSON.stringify({ 
                event: 'ad-failed', 
                error: errorMsg 
            });
            
            if (tg) {
                tg.sendData(errorData);
                setTimeout(function() { tg.close(); }, 2000);
            } else if (window.opener) {
                window.opener.postMessage(JSON.parse(errorData), '*');
                setTimeout(function() { window.close(); }, 2000);
            }
        }
        
        // ============================================
        // TELEGRAM INITIALIZATION
        // ============================================
        function initTelegram() {
            debug('Checking Telegram WebApp...');
            
            if (window.Telegram && window.Telegram.WebApp) {
                tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
                debug('✅ Telegram WebApp ready');
                return true;
            } else {
                debug('⚠️ Not in Telegram (testing mode)');
                return false;
            }
        }
        
        // ============================================
        // ADSGRAM IMPLEMENTATION
        // ============================================
        function tryAdsGram() {
            return new Promise(function(resolve) {
                debug('📺 Trying AdsGram...');
                updateStatus('Loading AdsGram...', 'info');
                
                if (typeof window.AdsGram === 'undefined') {
                    debug('❌ AdsGram SDK not loaded');
                    resolve(false);
                    return;
                }
                
                try {
                    var adsgram = new window.AdsGram({ 
                        blockId: CONFIG.adsgramBlockId 
                    });
                    
                    debug('AdsGram initialized, showing ad...');
                    
                    adsgram.showRewardedVideo()
                        .then(function(result) {
                            debug('AdsGram result: ' + JSON.stringify(result));
                            
                            if (result && (result.completed === true || result.done === true)) {
                                debug('✅ AdsGram ad completed');
                                resolve(true);
                            } else {
                                debug('❌ AdsGram ad not completed');
                                resolve(false);
                            }
                        })
                        .catch(function(error) {
                            debug('❌ AdsGram error: ' + (error.message || error.code || 'unknown'));
                            resolve(false);
                        });
                    
                } catch (err) {
                    debug('❌ AdsGram exception: ' + err.message);
                    resolve(false);
                }
            });
        }
        
        // ============================================
        // UNITY ADS IMPLEMENTATION
        // ============================================
        function tryUnityAds() {
            return new Promise(function(resolve) {
                debug('🎮 Trying Unity Ads...');
                updateStatus('Loading Unity Ads...', 'info');
                
                if (typeof window.UnityAds === 'undefined') {
                    debug('❌ Unity Ads SDK not loaded');
                    resolve(false);
                    return;
                }
                
                var resolved = false;
                
                var timeout = setTimeout(function() {
                    if (!resolved) {
                        resolved = true;
                        debug('❌ Unity Ads timeout');
                        resolve(false);
                    }
                }, 25000);
                
                window.UnityAds.initialize(CONFIG.unityGameId, false);
                
                window.UnityAds.addListener('onUnityAdsAdLoaded', function(placementId) {
                    debug('✅ Unity ad loaded: ' + placementId);
                    updateStatus('Ad ready! Starting video...', 'info');
                    window.UnityAds.show(userId, placementId);
                });
                
                window.UnityAds.addListener('onUnityAdsShowComplete', function(placementId, state) {
                    clearTimeout(timeout);
                    if (resolved) return;
                    resolved = true;
                    
                    debug('Unity complete: ' + state);
                    
                    if (state === 'complete') {
                        debug('✅ Unity ad completed');
                        resolve(true);
                    } else {
                        debug('❌ Unity ad skipped: ' + state);
                        resolve(false);
                    }
                });
                
                window.UnityAds.addListener('onUnityAdsShowFailed', function(placementId, error, message) {
                    clearTimeout(timeout);
                    if (resolved) return;
                    resolved = true;
                    debug('❌ Unity show failed: ' + message);
                    resolve(false);
                });
                
                window.UnityAds.addListener('onUnityAdsFailedToLoad', function(placementId, error, message) {
                    clearTimeout(timeout);
                    if (resolved) return;
                    resolved = true;
                    debug('❌ Unity load failed: ' + message);
                    resolve(false);
                });
                
                debug('Loading placement: ' + CONFIG.unityPlacementId);
                window.UnityAds.load(CONFIG.unityPlacementId);
            });
        }
        
        // ============================================
        // LOAD ADSGRAM SDK
        // ============================================
        function loadAdsGramSDK() {
            return new Promise(function(resolve) {
                if (typeof window.AdsGram !== 'undefined') {
                    debug('✅ AdsGram already loaded');
                    resolve(true);
                    return;
                }
                
                debug('Loading AdsGram SDK...');
                var script = document.createElement('script');
                script.src = 'https://sdk.adsgram.ai/js/adsgram.min.js';
                script.onload = function() {
                    debug('✅ AdsGram SDK loaded');
                    resolve(true);
                };
                script.onerror = function() {
                    debug('❌ Failed to load AdsGram SDK');
                    resolve(false);
                };
                document.head.appendChild(script);
            });
        }
        
        // ============================================
        // MAIN AD FLOW
        // ============================================
        async function startAdFlow() {
            initTelegram();
            
            var adsgramLoaded = await loadAdsGramSDK();
            debug('AdsGram SDK loaded: ' + adsgramLoaded);
            
            if (adsgramLoaded) {
                var adsGramSuccess = await tryAdsGram();
                if (adsGramSuccess) {
                    sendReward();
                    return;
                }
                debug('AdsGram failed, falling back to Unity...');
            }
            
            var unitySuccess = await tryUnityAds();
            if (unitySuccess) {
                sendReward();
                return;
            }
            
            sendError('No ads available. Please try again in a few minutes.');
        }
        
        // ============================================
        // START
        // ============================================
        startAdFlow();
        
        setTimeout(function() {
            if (!rewardGiven) {
                debug('⏰ Emergency timeout');
                sendError('Ad loading timeout. Please try again.');
            }
        }, 60000);
    </script>
</body>
</html>

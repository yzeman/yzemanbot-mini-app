<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Watch Ad - YzemanBot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0f0f1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            color: white;
        }
        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.15);
            border-top-color: #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 25px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #statusText {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 20px;
        }
        .log-box {
            background: rgba(0,0,0,0.4);
            border-radius: 8px;
            padding: 15px;
            text-align: left;
            font-size: 13px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 20px;
        }
        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: #aaa;
        }
        .log-entry.success {
            color: #4CAF50;
        }
        .log-entry.error {
            color: #ff5252;
        }
        .log-entry.warning {
            color: #FFC107;
        }
        .close-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 10000;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }
        .test-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
    
    <!-- Unity Ads SDK -->
    <script src="https://webgl.unity3d.com/unity-ads/4.12.0/unity-ads.js"></script>
</head>
<body>
    <button class="close-btn" id="closeBtn">✕ Close</button>
    
    <div class="container">
        <div class="spinner" id="spinner"></div>
        <div id="statusText">Testing ad systems...</div>
        <div class="log-box" id="logBox">
            <div class="log-entry">🚀 Starting diagnostics...</div>
        </div>
        <button class="test-btn" id="testRewardBtn" style="display:none;">🎁 Test Reward (Skip Ad)</button>
    </div>

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const CONFIG = {
            adsgramBlockId: '27428',
            unityGameId: '6087630',
            unityPlacementId: 'Rewarded_Video_-_Telegram'
        };
        
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('userId') || 'guest';
        const rewardAmount = parseInt(urlParams.get('reward')) || 557;
        
        let rewardGiven = false;
        let logs = [];
        
        // ============================================
        // LOGGING FUNCTIONS
        // ============================================
        function addLog(message, type) {
            console.log('[Ad]', message);
            logs.push({ message, type, time: new Date().toLocaleTimeString() });
            
            const logBox = document.getElementById('logBox');
            const entry = document.createElement('div');
            entry.className = 'log-entry ' + (type || '');
            entry.textContent = message;
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
        }
        
        function updateStatus(message, type) {
            document.getElementById('statusText').textContent = message;
            const spinner = document.getElementById('spinner');
            if (type === 'error') {
                spinner.style.borderTopColor = '#ff5252';
            } else if (type === 'success') {
                spinner.style.borderTopColor = '#4CAF50';
            }
        }
        
        // ============================================
        // SEND TO PARENT
        // ============================================
        function sendToParent(data) {
            addLog('📤 Sending to parent: ' + JSON.stringify(data), 'success');
            
            if (window.parent && window.parent !== window) {
                window.parent.postMessage(data, '*');
                addLog('✅ Sent via postMessage', 'success');
            } else {
                addLog('⚠️ No parent window found', 'warning');
            }
        }
        
        function sendReward() {
            if (rewardGiven) return;
            rewardGiven = true;
            addLog('🎉 REWARD EARNED: ' + rewardAmount + ' points', 'success');
            updateStatus('✅ Ad completed!', 'success');
            sendToParent({ event: 'reward-earned', amount: rewardAmount });
        }
        
        function sendError(errorMsg) {
            if (rewardGiven) return;
            addLog('❌ Error: ' + errorMsg, 'error');
            updateStatus('❌ ' + errorMsg, 'error');
            sendToParent({ event: 'ad-failed', error: errorMsg });
        }
        
        // ============================================
        // TEST REWARD BUTTON (BYPASS ADS FOR TESTING)
        // ============================================
        document.getElementById('testRewardBtn').addEventListener('click', function() {
            addLog('🧪 Test reward triggered', 'success');
            sendReward();
        });
        
        document.getElementById('closeBtn').addEventListener('click', function() {
            addLog('User closed ad manually', 'warning');
            sendError('Ad closed by user');
        });
        
        // ============================================
        // ENVIRONMENT CHECKS
        // ============================================
        function checkEnvironment() {
            addLog('📱 Checking environment...');
            
            // Check if in iframe
            if (window.parent && window.parent !== window) {
                addLog('✅ Running in iframe', 'success');
            } else {
                addLog('⚠️ Not in iframe', 'warning');
            }
            
            // Check Telegram
            if (window.Telegram && window.Telegram.WebApp) {
                addLog('✅ Telegram WebApp detected', 'success');
                const tg = window.Telegram.WebApp;
                addLog('   Platform: ' + tg.platform, 'info');
                addLog('   Version: ' + tg.version, 'info');
            } else {
                addLog('⚠️ Not in Telegram WebApp', 'warning');
            }
            
            // Check SDKs
            addLog('📦 Checking SDKs...');
            
            if (typeof window.UnityAds !== 'undefined') {
                addLog('✅ Unity Ads SDK loaded', 'success');
            } else {
                addLog('❌ Unity Ads SDK NOT loaded', 'error');
            }
        }
        
        // ============================================
        // UNITY ADS TEST
        // ============================================
        function testUnityAds() {
            return new Promise(function(resolve) {
                addLog('🎮 Testing Unity Ads...');
                updateStatus('Testing Unity Ads...');
                
                if (typeof window.UnityAds === 'undefined') {
                    addLog('❌ Unity Ads SDK not available', 'error');
                    resolve(false);
                    return;
                }
                
                addLog('   Game ID: ' + CONFIG.unityGameId);
                addLog('   Placement: ' + CONFIG.unityPlacementId);
                
                let resolved = false;
                
                const timeout = setTimeout(function() {
                    if (!resolved) {
                        resolved = true;
                        addLog('❌ Unity Ads timeout (25s)', 'error');
                        resolve(false);
                    }
                }, 25000);
                
                window.UnityAds.initialize(CONFIG.unityGameId, false);
                addLog('   Unity initialized', 'info');
                
                window.UnityAds.addListener('onUnityAdsAdLoaded', function(placementId) {
                    addLog('✅ Unity ad LOADED: ' + placementId, 'success');
                    updateStatus('Showing Unity ad...');
                    window.UnityAds.show(userId, placementId);
                });
                
                window.UnityAds.addListener('onUnityAdsShowStart', function(placementId) {
                    addLog('▶️ Unity ad STARTED', 'success');
                });
                
                window.UnityAds.addListener('onUnityAdsShowComplete', function(placementId, state) {
                    clearTimeout(timeout);
                    if (resolved) return;
                    resolved = true;
                    
                    addLog('   Unity state: ' + state, 'info');
                    
                    if (state === 'complete') {
                        addLog('✅ Unity ad COMPLETED', 'success');
                        resolve(true);
                    } else {
                        addLog('⚠️ Unity ad SKIPPED: ' + state, 'warning');
                        resolve(false);
                    }
                });
                
                window.UnityAds.addListener('onUnityAdsShowFailed', function(placementId, error, message) {
                    clearTimeout(timeout);
                    if (resolved) return;
                    resolved = true;
                    addLog('❌ Unity show FAILED: ' + message, 'error');
                    resolve(false);
                });
                
                window.UnityAds.addListener('onUnityAdsFailedToLoad', function(placementId, error, message) {
                    clearTimeout(timeout);
                    if (resolved) return;
                    resolved = true;
                    addLog('❌ Unity load FAILED: ' + message, 'error');
                    resolve(false);
                });
                
                addLog('   Calling UnityAds.load()...');
                window.UnityAds.load(CONFIG.unityPlacementId);
            });
        }
        
        // ============================================
        // ADSGRAM TEST
        // ============================================
        function loadAdsGramSDK() {
            return new Promise(function(resolve) {
                if (typeof window.AdsGram !== 'undefined') {
                    addLog('✅ AdsGram already loaded', 'success');
                    resolve(true);
                    return;
                }
                
                addLog('📥 Loading AdsGram SDK...');
                var script = document.createElement('script');
                script.src = 'https://sdk.adsgram.ai/js/adsgram.min.js';
                script.onload = function() {
                    addLog('✅ AdsGram SDK loaded', 'success');
                    resolve(true);
                };
                script.onerror = function() {
                    addLog('❌ Failed to load AdsGram SDK', 'error');
                    resolve(false);
                };
                document.head.appendChild(script);
            });
        }
        
        function testAdsGram() {
            return new Promise(async function(resolve) {
                addLog('📺 Testing AdsGram...');
                updateStatus('Testing AdsGram...');
                
                const loaded = await loadAdsGramSDK();
                if (!loaded) {
                    resolve(false);
                    return;
                }
                
                if (typeof window.AdsGram === 'undefined') {
                    addLog('❌ AdsGram not available', 'error');
                    resolve(false);
                    return;
                }
                
                addLog('   Block ID: ' + CONFIG.adsgramBlockId);
                
                try {
                    var adsgram = new window.AdsGram({ 
                        blockId: CONFIG.adsgramBlockId 
                    });
                    
                    addLog('   Calling showRewardedVideo()...');
                    
                    var result = await adsgram.showRewardedVideo();
                    
                    addLog('   Result: ' + JSON.stringify(result), 'info');
                    
                    if (result && (result.completed === true || result.done === true)) {
                        addLog('✅ AdsGram ad COMPLETED', 'success');
                        resolve(true);
                    } else {
                        addLog('⚠️ AdsGram ad NOT completed', 'warning');
                        resolve(false);
                    }
                    
                } catch (error) {
                    addLog('❌ AdsGram error: ' + (error.message || error.code || 'unknown'), 'error');
                    resolve(false);
                }
            });
        }
        
        // ============================================
        // MAIN TEST FLOW
        // ============================================
        async function runTests() {
            checkEnvironment();
            
            // Show test button after 5 seconds (for manual testing)
            setTimeout(function() {
                document.getElementById('testRewardBtn').style.display = 'block';
            }, 5000);
            
            // Test AdsGram first
            addLog('--- Testing AdsGram ---');
            var adsGramSuccess = await testAdsGram();
            
            if (adsGramSuccess) {
                addLog('🏆 AdsGram SUCCESS!', 'success');
                sendReward();
                return;
            }
            
            addLog('--- AdsGram failed, testing Unity ---');
            
            // Test Unity Ads
            var unitySuccess = await testUnityAds();
            
            if (unitySuccess) {
                addLog('🏆 Unity Ads SUCCESS!', 'success');
                sendReward();
                return;
            }
            
            // Both failed
            addLog('--- BOTH AD NETWORKS FAILED ---', 'error');
            addLog('💡 Click "Test Reward" button to simulate success', 'warning');
            updateStatus('No ads available', 'error');
        }
        
        // Start tests
        runTests();
        
        // Emergency timeout
        setTimeout(function() {
            if (!rewardGiven) {
                addLog('⏰ Emergency timeout (60s)', 'error');
                updateStatus('Timeout', 'error');
            }
        }, 60000);
    </script>
</body>
</html>

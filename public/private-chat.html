<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Private Chat - YzemanBot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root {
            --primary: #4CAF50;
            --secondary: #2196F3;
            --warning: #FF9800;
            --danger: #f44336;
            --dark: #1a1a2e;
            --darker: #16213e;
            --light: #ffffff;
            --gray: #888888;
            --gold: #FFD700;
            --success: #00c853;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .no-select {
  -webkit-user-select: none; /* Safari */
  -moz-user-select: none;    /* Firefox */
  -ms-user-select: none;     /* IE10+/Edge */
  user-select: none;         /* Standard */
  
  -webkit-touch-callout: none; /* iOS Safari - disable long-press menu */
}
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--dark) 0%, #0f0f1a 100%);
            color: var(--light);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255,215,0,0.2);
            flex-shrink: 0;
        }
        .back-btn {
            color: white;
            font-size: 20px;
            text-decoration: none;
            background: rgba(0,0,0,0.3);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .back-btn:hover { background: rgba(0,0,0,0.5); }
        .friend-info h2 {
            font-size: 18px;
            margin-bottom: 2px;
        }
        .friend-info p {
            font-size: 11px;
            color: var(--gray);
        }
        
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .message {
            display: flex;
            gap: 10px;
            max-width: 85%;
            position: relative;
        }
        .message-own {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            flex-shrink: 0;
            color: white;
        }
        .message-bubble {
            background: rgba(22, 33, 62, 0.9);
            border-radius: 20px;
            padding: 12px 16px;
            max-width: 100%;
            position: relative;
            transition: all 0.2s;
        }
        .message-own .message-bubble {
            background: linear-gradient(135deg, var(--primary), #2E7D32);
        }
        .message-sender {
            font-size: 11px;
            font-weight: 600;
            color: var(--gold);
            margin-bottom: 4px;
        }
        .message-text {
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .message-time {
            font-size: 9px;
            color: var(--gray);
            margin-top: 5px;
            text-align: right;
        }
        .edited-badge {
            font-size: 8px;
            color: var(--gray);
            margin-left: 5px;
        }
        
        /* Message Actions Menu */
        .message-actions-menu {
            position: fixed;
            background: var(--darker);
            border-radius: 16px;
            padding: 8px;
            display: none;
            z-index: 2000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        .message-actions-menu button {
            background: none;
            border: none;
            color: white;
            padding: 10px 20px;
            width: 100%;
            text-align: left;
            cursor: pointer;
            border-radius: 12px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
        }
        .message-actions-menu button:hover {
            background: rgba(255,255,255,0.1);
        }
        .message-actions-menu .delete-btn {
            color: var(--danger);
        }
        .message-actions-menu .edit-btn {
            color: var(--gold);
        }
        
        .input-area {
            padding: 12px;
            background: rgba(22, 33, 62, 0.95);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }
        .message-input {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--gray);
            border-radius: 30px;
            padding: 12px 18px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }
        .message-input:focus {
            border-color: var(--primary);
            background: rgba(0,0,0,0.5);
        }
        .send-btn {
            background: linear-gradient(135deg, var(--primary), #2E7D32);
            border: none;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .send-btn:active { transform: scale(0.95); }
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .loading-messages {
            text-align: center;
            padding: 30px;
            color: var(--gray);
        }
        
        .notification {
            position: fixed; bottom: 80px; left: 15px; right: 15px;
            background: var(--success); color: white; padding: 12px 16px;
            border-radius: 12px; text-align: center; display: none; z-index: 1000;
            font-size: 12px;
            animation: slideUp 0.3s ease;
        }
        .notification.error { background: var(--danger); }
        
        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .typing-indicator {
            padding: 8px 15px;
            font-size: 11px;
            color: var(--gray);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .typing-dots {
            display: flex;
            gap: 4px;
        }
        .typing-dots span {
            width: 6px;
            height: 6px;
            background: var(--gold);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-4px); opacity: 1; }
        }
        
        /* Scrollbar Styling */
        .messages-container::-webkit-scrollbar {
            width: 4px;
        }
        .messages-container::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        .messages-container::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="chat-header">
        <a href="/profile.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div class="friend-info">
            <h2 id="friendName">Loading...</h2>
            <p id="friendStatus">Connecting...</p>
        </div>
    </div>
    
    <div class="messages-container" id="messagesContainer">
        <div class="loading-messages">Loading messages...</div>
    </div>
    
    <div class="typing-indicator" id="typingIndicator" style="display: none;">
        <span>Typing</span>
        <div class="typing-dots">
            <span></span><span></span><span></span>
        </div>
    </div>
    
    <div class="input-area">
        <input type="text" class="message-input" id="messageInput" placeholder="Type a message...">
        <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
    </div>
    
    <div class="message-actions-menu" id="messageActionsMenu">
        <button class="edit-btn" id="editMessageBtn"><i class="fas fa-edit"></i> Edit</button>
        <button class="delete-btn" id="deleteMessageBtn"><i class="fas fa-trash"></i> Delete</button>
    </div>
    
    <div class="notification" id="notification"></div>
    
    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }
        
        let socket = null;
        let currentUser = null;
        let currentChatId = null;
        let typingTimeout = null;
        let isConnected = false;
        let selectedMessageId = null;
        let selectedMessageElement = null;
        
        const urlParams = new URLSearchParams(window.location.search);
        const friendUserId = urlParams.get('userId');
        const friendDisplayName = decodeURIComponent(urlParams.get('userName') || 'Friend');
        
        document.getElementById('friendName').textContent = friendDisplayName;
        
        function showNotification(msg, isError = false) {
            const notif = document.getElementById('notification');
            notif.textContent = msg;
            notif.className = 'notification' + (isError ? ' error' : '');
            notif.style.display = 'block';
            setTimeout(() => notif.style.display = 'none', 3000);
        }
        
        function formatTime(dateString) {
            if (!dateString) return 'Just now';
            try {
                const date = new Date(dateString);
                if (isNaN(date.getTime())) return 'Just now';
                return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            } catch (e) {
                return 'Just now';
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function getInitials(name) {
            if (!name) return '👤';
            return name.charAt(0).toUpperCase();
        }
        
        function getFirstName(fullName) {
            if (!fullName) return 'User';
            return fullName.split(' ')[0];
        }
        
        function hideMessageActions() {
            const menu = document.getElementById('messageActionsMenu');
            menu.style.display = 'none';
            selectedMessageId = null;
            selectedMessageElement = null;
        }
        
        function showMessageActions(event, messageId, element) {
            event.preventDefault();
            event.stopPropagation();
            
            const menu = document.getElementById('messageActionsMenu');
            selectedMessageId = messageId;
            selectedMessageElement = element;
            
            menu.style.display = 'block';
            menu.style.left = `${event.pageX - 60}px`;
            menu.style.top = `${event.pageY - 20}px`;
            
            // Hide menu when clicking elsewhere
            setTimeout(() => {
                document.addEventListener('click', hideMessageActions);
            }, 100);
        }
        
        async function editMessage() {
            if (!selectedMessageId) return;
            const newMessage = prompt('Edit your message:');
            if (newMessage && newMessage.trim()) {
                socket.emit('edit-private-message', {
                    messageId: selectedMessageId,
                    newMessage: newMessage.trim(),
                    userId: currentUser.id,
                    chatId: currentChatId
                });
            }
            hideMessageActions();
        }
        
        async function deleteMessage() {
            if (!selectedMessageId) return;
            if (confirm('Delete this message?')) {
                socket.emit('delete-private-message', {
                    messageId: selectedMessageId,
                    userId: currentUser.id,
                    chatId: currentChatId
                });
            }
            hideMessageActions();
        }
        
        function addMessageToChat(msg, isOwn = false) {
            const container = document.getElementById('messagesContainer');
            
            if (container.querySelector('.loading-messages')) {
                container.innerHTML = '';
            }
            
            const time = formatTime(msg.created_at);
            const senderName = isOwn ? 'You' : getFirstName(msg.sender_name || friendDisplayName);
            const initial = getInitials(senderName);
            const isCurrentUser = isOwn || (currentUser && msg.sender_id === currentUser.id);
            const editedBadge = msg.is_edited ? '<span class="edited-badge">(edited)</span>' : '';
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isCurrentUser ? 'message-own' : ''}`;
            messageDiv.dataset.messageId = msg.id;
            messageDiv.dataset.userId = msg.sender_id;
            
            messageDiv.innerHTML = `
                <div class="message-avatar">${escapeHtml(initial)}</div>
                <div class="message-bubble">
                    ${!isCurrentUser ? `<div class="message-sender">${escapeHtml(senderName)}</div>` : ''}
                    <div class="message-text">${escapeHtml(msg.message)}</div>
                    <div class="message-time">${time} ${editedBadge}</div>
                </div>
            `;
            
            // Add long press / right-click menu for own messages
            if (isCurrentUser) {
                messageDiv.addEventListener('contextmenu', (e) => {
                    showMessageActions(e, msg.id, messageDiv);
                });
                // For mobile touch
                let touchTimer;
                messageDiv.addEventListener('touchstart', (e) => {
                    touchTimer = setTimeout(() => {
                        showMessageActions(e, msg.id, messageDiv);
                    }, 500);
                });
                messageDiv.addEventListener('touchend', () => clearTimeout(touchTimer));
                messageDiv.addEventListener('touchmove', () => clearTimeout(touchTimer));
            }
            
            container.appendChild(messageDiv);
            scrollToBottom();
        }
        
        function updateMessageInChat(messageId, newMessage) {
            const messageDiv = document.querySelector(`.message[data-message-id="${messageId}"]`);
            if (messageDiv) {
                const textSpan = messageDiv.querySelector('.message-text');
                const timeSpan = messageDiv.querySelector('.message-time');
                if (textSpan) textSpan.textContent = escapeHtml(newMessage);
                if (timeSpan && !timeSpan.querySelector('.edited-badge')) {
                    timeSpan.innerHTML += '<span class="edited-badge">(edited)</span>';
                }
            }
        }
        
        function removeMessageFromChat(messageId) {
            const messageDiv = document.querySelector(`.message[data-message-id="${messageId}"]`);
            if (messageDiv) messageDiv.remove();
        }
        
        function renderMessages(messages) {
            const container = document.getElementById('messagesContainer');
            if (!messages || messages.length === 0) {
                container.innerHTML = '<div class="loading-messages">✨ No messages yet. Say hi to your friend!</div>';
                return;
            }
            
            container.innerHTML = '';
            messages.forEach(msg => {
                const isOwn = currentUser && msg.sender_id === currentUser.id;
                addMessageToChat(msg, isOwn);
            });
            scrollToBottom();
        }
        
        function scrollToBottom() {
            const container = document.getElementById('messagesContainer');
            setTimeout(() => {
                container.scrollTop = container.scrollHeight;
            }, 100);
        }
        
        function showTypingIndicator(isTyping) {
            const indicator = document.getElementById('typingIndicator');
            indicator.style.display = isTyping ? 'flex' : 'none';
        }
        
        async function init() {
            if (!tg?.initData) {
                showNotification('Please open from Telegram', true);
                document.getElementById('friendStatus').textContent = 'Error';
                return;
            }
            
            if (!friendUserId) {
                showNotification('Invalid user', true);
                return;
            }
            
            try {
                const userRes = await fetch('/api/user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ initData: tg.initData })
                });
                currentUser = await userRes.json();
                currentChatId = [currentUser.id, parseInt(friendUserId)].sort().join('-');
                
                console.log('Current user:', currentUser.id);
                console.log('Friend ID:', friendUserId);
                console.log('Chat ID:', currentChatId);
                
                connectWebSocket();
                
                const historyRes = await fetch('/api/private/messages/history', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ initData: tg.initData, friendId: parseInt(friendUserId) })
                });
                const historyData = await historyRes.json();
                if (historyData.messages) {
                    renderMessages(historyData.messages);
                }
                
            } catch (err) {
                console.error('Init error:', err);
                showNotification('Failed to load chat: ' + err.message, true);
                document.getElementById('friendStatus').textContent = 'Error loading';
            }
        }
        
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const socketUrl = `${protocol}//${window.location.host}`;
            
            console.log('Connecting to WebSocket:', socketUrl);
            
            socket = io(socketUrl, {
                auth: { initData: tg.initData },
                transports: ['websocket'],
                reconnection: true,
                reconnectionAttempts: 10,
                reconnectionDelay: 1000
            });
            
            socket.on('connect', () => {
                console.log('WebSocket connected');
                document.getElementById('friendStatus').textContent = 'Connected';
                isConnected = true;
                
                socket.emit('join-private', {
                    chatId: currentChatId,
                    userId: currentUser.id,
                    friendId: parseInt(friendUserId),
                    firstName: currentUser.first_name || 'User'
                });
            });
            
            socket.on('private-message', (message) => {
                console.log('Private message received:', message);
                const isOwn = message.sender_id === currentUser.id;
                addMessageToChat(message, isOwn);
                
                if (!isOwn) {
                    fetch('/api/private/messages/mark-read', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ initData: tg.initData, messageId: message.id })
                    }).catch(e => console.log('Mark read error:', e));
                }
            });
            
            socket.on('private-message-edited', (data) => {
                updateMessageInChat(data.messageId, data.newMessage);
            });
            
            socket.on('private-message-deleted', (data) => {
                removeMessageFromChat(data.messageId);
            });
            
            socket.on('user-typing-private', (data) => {
                if (data.userId !== currentUser.id) {
                    showTypingIndicator(data.isTyping);
                }
            });
            
            socket.on('disconnect', () => {
                console.log('WebSocket disconnected');
                document.getElementById('friendStatus').textContent = 'Reconnecting...';
                isConnected = false;
            });
            
            socket.on('connect_error', (err) => {
                console.error('WebSocket connection error:', err);
                document.getElementById('friendStatus').textContent = 'Connection error';
                showNotification('Connection error. Retrying...', true);
            });
        }
        
        function sendMessage() {
            if (!isConnected) {
                showNotification('Not connected. Please wait...', true);
                return;
            }
            
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;
            
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            
            socket.emit('send-private-message', {
                chatId: currentChatId,
                receiverId: parseInt(friendUserId),
                message: message,
                senderId: currentUser.id,
                senderName: currentUser.first_name || 'User'
            });
            
            input.value = '';
            
            setTimeout(() => {
                sendBtn.disabled = false;
            }, 500);
        }
        
        function handleTyping() {
            if (!isConnected) return;
            
            if (typingTimeout) clearTimeout(typingTimeout);
            
            socket.emit('typing-private', {
                chatId: currentChatId,
                userId: currentUser.id,
                isTyping: true
            });
            
            typingTimeout = setTimeout(() => {
                socket.emit('typing-private', {
                    chatId: currentChatId,
                    userId: currentUser.id,
                    isTyping: false
                });
            }, 1000);
        }
        
        // Hide menu on scroll
        document.getElementById('messagesContainer').addEventListener('scroll', hideMessageActions);
        
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        document.getElementById('messageInput').addEventListener('input', handleTyping);
        document.getElementById('editMessageBtn').addEventListener('click', editMessage);
        document.getElementById('deleteMessageBtn').addEventListener('click', deleteMessage);
        
        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        body { background: #1a1a2e; color: white; font-family: system-ui; padding: 20px; }
        table { width: 100%; border-collapse: collapse; background: #252836; border-radius: 16px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        th { background: #6a11cb; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #6a11cb; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-card { background: #252836; padding: 20px; border-radius: 16px; flex: 1; text-align: center; }
        .stat-number { font-size: 32px; font-weight: bold; color: #00c853; }
        input, select { padding: 8px; margin: 5px; border-radius: 8px; border: none; }
        button { background: #6a11cb; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        .refresh-btn { background: #00c853; margin-bottom: 20px; }
        .tier-Fresher { color: #4CAF50; }
        .tier-Brute { color: #2196F3; }
        .tier-Silver { color: #9E9E9E; }
        .tier-Gold { color: #FFD700; }
        .tier-Platinum { color: #E0E0E0; }
        .search-box { margin-bottom: 20px; }
        .search-box input { width: 300px; padding: 10px; background: #252836; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>👑 YzemanBot Admin Dashboard</h1>
        
        <div class="stats" id="stats">
            <div class="stat-card"><div class="stat-number" id="totalUsers">-</div><div>Total Users</div></div>
            <div class="stat-card"><div class="stat-number" id="totalPoints">-</div><div>Total Points</div></div>
            <div class="stat-card"><div class="stat-number" id="totalReferrals">-</div><div>Total Referrals</div></div>
        </div>
        
        <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search by username, name, or ID..." onkeyup="filterUsers()">
        </div>
        
        <div style="overflow-x: auto;">
            <table id="usersTable">
                <thead>
                    <tr>
                        <th>ID</th><th>Username</th><th>Name</th><th>Tier</th><th>Points</th><th>Referrals</th><th>Wallet</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let allUsers = [];
        
        async function loadData() {
            const password = prompt('Enter admin password:');
            if (password !== 'admin123') {
                alert('Wrong password!');
                return;
            }
            
            try {
                const response = await fetch('/api/admin/users', {
                    headers: { 'Authorization': 'Bearer admin123' }
                });
                if (response.ok) {
                    allUsers = await response.json();
                    displayUsers();
                    updateStats();
                } else {
                    alert('Failed to load users');
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }
        
        function updateStats() {
            const totalPoints = allUsers.reduce((sum, u) => sum + (u.points || 0), 0);
            const totalReferrals = allUsers.reduce((sum, u) => sum + (u.referrals || 0), 0);
            document.getElementById('totalUsers').textContent = allUsers.length;
            document.getElementById('totalPoints').textContent = (totalPoints / 1000000).toFixed(1) + 'M';
            document.getElementById('totalReferrals').textContent = totalReferrals;
        }
        
        function displayUsers() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allUsers.filter(u => 
                (u.username && u.username.toLowerCase().includes(searchTerm)) ||
                (u.first_name && u.first_name.toLowerCase().includes(searchTerm)) ||
                (u.telegram_id && u.telegram_id.toString().includes(searchTerm))
            );
            
            const tbody = document.getElementById('usersBody');
            tbody.innerHTML = filtered.map(user => `
                <tr>
                    <td>${user.id}</td>
                    <td>${user.username ? '@' + user.username : '-'}</td>
                    <td>${user.first_name || ''} ${user.last_name || ''}</td>
                    <td class="tier-${user.tier}">${user.tier || 'Fresher'}</td>
                    <td>${(user.points || 0).toLocaleString()}</td>
                    <td>${user.referrals || 0}</td>
                    <td><small>${user.wallet_address ? user.wallet_address.substring(0, 15) + '...' : '-'}</small></td>
                    <td>
                        <button onclick="addPoints(${user.id})">➕ Add Points</button>
                    </td>
                </tr>
            `).join('');
        }
        
        function filterUsers() { displayUsers(); }
        
        async function addPoints(userId) {
            const amount = prompt('Enter points to add:');
            if (!amount || isNaN(amount)) return;
            
            try {
                const response = await fetch('/api/admin/add-points', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer admin123'
                    },
                    body: JSON.stringify({ userId, points: parseInt(amount) })
                });
                if (response.ok) {
                    alert(`Added ${parseInt(amount).toLocaleString()} points!`);
                    loadData();
                } else {
                    alert('Failed to add points');
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }
        
        loadData();
        setInterval(loadData, 30000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Teams - YzemanBot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6a11cb;
            --secondary: #2575fc;
            --success: #00c853;
            --warning: #ffab00;
            --dark: #1a1b25;
            --darker: #12131a;
            --gray: #6c757d;
            --card-bg: #252836;
            --card-border: #2d3343;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: linear-gradient(135deg, var(--darker), var(--dark)); color: var(--light); min-height: 100vh; padding: 20px; padding-bottom: 80px; }
        .container { max-width: 500px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 28px; background: linear-gradient(to right, #ff9a9e, #fad0c4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tabs { display: flex; background: var(--card-bg); border-radius: 16px; margin-bottom: 20px; border: 1px solid var(--card-border); }
        .tab { flex: 1; padding: 14px; text-align: center; font-weight: 600; cursor: pointer; border-bottom: 3px solid transparent; font-size: 13px; }
        .tab.active { border-bottom: 3px solid var(--secondary); background: rgba(37, 117, 252, 0.1); }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .team-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .team-name { font-size: 22px; font-weight: bold; margin-bottom: 10px; }
        .team-code { background: rgba(37, 117, 252, 0.1); padding: 10px; border-radius: 12px; font-family: monospace; text-align: center; margin: 15px 0; }
        .member-list { margin-top: 15px; max-height: 300px; overflow-y: auto; }
        .member-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--card-border); }
        .leader-badge { color: var(--warning); font-size: 12px; }
        .join-form { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .join-input { width: 100%; padding: 12px; background: var(--darker); border: none; border-radius: 12px; color: var(--light); margin-bottom: 10px; }
        .create-form { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .btn { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; border: none; border-radius: 12px; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; }
        .btn-success { background: linear-gradient(45deg, #00c853, #64dd17); }
        .leaderboard-list { background: var(--card-bg); border-radius: 16px; border: 1px solid var(--card-border); overflow: hidden; }
        .leaderboard-item { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid var(--card-border); gap: 12px; }
        .rank { width: 40px; font-weight: bold; }
        .rank-1 { color: #FFD700; }
        .rank-2 { color: #C0C0C0; }
        .rank-3 { color: #CD7F32; }
        .loading { text-align: center; padding: 40px; color: var(--gray); }
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; background: var(--card-bg); border-top: 1px solid var(--card-border);
            display: flex; justify-content: space-around; padding: 12px 16px; z-index: 100;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--gray); text-decoration: none; font-size: 10px; padding: 8px 12px; border-radius: 12px; }
        .nav-item i { font-size: 20px; }
        .nav-item.active { color: var(--secondary); background: rgba(37, 117, 252, 0.1); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-users"></i> Teams</h1>
            <p style="color: var(--gray); font-size: 13px; margin-top: 5px;">Join a team and compete monthly!</p>
        </div>

        <div class="tabs">
            <div class="tab active" data-tab="myteam">👥 My Team</div>
            <div class="tab" data-tab="leaderboard">🏆 Team Leaderboard</div>
            <div class="tab" data-tab="monthly">📅 Monthly Competition</div>
        </div>

        <div id="myteamTab" class="tab-content active">
            <div id="myTeamInfo">
                <div class="loading">Loading your team...</div>
            </div>
            <div class="join-form" id="joinForm">
                <h3 style="margin-bottom: 15px;">Join a Team</h3>
                <input type="text" class="join-input" id="teamCodeInput" placeholder="Enter Team Code">
                <button class="btn" id="joinTeamBtn">Join Team</button>
            </div>
            <div class="create-form" id="createForm">
                <h3 style="margin-bottom: 15px;">Create a Team</h3>
                <input type="text" class="join-input" id="teamNameInput" placeholder="Team Name">
                <button class="btn btn-success" id="createTeamBtn">Create Team</button>
            </div>
        </div>

        <div id="leaderboardTab" class="tab-content">
            <div class="leaderboard-list" id="teamLeaderboardList">
                <div class="loading">Loading team leaderboard...</div>
            </div>
        </div>

        <div id="monthlyTab" class="tab-content">
            <div class="team-card" id="monthlyInfo">
                <div class="loading">Loading monthly competition...</div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="leaderboard.html" class="nav-item"><i class="fas fa-trophy"></i><span>Leaderboard</span></a>
        <a href="achievements.html" class="nav-item"><i class="fas fa-medal"></i><span>Achievements</span></a>
        <a href="tournament.html" class="nav-item"><i class="fas fa-fist-raised"></i><span>Tournament</span></a>
        <a href="team.html" class="nav-item active"><i class="fas fa-users"></i><span>Teams</span></a>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.expand(); tg.ready(); }

        async function apiCall(endpoint, data = null) {
            const options = { method: data ? 'POST' : 'GET', headers: { 'Content-Type': 'application/json' } };
            if (data) options.body = JSON.stringify(data);
            const response = await fetch(endpoint, options);
            if (!response.ok) throw new Error(await response.text());
            return response.json();
        }

        function showNotification(msg, isError = false) {
            const notif = document.createElement('div');
            notif.textContent = msg;
            notif.style.cssText = `position:fixed;top:20px;left:50%;transform:translateX(-50%);background:${isError ? '#ff5252' : '#00c853'};color:white;padding:12px 24px;border-radius:12px;z-index:1001;font-size:14px;`;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        async function loadMyTeam() {
            try {
                const data = await apiCall('/api/team/info', { initData: tg.initData });
                const container = document.getElementById('myTeamInfo');
                
                if (!data.has_team) {
                    container.innerHTML = '<div class="team-card"><p style="text-align:center;">You are not in a team yet! Join or create one below.</p></div>';
                    return;
                }
                
                container.innerHTML = `
                    <div class="team-card">
                        <div class="team-name">${data.team.name}</div>
                        <div class="team-code">Team Code: <strong>${data.team.code}</strong> <button class="copy-btn" onclick="copyCode('${data.team.code}')" style="background:none;border:none;color:var(--secondary);cursor:pointer;">📋 Copy</button></div>
                        <div>👑 Leader: ${data.team.leader_name || 'You'}</div>
                        <div>👥 Members: ${data.team.member_count}</div>
                        <div>💰 Total Points: ${(data.team.total_points || 0).toLocaleString()}</div>
                        <div>📊 Total Referrals: ${data.team.total_referrals || 0}</div>
                        <div class="member-list"><strong>Members:</strong> ${data.members.map(m => `<div class="member-item"><span>${m.first_name || m.username || 'User'} ${m.is_leader ? '<span class="leader-badge">👑 Leader</span>' : ''}</span><span>${(m.points || 0).toLocaleString()} pts</span></div>`).join('')}</div>
                    </div>
                `;
            } catch (err) {
                console.error(err);
            }
        }

        async function loadTeamLeaderboard() {
            try {
                const data = await apiCall('/api/team/leaderboard', { initData: tg.initData });
                const container = document.getElementById('teamLeaderboardList');
                if (!data.length) { container.innerHTML = '<div class="loading">No teams yet</div>'; return; }
                container.innerHTML = data.map((team, idx) => `
                    <div class="leaderboard-item">
                        <div class="rank ${idx === 0 ? 'rank-1' : idx === 1 ? 'rank-2' : idx === 2 ? 'rank-3' : ''}">#${idx + 1}</div>
                        <div class="info" style="flex:1;">
                            <div class="name">${team.name}</div>
                            <div class="username">Leader: ${team.leader_name || 'Unknown'} | ${team.member_count} members</div>
                        </div>
                        <div class="score">${(team.total_points || 0).toLocaleString()} pts</div>
                    </div>
                `).join('');
            } catch (err) { console.error(err); }
        }

        async function loadMonthlyCompetition() {
            try {
                const data = await apiCall('/api/team/monthly-competition', { initData: tg.initData });
                const container = document.getElementById('monthlyInfo');
                if (!data.standings.length) {
                    container.innerHTML = '<div class="team-card"><p style="text-align:center;">No teams competing this month</p></div>';
                    return;
                }
                container.innerHTML = `
                    <div class="team-card">
                        <h3>${data.month} Competition</h3>
                        ${data.standings.map((team, idx) => `
                            <div class="member-item">
                                <span><strong>#${idx + 1}</strong> ${team.name}</span>
                                <span>${(team.team_points || 0).toLocaleString()} pts</span>
                            </div>
                        `).join('')}
                    </div>
                `;
            } catch (err) { console.error(err); }
        }

        async function createTeam() {
            const teamName = document.getElementById('teamNameInput').value.trim();
            if (!teamName) { showNotification('Enter a team name', true); return; }
            try {
                const result = await apiCall('/api/team/create', { initData: tg.initData, teamName });
                showNotification(`Team "${teamName}" created! Code: ${result.team.code}`);
                document.getElementById('teamNameInput').value = '';
                loadMyTeam();
            } catch (err) { showNotification(err.message, true); }
        }

        async function joinTeam() {
            const teamCode = document.getElementById('teamCodeInput').value.trim().toUpperCase();
            if (!teamCode) { showNotification('Enter a team code', true); return; }
            try {
                await apiCall('/api/team/join', { initData: tg.initData, teamCode });
                showNotification('Joined team successfully!');
                document.getElementById('teamCodeInput').value = '';
                loadMyTeam();
            } catch (err) { showNotification(err.message, true); }
        }

        window.copyCode = (code) => {
            navigator.clipboard.writeText(code);
            showNotification('Team code copied!');
        };

        document.getElementById('joinTeamBtn')?.addEventListener('click', joinTeam);
        document.getElementById('createTeamBtn')?.addEventListener('click', createTeam);

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab + 'Tab').classList.add('active');
                if (tab.dataset.tab === 'leaderboard') loadTeamLeaderboard();
                if (tab.dataset.tab === 'monthly') loadMonthlyCompetition();
            });
        });

        loadMyTeam();
        loadTeamLeaderboard();
        loadMonthlyCompetition();
    </script>
</body>
</html>

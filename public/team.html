<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teams - YzemanBot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #4CAF50;
            --secondary: #2196F3;
            --danger: #f44336;
            --dark: #1a1a2e;
            --darker: #16213e;
            --light: #ffffff;
            --gray: #888888;
            --gold: #FFD700;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--dark);
            color: var(--light);
            min-height: 100vh;
            padding-bottom: 75px;
        }
        
        .header {
            background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 100%);
            padding: 18px 15px 18px;
            border-radius: 0 0 25px 25px;
            text-align: center;
            position: relative;
        }
        
        .header h1 { font-size: 22px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .header h1 i { color: var(--gold); }
        .header p { color: var(--gray); font-size: 12px; }
        
        .back-btn-header {
            position: absolute; top: 18px; left: 18px;
            color: white; font-size: 20px; text-decoration: none; z-index: 10;
        }
        
        /* Tabs */
        .tabs {
            display: flex; background: var(--darker); padding: 3px;
            border-radius: 30px; margin: 12px 12px;
        }
        
        .tab {
            flex: 1; text-align: center; padding: 12px 5px; border-radius: 25px;
            font-size: 13px; font-weight: 600; color: var(--gray); cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        
        .tab i { font-size: 14px; }
        .tab.active { background: var(--primary); color: white; }
        .tab-content { display: none; padding: 0 12px; }
        .tab-content.active { display: block; }
        
        /* No Team Card */
        .no-team-card {
            background: var(--darker); border-radius: 15px; padding: 25px 15px;
            text-align: center; margin-bottom: 15px;
        }
        
        .no-team-icon { font-size: 50px; color: var(--gray); margin-bottom: 15px; }
        .no-team-title { font-size: 18px; font-weight: 600; margin-bottom: 5px; }
        .no-team-text { color: var(--gray); font-size: 13px; margin-bottom: 20px; }
        
        .action-buttons {
            display: flex; gap: 12px; justify-content: center;
        }
        
        .action-btn {
            flex: 1; max-width: 140px; background: var(--primary); color: white;
            border: none; padding: 14px 10px; border-radius: 12px; font-size: 13px;
            font-weight: 600; cursor: pointer; display: flex; flex-direction: column;
            align-items: center; gap: 6px; transition: all 0.2s ease;
        }
        
        .action-btn i { font-size: 22px; }
        .action-btn.secondary { background: var(--secondary); }
        
        /* Team Card */
        .team-card {
            background: var(--darker); border-radius: 14px; padding: 15px; margin-bottom: 10px;
        }
        
        .team-header {
            display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
        }
        
        .team-avatar {
            width: 45px; height: 45px; border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: white;
        }
        
        .team-info { flex: 1; }
        .team-name { font-size: 16px; font-weight: 600; margin-bottom: 3px; }
        .team-meta { font-size: 11px; color: var(--gray); }
        
        .team-stats {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
            margin-bottom: 12px;
        }
        
        .team-stat {
            background: rgba(255,255,255,0.05); border-radius: 8px;
            padding: 8px 4px; text-align: center;
        }
        
        .team-stat-value { font-size: 14px; font-weight: bold; color: var(--gold); }
        .team-stat-label { font-size: 9px; color: var(--gray); }
        
        .member-list {
            margin-top: 12px; padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
            max-height: 200px; overflow-y: auto;
        }
        
        .member-item {
            display: flex; align-items: center; padding: 6px 0;
        }
        
        .member-avatar {
            width: 30px; height: 30px; border-radius: 50%; background: var(--primary);
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; margin-right: 10px; color: white;
            overflow: hidden;
        }
        
        .member-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .member-info { flex: 1; }
        .member-name { font-size: 13px; font-weight: 500; }
        .member-coins { font-weight: bold; color: var(--gold); font-size: 12px; }
        
        .leader-badge {
            background: var(--gold); color: var(--dark); padding: 1px 5px;
            border-radius: 10px; font-size: 8px; margin-left: 5px;
        }
        
        .leave-btn {
            background: transparent; border: 1px solid var(--danger);
            color: var(--danger); padding: 8px; border-radius: 8px;
            font-size: 12px; cursor: pointer; width: 100%; margin-top: 10px;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        
        /* Available Teams List */
        .teams-list {
            max-height: 350px; overflow-y: auto;
        }
        
        .available-team-item {
            display: flex; align-items: center; padding: 12px;
            background: var(--darker); border-radius: 12px; margin-bottom: 8px;
            cursor: pointer;
        }
        
        .available-team-item:hover { background: #1e2a4a; }
        
        /* Leaderboard */
        .leaderboard-list {
            max-height: 400px; overflow-y: auto;
        }
        
        .leaderboard-item {
            display: flex; align-items: center; padding: 12px;
            background: var(--darker); border-radius: 12px; margin-bottom: 8px;
        }
        
        .rank {
            width: 35px; height: 35px; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 13px; margin-right: 12px; border-radius: 8px;
            background: rgba(255,255,255,0.05);
        }
        
        .rank-1 { background: linear-gradient(135deg, #FFD700, #FFA000); color: var(--dark); }
        .rank-2 { background: linear-gradient(135deg, #C0C0C0, #A0A0A0); color: var(--dark); }
        .rank-3 { background: linear-gradient(135deg, #CD7F32, #B87333); color: var(--dark); }
        
        /* Modal */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000;
            align-items: center; justify-content: center;
        }
        
        .modal-content {
            background: var(--darker); border-radius: 18px; padding: 20px;
            width: 90%; max-width: 320px;
        }
        
        .modal-title {
            font-size: 18px; font-weight: bold; margin-bottom: 18px;
            display: flex; align-items: center; gap: 8px;
        }
        
        .modal-input {
            width: 100%; padding: 12px; border-radius: 10px;
            border: 1px solid var(--gray); background: rgba(0,0,0,0.3);
            color: white; font-size: 14px; margin-bottom: 18px;
        }
        
        .modal-actions {
            display: flex; gap: 8px;
        }
        
        .modal-btn {
            flex: 1; padding: 12px; border-radius: 10px; border: none;
            font-size: 14px; font-weight: 600; cursor: pointer;
        }
        
        .modal-btn.primary { background: var(--primary); color: white; }
        .modal-btn.secondary { background: var(--gray); color: white; }
        .modal-btn.danger { background: var(--danger); color: white; }
        
        .loading { text-align: center; padding: 30px; color: var(--gray); }
        .empty-state { text-align: center; padding: 30px; color: var(--gray); }
        
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--darker); display: flex; padding: 6px 12px;
            border-top: 1px solid rgba(255,255,255,0.1); z-index: 100;
        }
        
        .nav-item {
            flex: 1; text-align: center; color: var(--gray); text-decoration: none;
            font-size: 10px; padding: 4px; border-radius: 6px;
            display: flex; flex-direction: column; align-items: center; gap: 1px;
        }
        
        .nav-item i { font-size: 18px; }
        .nav-item.active { color: var(--primary); background: rgba(76, 175, 80, 0.1); }
        
        .notification {
            position: fixed; bottom: 70px; left: 12px; right: 12px;
            background: #00c853; color: white; padding: 10px 15px;
            border-radius: 8px; text-align: center;
            display: none; z-index: 1000; font-size: 12px;
        }
        
        .notification.error { background: var(--danger); }
    </style>
</head>
<body>
    <a href="/" class="back-btn-header"><i class="fas fa-arrow-left"></i></a>
    
    <div class="header">
        <h1><i class="fas fa-users"></i> Teams</h1>
        <p>Join a team to earn together!</p>
    </div>
    
    <!-- Tabs -->
    <div class="tabs">
        <div class="tab active" data-tab="myteam"><i class="fas fa-user-group"></i> My Team</div>
        <div class="tab" data-tab="leaderboard"><i class="fas fa-trophy"></i> Leaderboard</div>
    </div>
    
    <!-- My Team Tab -->
    <div class="tab-content active" id="myteamTab">
        <div id="myTeamContent"><div class="loading">Loading...</div></div>
    </div>
    
    <!-- Leaderboard Tab -->
    <div class="tab-content" id="leaderboardTab">
        <div class="leaderboard-list" id="teamLeaderboardList">
            <div class="loading">Loading rankings...</div>
        </div>
    </div>
    
    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="/" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="/daily.html" class="nav-item"><i class="fas fa-calendar-check"></i><span>Daily</span></a>
        <a href="/wheel.html" class="nav-item"><i class="fas fa-dharmachakra"></i><span>Wheel</span></a>
        <a href="/leaderboard.html" class="nav-item"><i class="fas fa-trophy"></i><span>Ranks</span></a>
        <a href="/team.html" class="nav-item active"><i class="fas fa-users"></i><span>Teams</span></a>
    </div>
    
    <!-- Create Team Modal -->
    <div class="modal" id="createTeamModal">
        <div class="modal-content">
            <div class="modal-title"><i class="fas fa-plus-circle"></i> Create Team</div>
            <input type="text" class="modal-input" id="teamNameInput" placeholder="Enter team name" maxlength="30">
            <div class="modal-actions">
                <button class="modal-btn secondary" onclick="closeCreateModal()">Cancel</button>
                <button class="modal-btn primary" onclick="createTeam()">Create</button>
            </div>
        </div>
    </div>
    
    <!-- Join Team Modal -->
    <div class="modal" id="joinTeamModal">
        <div class="modal-content">
            <div class="modal-title"><i class="fas fa-sign-in-alt"></i> Join Team</div>
            <div style="margin-bottom: 15px; color: var(--gray); font-size: 13px;">Select a team to join:</div>
            <div class="teams-list" id="modalTeamsList" style="max-height: 300px;">
                <div class="loading">Loading teams...</div>
            </div>
            <div class="modal-actions" style="margin-top: 15px;">
                <button class="modal-btn secondary" onclick="closeJoinModal()">Cancel</button>
            </div>
        </div>
    </div>
    
    <!-- Leave Team Modal -->
    <div class="modal" id="leaveTeamModal">
        <div class="modal-content">
            <div class="modal-title"><i class="fas fa-sign-out-alt"></i> Leave Team</div>
            <p style="margin-bottom: 18px; color: var(--gray);">Are you sure you want to leave this team?</p>
            <div class="modal-actions">
                <button class="modal-btn secondary" onclick="closeLeaveModal()">Cancel</button>
                <button class="modal-btn danger" onclick="confirmLeaveTeam()">Leave</button>
            </div>
        </div>
    </div>
    
    <div class="notification" id="notification"></div>
    
    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }
        
        const POINTS_PER_COIN = 1000000;
        
        function showNotification(msg, isError = false) {
            const notif = document.getElementById('notification');
            notif.textContent = msg;
            notif.className = 'notification' + (isError ? ' error' : '');
            notif.style.display = 'block';
            setTimeout(() => notif.style.display = 'none', 3000);
        }
        
        async function apiCall(endpoint, data = null) {
            if (!tg?.initData) throw new Error('Not in Telegram');
            
            const options = {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data ? { ...data, initData: tg.initData } : { initData: tg.initData })
            };
            
            const response = await fetch(endpoint, options);
            const text = await response.text();
            try { return JSON.parse(text); } 
            catch (e) { throw new Error(text || 'Invalid response'); }
        }
        
        // Modals
        function openCreateModal() { document.getElementById('createTeamModal').style.display = 'flex'; }
        function closeCreateModal() { document.getElementById('createTeamModal').style.display = 'none'; }
        function openJoinModal() { 
            document.getElementById('joinTeamModal').style.display = 'flex';
            loadModalTeams();
        }
        function closeJoinModal() { document.getElementById('joinTeamModal').style.display = 'none'; }
        function openLeaveModal() { document.getElementById('leaveTeamModal').style.display = 'flex'; }
        function closeLeaveModal() { document.getElementById('leaveTeamModal').style.display = 'none'; }
        
        // Create Team
        async function createTeam() {
            const name = document.getElementById('teamNameInput').value.trim();
            if (!name) { showNotification('Enter team name', true); return; }
            if (name.length < 3) { showNotification('Team name must be at least 3 characters', true); return; }
            
            try {
                await apiCall('/api/team2/create', { teamName: name });
                showNotification(`Team "${name}" created!`);
                closeCreateModal();
                document.getElementById('teamNameInput').value = '';
                loadAllData();
            } catch (err) {
                showNotification(err.message || 'Failed to create team', true);
            }
        }
        
        // Join Team
        async function joinTeam(teamId, teamName) {
            try {
                await apiCall('/api/team2/join', { teamId: teamId });
                showNotification(`Joined ${teamName}!`);
                closeJoinModal();
                loadAllData();
            } catch (err) {
                showNotification(err.message || 'Failed to join team', true);
            }
        }
        
        // Leave Team
        async function confirmLeaveTeam() {
            try {
                await apiCall('/api/team2/leave');
                showNotification('Left team');
                closeLeaveModal();
                loadAllData();
            } catch (err) {
                showNotification(err.message || 'Failed to leave', true);
            }
        }
        
        // Load teams for modal
        async function loadModalTeams() {
            const container = document.getElementById('modalTeamsList');
            try {
                const data = await apiCall('/api/team2/available');
                if (!data || data.length === 0) {
                    container.innerHTML = '<div class="empty-state">No teams available. Create one!</div>';
                    return;
                }
                
                container.innerHTML = data.map(team => {
                    const totalCoins = ((team.total_points || 0) / POINTS_PER_COIN).toFixed(1);
                    return `
                        <div class="available-team-item" onclick="joinTeam(${team.id}, '${team.name.replace(/'/g, "\\'")}')">
                            <div class="team-avatar" style="width:35px;height:35px;font-size:16px;margin-right:10px;">
                                <i class="fas fa-users"></i>
                            </div>
                            <div style="flex:1;">
                                <div style="font-weight:600;font-size:13px;">${team.name}</div>
                                <div style="font-size:10px;color:var(--gray);">
                                    <i class="fas fa-user"></i> ${team.member_count} • ${totalCoins} COINS
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                container.innerHTML = '<div class="empty-state">Failed to load teams</div>';
            }
        }
        
        // Render My Team
        function renderMyTeam(data) {
            const container = document.getElementById('myTeamContent');
            
            if (!data || !data.has_team) {
                container.innerHTML = `
                    <div class="no-team-card">
                        <div class="no-team-icon"><i class="fas fa-users-slash"></i></div>
                        <div class="no-team-title">No Team Yet</div>
                        <div class="no-team-text">Join an existing team or create your own!</div>
                        <div class="action-buttons">
                            <button class="action-btn secondary" onclick="openJoinModal()"><i class="fas fa-sign-in-alt"></i><span>Join Team</span></button>
                            <button class="action-btn" onclick="openCreateModal()"><i class="fas fa-plus"></i><span>Create Team</span></button>
                        </div>
                    </div>
                `;
                return;
            }
            
            const team = data.team;
            const members = data.members;
            const isLeader = data.is_leader;
            const totalCoins = ((team.total_points || 0) / POINTS_PER_COIN).toFixed(1);
            
            container.innerHTML = `
                <div class="team-card">
                    <div class="team-header">
                        <div class="team-avatar"><i class="fas fa-users"></i></div>
                        <div class="team-info">
                            <div class="team-name">${team.name}</div>
                            <div class="team-meta">Created ${new Date(team.created_at).toLocaleDateString()}</div>
                        </div>
                        ${isLeader ? '<span style="background:var(--gold);color:var(--dark);padding:3px 8px;border-radius:12px;font-size:10px;"><i class="fas fa-crown"></i> Leader</span>' : ''}
                    </div>
                    
                    <div class="team-stats">
                        <div class="team-stat">
                            <div class="team-stat-value">${team.member_count}</div>
                            <div class="team-stat-label">Members</div>
                        </div>
                        <div class="team-stat">
                            <div class="team-stat-value">${totalCoins}</div>
                            <div class="team-stat-label">COINS</div>
                        </div>
                        <div class="team-stat">
                            <div class="team-stat-value">#${data.rank || '--'}</div>
                            <div class="team-stat-label">Rank</div>
                        </div>
                    </div>
                    
                    <button class="leave-btn" onclick="openLeaveModal()">
                        <i class="fas fa-sign-out-alt"></i> Leave Team
                    </button>
                    
                    <div class="member-list">
                        <div style="font-size:12px; font-weight:600; margin-bottom:8px;">
                            <i class="fas fa-user-friends"></i> Members (${members.length})
                        </div>
                        ${members.map(m => {
                            const coins = ((m.points || 0) / POINTS_PER_COIN).toFixed(1);
                            const initial = (m.first_name || m.username || 'U')[0].toUpperCase();
                            return `
                                <div class="member-item">
                                    <div class="member-avatar">${m.photo_url ? `<img src="${m.photo_url}">` : initial}</div>
                                    <div class="member-info">
                                        <div class="member-name">
                                            ${m.first_name || m.username || 'User'}
                                            ${m.is_leader ? '<span class="leader-badge"><i class="fas fa-crown"></i> Leader</span>' : ''}
                                        </div>
                                    </div>
                                    <div class="member-coins">${coins} C</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }
        
        // Render Leaderboard
        function renderLeaderboard(teams) {
            const container = document.getElementById('teamLeaderboardList');
            
            if (!teams || teams.length === 0) {
                container.innerHTML = '<div class="empty-state">No teams yet</div>';
                return;
            }
            
            container.innerHTML = teams.map((team, idx) => {
                const rank = idx + 1;
                const rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : '';
                const totalCoins = ((team.total_points || 0) / POINTS_PER_COIN).toFixed(1);
                
                return `
                    <div class="leaderboard-item">
                        <div class="rank ${rankClass}">#${rank}</div>
                        <div class="team-avatar" style="width:35px;height:35px;font-size:16px;margin-right:12px;">
                            <i class="fas fa-users"></i>
                        </div>
                        <div style="flex:1;">
                            <div style="font-weight:600;font-size:13px;">${team.name}</div>
                            <div style="font-size:10px;color:var(--gray);">
                                <i class="fas fa-user"></i> ${team.member_count} members • 
                                <i class="fas fa-crown"></i> ${team.leader_name || 'Unknown'}
                            </div>
                        </div>
                        <div style="font-weight:bold;color:var(--gold);font-size:14px;">${totalCoins} C</div>
                    </div>
                `;
            }).join('');
        }
        
        // Load functions
        async function loadMyTeam() {
            try {
                const data = await apiCall('/api/team2/my');
                renderMyTeam(data);
            } catch (err) {
                renderMyTeam({ has_team: false });
            }
        }
        
        async function loadLeaderboard() {
            try {
                const data = await apiCall('/api/team2/leaderboard');
                renderLeaderboard(data);
            } catch (err) {
                document.getElementById('teamLeaderboardList').innerHTML = '<div class="empty-state">Failed to load</div>';
            }
        }
        
        async function loadAllData() {
            await loadMyTeam();
            await loadLeaderboard();
        }
        
        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab + 'Tab').classList.add('active');
                
                if (tab.dataset.tab === 'leaderboard') loadLeaderboard();
            });
        });
        
        window.onclick = (e) => { if (e.target.classList.contains('modal')) e.target.style.display = 'none'; };
        
        document.addEventListener('DOMContentLoaded', () => {
            loadAllData();
        });
    </script>
</body>
    </html>

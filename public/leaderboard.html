<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leaderboard - YzemanBot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #4CAF50;
            --secondary: #2196F3;
            --dark: #1a1a2e;
            --darker: #16213e;
            --light: #ffffff;
            --gray: #888888;
            --gold: #FFD700;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--dark);
            color: var(--light);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        
        .header {
            background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 100%);
            padding: 20px 15px 25px;
            border-radius: 0 0 30px 30px;
            text-align: center;
            position: relative;
        }
        
        .header h1 {
            font-size: 26px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .header h1 i { color: var(--gold); }
        .header p { color: var(--gray); font-size: 14px; }
        
        .back-btn-header {
            position: absolute;
            top: 20px; left: 20px;
            color: white; font-size: 24px;
            text-decoration: none; z-index: 10;
        }
        
        /* Prize Label */
        .prize-label {
            background: linear-gradient(135deg, var(--gold) 0%, #FFA000 100%);
            color: var(--dark);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            margin-top: 12px;
        }
        
        .prize-label span {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        /* Three Buttons */
        .button-row {
            display: flex;
            gap: 10px;
            padding: 20px 15px;
        }
        
        .action-btn {
            flex: 1;
            background: var(--darker);
            color: var(--gray);
            border: none;
            padding: 14px 10px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .action-btn i { font-size: 16px; }
        
        .action-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }
        
        /* Tier Dropdown - Only visible when Tier is active */
        .tier-selector {
            padding: 0 15px 15px;
            display: none;
        }
        
        .tier-selector.show { display: block; }
        
        .tier-select-btn {
            background: var(--darker);
            color: white;
            border: 1px solid var(--gray);
            padding: 12px 20px;
            border-radius: 15px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }
        
        .tier-dropdown-menu {
            background: var(--darker);
            border: 1px solid var(--gray);
            border-radius: 15px;
            margin-top: 5px;
            display: none;
        }
        
        .tier-dropdown-menu.show { display: block; }
        
        .tier-option {
            padding: 14px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .tier-option:hover { background: rgba(255,255,255,0.1); }
        .tier-option.active { background: var(--primary); color: white; }
        
        .tier-icon {
            width: 10px; height: 10px;
            border-radius: 50%;
        }
        
        /* Leaderboard */
        .leaderboard-container {
            padding: 0 15px 20px;
        }
        
        .leaderboard-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        /* Top 3 Winners Row */
        .winners-row {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 15px;
            padding: 10px 15px 20px;
        }
        
        .winner-card {
            text-align: center;
            flex: 1;
            max-width: 100px;
        }
        
        .winner-medal {
            font-size: 40px;
            margin-bottom: 5px;
        }
        
        .winner-avatar {
            width: 60px; height: 60px;
            border-radius: 50%;
            margin: 0 auto 8px;
            border: 3px solid;
            overflow: hidden;
            background: var(--darker);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
        }
        
        .winner-1 .winner-avatar { border-color: var(--gold); width: 70px; height: 70px; }
        .winner-2 .winner-avatar { border-color: #C0C0C0; }
        .winner-3 .winner-avatar { border-color: #CD7F32; }
        
        .winner-avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .winner-name {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .winner-score {
            font-weight: bold;
            font-size: 14px;
        }
        
        .winner-1 .winner-score { color: var(--gold); }
        .winner-2 .winner-score { color: #C0C0C0; }
        .winner-3 .winner-score { color: #CD7F32; }
        
        /* List Items */
        .leaderboard-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: var(--darker);
            border-radius: 15px;
            margin-bottom: 8px;
        }
        
        .rank-badge {
            width: 35px;
            font-size: 22px;
            text-align: center;
            margin-right: 10px;
        }
        
        .avatar {
            width: 42px; height: 42px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin-right: 12px;
            color: white;
            overflow: hidden;
            font-weight: bold;
        }
        
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .info { flex: 1; }
        
        .name-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        
        .name { font-weight: 600; font-size: 14px; }
        
        .tier-badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
            color: var(--dark);
        }
        
        .tier-Fresher .tier-badge { background: #888; }
        .tier-Brute .tier-badge { background: #FF9800; }
        .tier-Silver .tier-badge { background: #C0C0C0; }
        .tier-Gold .tier-badge { background: #FFD700; }
        .tier-Platinum .tier-badge { background: #E5E4E2; }
        
        .stats-row {
            display: flex;
            gap: 15px;
            font-size: 11px;
            color: var(--gray);
        }
        
        .score {
            font-weight: bold;
            color: var(--gold);
            font-size: 15px;
            text-align: right;
            min-width: 70px;
        }
        
        .score small {
            font-size: 10px;
            color: var(--gray);
            font-weight: normal;
        }
        
        /* My Rank */
        .my-rank-card {
            background: linear-gradient(135deg, var(--secondary) 0%, #1976D2 100%);
            border-radius: 20px;
            padding: 18px 20px;
            margin: 20px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .my-rank-left { display: flex; align-items: center; gap: 15px; }
        .my-rank-icon {
            width: 50px; height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .my-rank-info h4 { font-size: 14px; color: rgba(255,255,255,0.8); margin-bottom: 5px; }
        .my-rank-value { font-size: 28px; font-weight: bold; }
        .my-rank-right { text-align: right; }
        .my-rank-coins { font-size: 22px; font-weight: bold; }
        .my-rank-label { font-size: 12px; color: rgba(255,255,255,0.7); }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--gray);
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--gray);
        }
        
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--darker); display: flex; padding: 10px 20px;
            border-top: 1px solid rgba(255,255,255,0.1); z-index: 100;
        }
        
        .nav-item {
            flex: 1; text-align: center; color: var(--gray);
            text-decoration: none; font-size: 12px; padding: 8px;
            border-radius: 10px;
        }
        
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .nav-item.active { color: var(--primary); background: rgba(76, 175, 80, 0.1); }
        
        .notification {
            position: fixed; bottom: 90px; left: 20px; right: 20px;
            background: #00c853; color: white; padding: 15px 20px;
            border-radius: 12px; text-align: center; display: none; z-index: 1000;
        }
        
        /* Tier colors for items */
        .leaderboard-item.tier-Fresher { border-left: 4px solid #888; }
        .leaderboard-item.tier-Brute { border-left: 4px solid #FF9800; }
        .leaderboard-item.tier-Silver { border-left: 4px solid #C0C0C0; }
        .leaderboard-item.tier-Gold { border-left: 4px solid #FFD700; }
        .leaderboard-item.tier-Platinum { border-left: 4px solid #E5E4E2; }
    </style>
</head>
<body>
    <a href="/" class="back-btn-header"><i class="fas fa-arrow-left"></i></a>
    
    <div class="header">
        <h1><i class="fas fa-trophy"></i> Leaderboard</h1>
        <p>Compete with others and climb the ranks!</p>
        <div class="prize-label" id="prizeLabel">
            <span><i class="fas fa-gift"></i> Monthly Prizes: 🥇500 • 🥈250 • 🥉100 COINS</span>
        </div>
    </div>
    
    <!-- Three Buttons -->
    <div class="button-row">
        <button class="action-btn active" data-view="earnings"><i class="fas fa-coins"></i> Top Earnings</button>
        <button class="action-btn" data-view="referrals"><i class="fas fa-users"></i> Top Referrals</button>
        <button class="action-btn" data-view="tier"><i class="fas fa-layer-group"></i> Tier</button>
    </div>
    
    <!-- Tier Selector (only visible when Tier is active) -->
    <div class="tier-selector" id="tierSelector">
        <button class="tier-select-btn" id="tierSelectBtn">
            <span><i class="fas fa-filter"></i> <span id="selectedTierText">All Tiers</span></span>
            <i class="fas fa-chevron-down"></i>
        </button>
        <div class="tier-dropdown-menu" id="tierDropdown">
            <div class="tier-option active" data-tier="all"><span class="tier-icon" style="background: var(--gold);"></span> All Tiers</div>
            <div class="tier-option" data-tier="Fresher"><span class="tier-icon" style="background: #888;"></span> Fresher</div>
            <div class="tier-option" data-tier="Brute"><span class="tier-icon" style="background: #FF9800;"></span> Brute</div>
            <div class="tier-option" data-tier="Silver"><span class="tier-icon" style="background: #C0C0C0;"></span> Silver</div>
            <div class="tier-option" data-tier="Gold"><span class="tier-icon" style="background: #FFD700;"></span> Gold</div>
            <div class="tier-option" data-tier="Platinum"><span class="tier-icon" style="background: #E5E4E2;"></span> Platinum</div>
        </div>
    </div>
    
    <!-- Winners Row (Top 3 - only for Earnings/Referrals) -->
    <div class="winners-row" id="winnersRow"></div>
    
    <!-- Leaderboard List -->
    <div class="leaderboard-container">
        <div class="leaderboard-list" id="leaderboardList">
            <div class="loading">Loading...</div>
        </div>
    </div>
    
    <!-- My Rank -->
    <div class="my-rank-card" id="myRankCard" style="display:none;">
        <div class="my-rank-left">
            <div class="my-rank-icon"><i class="fas fa-user"></i></div>
            <div class="my-rank-info">
                <h4>Your Rank</h4>
                <div class="my-rank-value" id="myRank">--</div>
            </div>
        </div>
        <div class="my-rank-right">
            <div class="my-rank-coins" id="myCoins">0</div>
            <div class="my-rank-label" id="myCoinsLabel">COINS</div>
        </div>
    </div>
    
    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="/" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="/daily.html" class="nav-item"><i class="fas fa-calendar-check"></i><span>Daily</span></a>
        <a href="/wheel.html" class="nav-item"><i class="fas fa-dharmachakra"></i><span>Wheel</span></a>
        <a href="/leaderboard.html" class="nav-item active"><i class="fas fa-trophy"></i><span>Ranks</span></a>
        <a href="/team.html" class="nav-item"><i class="fas fa-users"></i><span>Team</span></a>
    </div>
    
    <div class="notification" id="notification"></div>
    
    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }
        
        const POINTS_PER_COIN = 1000000;
        
        let currentView = 'earnings';
        let currentTier = 'all';
        let topEarnersData = [];
        let topReferrersData = [];
        
        function showNotification(msg) {
            const notif = document.getElementById('notification');
            notif.textContent = msg;
            notif.style.display = 'block';
            setTimeout(() => notif.style.display = 'none', 3000);
        }
        
        async function apiCall(endpoint) {
            if (!tg?.initData) throw new Error('Not in Telegram');
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ initData: tg.initData })
            });
            if (!response.ok) throw new Error(`Status ${response.status}`);
            return response.json();
        }
        
        function filterByTier(data, tier) {
            if (tier === 'all') return data;
            return data.filter(user => user.tier === tier);
        }
        
        function renderWinnersRow(data, type) {
            const container = document.getElementById('winnersRow');
            if (!data || data.length < 3) {
                container.innerHTML = '';
                return;
            }
            
            const top3 = data.slice(0, 3);
            const ordered = [top3[1], top3[0], top3[2]]; // 2nd, 1st, 3rd
            
            container.innerHTML = ordered.map((user, idx) => {
                const position = idx === 0 ? 2 : idx === 1 ? 1 : 3;
                const medal = position === 1 ? '🥇' : position === 2 ? '🥈' : '🥉';
                const initial = (user.first_name || user.username || '?')[0].toUpperCase();
                const displayName = user.first_name || user.username || '---';
                
                let score;
                if (type === 'earnings') {
                    score = ((user.points || 0) / POINTS_PER_COIN).toFixed(1) + ' COINS';
                } else {
                    score = (user.referral_count || 0) + ' refs';
                }
                
                return `
                    <div class="winner-card winner-${position}">
                        <div class="winner-medal">${medal}</div>
                        <div class="winner-avatar">
                            ${user.photo_url ? `<img src="${user.photo_url}" alt="${displayName}">` : initial}
                        </div>
                        <div class="winner-name">${displayName}</div>
                        <div class="winner-score">${score}</div>
                    </div>
                `;
            }).join('');
        }
        
        function renderLeaderboard(data, type, showMedals = true) {
            const container = document.getElementById('leaderboardList');
            const filteredData = filterByTier(data, currentTier);
            
            if (!filteredData || filteredData.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-users"></i><p>No users found</p></div>`;
                return;
            }
            
            const startIdx = showMedals ? 3 : 0;
            const displayData = showMedals ? filteredData.slice(3) : filteredData;
            
            if (displayData.length === 0) {
                container.innerHTML = '';
                return;
            }
            
            container.innerHTML = displayData.map((user, idx) => {
                const rank = startIdx + idx + 1;
                const initial = (user.first_name || user.username || 'U')[0].toUpperCase();
                const tierClass = 'tier-' + (user.tier || 'Fresher');
                
                let score, scoreLabel;
                if (type === 'referrals') {
                    score = user.referral_count || 0;
                    scoreLabel = 'refs';
                } else {
                    score = ((user.points || 0) / POINTS_PER_COIN).toFixed(2);
                    scoreLabel = 'COINS';
                }
                
                return `
                    <div class="leaderboard-item ${tierClass}">
                        <div class="rank-badge">#${rank}</div>
                        <div class="avatar">
                            ${user.photo_url ? `<img src="${user.photo_url}" alt="${user.first_name}">` : initial}
                        </div>
                        <div class="info">
                            <div class="name-row">
                                <span class="name">${user.first_name || user.username || 'User'}</span>
                                <span class="tier-badge">${user.tier || 'Fresher'}</span>
                            </div>
                            <div class="stats-row">
                                <span><i class="fas fa-user-plus"></i> ${user.referrals || 0}</span>
                                <span><i class="fas fa-coins"></i> ${((user.points || 0) / POINTS_PER_COIN).toFixed(1)}</span>
                            </div>
                        </div>
                        <div class="score">${score} <small>${scoreLabel}</small></div>
                    </div>
                `;
            }).join('');
        }
        
        function updateMyRankCard(data, type) {
            const userId = tg?.initDataUnsafe?.user?.id;
            if (!userId) return;
            
            const myData = data.find(u => u.telegram_id === userId);
            if (myData) {
                const rank = data.findIndex(u => u.telegram_id === userId) + 1;
                document.getElementById('myRank').textContent = `#${rank}`;
                
                if (type === 'earnings') {
                    document.getElementById('myCoins').textContent = ((myData.points || 0) / POINTS_PER_COIN).toFixed(2);
                    document.getElementById('myCoinsLabel').textContent = 'COINS';
                } else {
                    document.getElementById('myCoins').textContent = myData.referral_count || 0;
                    document.getElementById('myCoinsLabel').textContent = 'REFERRALS';
                }
                document.getElementById('myRankCard').style.display = 'flex';
            } else {
                document.getElementById('myRankCard').style.display = 'none';
            }
        }
        
        function refreshDisplay() {
            const winnersRow = document.getElementById('winnersRow');
            const tierSelector = document.getElementById('tierSelector');
            
            if (currentView === 'earnings') {
                document.getElementById('prizeLabel').innerHTML = '<span><i class="fas fa-gift"></i> Monthly Prizes: 🥇500 • 🥈250 • 🥉100 COINS</span>';
                tierSelector.classList.remove('show');
                winnersRow.style.display = 'flex';
                
                if (topEarnersData.length) {
                    renderWinnersRow(topEarnersData, 'earnings');
                    renderLeaderboard(topEarnersData, 'earnings', true);
                    updateMyRankCard(topEarnersData, 'earnings');
                }
            } else if (currentView === 'referrals') {
                document.getElementById('prizeLabel').innerHTML = '<span><i class="fas fa-gift"></i> Weekly Prizes: 🥇100 • 🥈50 • 🥉25 COINS</span>';
                tierSelector.classList.remove('show');
                winnersRow.style.display = 'flex';
                
                if (topReferrersData.length) {
                    renderWinnersRow(topReferrersData, 'referrals');
                    renderLeaderboard(topReferrersData, 'referrals', true);
                    updateMyRankCard(topReferrersData, 'referrals');
                }
            } else if (currentView === 'tier') {
                document.getElementById('prizeLabel').innerHTML = '<span><i class="fas fa-layer-group"></i> Tier Rankings</span>';
                tierSelector.classList.add('show');
                winnersRow.style.display = 'none';
                
                const data = topEarnersData.length ? topEarnersData : [];
                if (data.length) {
                    renderLeaderboard(data, 'earnings', false);
                    updateMyRankCard(data, 'earnings');
                }
            }
        }
        
        async function loadTopEarners() {
            try {
                const data = await apiCall('/api/leaderboard/top-earners');
                topEarnersData = data;
                if (currentView === 'earnings' || currentView === 'tier') refreshDisplay();
            } catch (err) {
                console.error('Top earners error:', err);
            }
        }
        
        async function loadTopReferrers() {
            try {
                const data = await apiCall('/api/leaderboard/weekly-referrers');
                topReferrersData = data;
                if (currentView === 'referrals') refreshDisplay();
            } catch (err) {
                console.error('Top referrers error:', err);
            }
        }
        
        function switchView(view) {
            currentView = view;
            
            document.querySelectorAll('.action-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.view === view) btn.classList.add('active');
            });
            
            refreshDisplay();
        }
        
        function switchTier(tier) {
            currentTier = tier;
            
            document.querySelectorAll('.tier-option').forEach(opt => {
                opt.classList.remove('active');
                if (opt.dataset.tier === tier) opt.classList.add('active');
            });
            
            document.getElementById('selectedTierText').textContent = tier === 'all' ? 'All Tiers' : tier;
            document.getElementById('tierDropdown').classList.remove('show');
            
            if (currentView === 'tier') refreshDisplay();
        }
        
        // Event Listeners
        document.querySelectorAll('.action-btn').forEach(btn => {
            btn.addEventListener('click', () => switchView(btn.dataset.view));
        });
        
        document.getElementById('tierSelectBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            document.getElementById('tierDropdown').classList.toggle('show');
        });
        
        document.querySelectorAll('.tier-option').forEach(opt => {
            opt.addEventListener('click', (e) => {
                e.stopPropagation();
                switchTier(opt.dataset.tier);
            });
        });
        
        document.addEventListener('click', () => {
            document.getElementById('tierDropdown').classList.remove('show');
        });
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadTopEarners();
            loadTopReferrers();
        });
    </script>
</body>
    </html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leaderboard - YzemanBot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- TELEGRAM WEB APP SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        :root {
            --primary: #4CAF50;
            --secondary: #2196F3;
            --dark: #1a1a2e;
            --darker: #16213e;
            --light: #ffffff;
            --gray: #888888;
            --gold: #FFD700;
            --silver: #C0C0C0;
            --bronze: #CD7F32;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--dark);
            color: var(--light);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        
        .header {
            background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 100%);
            padding: 25px 15px 30px;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            text-align: center;
            position: relative;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .header h1 i { color: var(--gold); }
        .header p { color: var(--gray); font-size: 14px; }
        
        .back-btn-header {
            position: absolute;
            top: 20px; left: 20px;
            color: white; font-size: 24px;
            text-decoration: none; z-index: 10;
        }
        
        /* Prize Label */
        .prize-label {
            background: linear-gradient(135deg, var(--gold) 0%, #FFA000 100%);
            color: var(--dark);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: bold;
            display: inline-block;
            margin-top: 15px;
        }
        
        /* Podium Section */
        .podium-section {
            padding: 30px 15px 10px;
        }
        
        .podium-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 20px;
        }
        
        .podium-item {
            text-align: center;
            flex: 1;
            max-width: 110px;
        }
        
        .podium-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            margin: 0 auto 10px;
            border: 3px solid;
            overflow: hidden;
            background: var(--darker);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
        }
        
        .podium-1 .podium-avatar { 
            border-color: var(--gold); 
            width: 85px; 
            height: 85px; 
            font-size: 38px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }
        .podium-2 .podium-avatar { border-color: var(--silver); }
        .podium-3 .podium-avatar { border-color: var(--bronze); }
        
        .podium-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .podium-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .podium-position {
            font-size: 13px;
            color: var(--gray);
            margin-bottom: 3px;
        }
        
        .podium-coins {
            font-weight: bold;
            font-size: 16px;
            margin-top: 5px;
        }
        
        .podium-1 .podium-coins { color: var(--gold); }
        .podium-2 .podium-coins { color: var(--silver); }
        .podium-3 .podium-coins { color: var(--bronze); }
        
        .podium-bar {
            height: 8px;
            border-radius: 4px;
            margin-top: 10px;
        }
        
        .podium-1 .podium-bar { background: var(--gold); height: 50px; border-radius: 8px 8px 0 0; }
        .podium-2 .podium-bar { background: var(--silver); height: 35px; border-radius: 8px 8px 0 0; }
        .podium-3 .podium-bar { background: var(--bronze); height: 25px; border-radius: 8px 8px 0 0; }
        
        /* Tabs */
        .tabs {
            display: flex;
            background: var(--darker);
            padding: 5px;
            border-radius: 40px;
            margin: 20px 15px;
        }
        
        .tab {
            flex: 1;
            text-align: center;
            padding: 14px 10px;
            border-radius: 35px;
            font-size: 15px;
            font-weight: 600;
            color: var(--gray);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .tab i { margin-right: 6px; }
        
        .tab.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }
        
        /* Leaderboard List */
        .leaderboard-container {
            padding: 0 15px;
            margin-bottom: 20px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin: 20px 0 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .section-title i { color: var(--gold); }
        
        .leaderboard-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .leaderboard-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: var(--darker);
            border-radius: 15px;
            margin-bottom: 8px;
            transition: transform 0.2s ease;
        }
        
        .leaderboard-item:hover {
            transform: translateX(-5px);
            background: #1e2a4a;
        }
        
        .rank {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            margin-right: 12px;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            color: var(--gray);
        }
        
        .rank-1 { background: linear-gradient(135deg, #FFD700, #FFA000); color: var(--dark); }
        .rank-2 { background: linear-gradient(135deg, #C0C0C0, #A0A0A0); color: var(--dark); }
        .rank-3 { background: linear-gradient(135deg, #CD7F32, #B87333); color: var(--dark); }
        
        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin-right: 12px;
            color: white;
            overflow: hidden;
            font-weight: bold;
        }
        
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .info { flex: 1; }
        
        .name {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 3px;
        }
        
        .username {
            font-size: 11px;
            color: var(--gray);
        }
        
        .tier-badge {
            display: inline-block;
            background: var(--gold);
            color: var(--dark);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 9px;
            font-weight: bold;
            margin-left: 6px;
        }
        
        .score {
            font-weight: bold;
            color: var(--gold);
            font-size: 16px;
            text-align: right;
        }
        
        .score small {
            font-size: 10px;
            color: var(--gray);
            font-weight: normal;
        }
        
        /* My Rank Card */
        .my-rank-card {
            background: linear-gradient(135deg, var(--secondary) 0%, #1976D2 100%);
            border-radius: 20px;
            padding: 18px 20px;
            margin: 20px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .my-rank-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .my-rank-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .my-rank-info h4 {
            font-size: 14px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 5px;
        }
        
        .my-rank-value {
            font-size: 28px;
            font-weight: bold;
        }
        
        .my-rank-right {
            text-align: right;
        }
        
        .my-rank-coins {
            font-size: 22px;
            font-weight: bold;
        }
        
        .my-rank-label {
            font-size: 12px;
            color: rgba(255,255,255,0.7);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--gray);
        }
        
        .retry-btn {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            margin-left: 10px;
        }
        
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--darker); display: flex; padding: 10px 20px;
            border-top: 1px solid rgba(255,255,255,0.1); z-index: 100;
        }
        
        .nav-item {
            flex: 1; text-align: center; color: var(--gray);
            text-decoration: none; font-size: 12px; padding: 8px;
            border-radius: 10px; transition: all 0.2s ease;
        }
        
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .nav-item.active { color: var(--primary); background: rgba(76, 175, 80, 0.1); }
        
        .notification {
            position: fixed; bottom: 90px; left: 20px; right: 20px;
            background: #00c853; color: white; padding: 15px 20px;
            border-radius: 12px; text-align: center; font-weight: 500;
            display: none; z-index: 1000; animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--gray);
        }
        
        .empty-state i {
            font-size: 50px;
            margin-bottom: 15px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <a href="/" class="back-btn-header"><i class="fas fa-arrow-left"></i></a>
    
    <div class="header">
        <h1><i class="fas fa-trophy"></i> Leaderboard</h1>
        <p>Compete with others and climb the ranks!</p>
        <div class="prize-label" id="prizeLabel">
            <i class="fas fa-gift"></i> Monthly Prizes: 500 • 250 • 100 COINS
        </div>
    </div>
    
    <!-- Podium Section -->
    <div class="podium-section">
        <div class="podium-container" id="podiumContainer">
            <div class="loading">Loading...</div>
        </div>
    </div>
    
    <!-- Tabs -->
    <div class="tabs">
        <div class="tab active" data-tab="earners"><i class="fas fa-coins"></i> Top Earners</div>
        <div class="tab" data-tab="referrals"><i class="fas fa-users"></i> Top Referrals</div>
    </div>
    
    <!-- Top Earners Content -->
    <div id="earnersContent">
        <div class="leaderboard-container">
            <div class="section-title">
                <i class="fas fa-list-ol"></i>
                <span>All Time Rankings</span>
            </div>
            <div class="leaderboard-list" id="topEarnersList">
                <div class="loading">Loading top earners...</div>
            </div>
        </div>
    </div>
    
    <!-- Top Referrals Content (Hidden initially) -->
    <div id="referralsContent" style="display:none;">
        <div class="leaderboard-container">
            <div class="section-title">
                <i class="fas fa-list-ol"></i>
                <span>Weekly Referral Rankings</span>
            </div>
            <div class="leaderboard-list" id="topReferrersList">
                <div class="loading">Loading referrals...</div>
            </div>
        </div>
    </div>
    
    <!-- My Rank Card -->
    <div class="my-rank-card" id="myRankCard" style="display:none;">
        <div class="my-rank-left">
            <div class="my-rank-icon">
                <i class="fas fa-user"></i>
            </div>
            <div class="my-rank-info">
                <h4>Your Rank</h4>
                <div class="my-rank-value" id="myRank">--</div>
            </div>
        </div>
        <div class="my-rank-right">
            <div class="my-rank-coins" id="myCoins">0</div>
            <div class="my-rank-label" id="myCoinsLabel">COINS</div>
        </div>
    </div>
    
    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="/" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="/daily.html" class="nav-item"><i class="fas fa-calendar-check"></i><span>Daily</span></a>
        <a href="/wheel.html" class="nav-item"><i class="fas fa-dharmachakra"></i><span>Wheel</span></a>
        <a href="/leaderboard.html" class="nav-item active"><i class="fas fa-trophy"></i><span>Ranks</span></a>
        <a href="/team.html" class="nav-item"><i class="fas fa-users"></i><span>Team</span></a>
    </div>
    
    <div class="notification" id="notification"></div>
    
    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }
        
        const POINTS_PER_COIN = 1000000;
        let currentTab = 'earners';
        let topEarnersData = [];
        let topReferrersData = [];
        
        function showNotification(msg) {
            const notif = document.getElementById('notification');
            notif.textContent = msg;
            notif.style.display = 'block';
            setTimeout(() => notif.style.display = 'none', 3000);
        }
        
        async function apiCall(endpoint) {
            if (!tg?.initData) {
                throw new Error('Not in Telegram');
            }
            
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ initData: tg.initData })
            });
            
            if (!response.ok) throw new Error(`Status ${response.status}`);
            return response.json();
        }
        
        function renderPodium(data, type) {
            const container = document.getElementById('podiumContainer');
            
            if (!data || data.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1;">
                        <i class="fas fa-users"></i>
                        <p>No users yet</p>
                    </div>
                `;
                return;
            }
            
            const top3 = data.slice(0, 3);
            
            // Pad with empty if less than 3
            while (top3.length < 3) {
                top3.push({ first_name: '---', points: 0, referral_count: 0 });
            }
            
            const ordered = [top3[1], top3[0], top3[2]]; // 2nd, 1st, 3rd
            
            container.innerHTML = ordered.map((user, idx) => {
                const position = idx === 0 ? 2 : idx === 1 ? 1 : 3;
                const posLabel = position === 1 ? '1st' : position === 2 ? '2nd' : '3rd';
                
                let coinValue;
                if (type === 'earners') {
                    coinValue = ((user.points || 0) / POINTS_PER_COIN).toFixed(1);
                } else {
                    coinValue = user.referral_count || 0;
                }
                
                const initial = (user.first_name || user.username || '?')[0].toUpperCase();
                const displayName = user.first_name || user.username || '---';
                
                return `
                    <div class="podium-item podium-${position}">
                        <div class="podium-avatar">
                            ${user.photo_url ? `<img src="${user.photo_url}" alt="${displayName}">` : initial}
                        </div>
                        <div class="podium-position">${posLabel} Place</div>
                        <div class="podium-name">${displayName}</div>
                        <div class="podium-coins">${type === 'earners' ? coinValue + ' COINS' : coinValue + ' refs'}</div>
                        <div class="podium-bar"></div>
                    </div>
                `;
            }).join('');
        }
        
        function renderLeaderboard(containerId, data, type) {
            const container = document.getElementById(containerId);
            
            if (!data || data.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-users"></i>
                        <p>No users yet</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = data.map((user, idx) => {
                const rank = idx + 1;
                const rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : '';
                const initial = (user.first_name || user.username || 'U')[0].toUpperCase();
                
                let score, scoreLabel;
                if (type === 'referrals') {
                    score = user.referral_count || 0;
                    scoreLabel = 'refs';
                } else {
                    score = ((user.points || 0) / POINTS_PER_COIN).toFixed(2);
                    scoreLabel = 'COINS';
                }
                
                return `
                    <div class="leaderboard-item">
                        <div class="rank ${rankClass}">#${rank}</div>
                        <div class="avatar">
                            ${user.photo_url ? `<img src="${user.photo_url}" alt="${user.first_name}">` : initial}
                        </div>
                        <div class="info">
                            <div class="name">
                                ${user.first_name || user.username || 'User'}
                                <span class="tier-badge">${user.tier || 'Fresher'}</span>
                            </div>
                            <div class="username">${user.username ? '@' + user.username : ''}</div>
                        </div>
                        <div class="score">${score} <small>${scoreLabel}</small></div>
                    </div>
                `;
            }).join('');
        }
        
        function updateMyRankCard(data, type) {
            const userId = tg?.initDataUnsafe?.user?.id;
            if (!userId) return;
            
            const myData = data.find(u => u.telegram_id === userId);
            if (myData) {
                const rank = data.findIndex(u => u.telegram_id === userId) + 1;
                document.getElementById('myRank').textContent = `#${rank}`;
                
                if (type === 'earners') {
                    const coins = ((myData.points || 0) / POINTS_PER_COIN).toFixed(2);
                    document.getElementById('myCoins').textContent = coins;
                    document.getElementById('myCoinsLabel').textContent = 'COINS';
                } else {
                    document.getElementById('myCoins').textContent = myData.referral_count || 0;
                    document.getElementById('myCoinsLabel').textContent = 'REFERRALS';
                }
                
                document.getElementById('myRankCard').style.display = 'flex';
            } else {
                document.getElementById('myRankCard').style.display = 'none';
            }
        }
        
        async function loadTopEarners() {
            try {
                const data = await apiCall('/api/leaderboard/top-earners');
                topEarnersData = data;
                
                if (currentTab === 'earners') {
                    renderPodium(data, 'earners');
                    renderLeaderboard('topEarnersList', data, 'earners');
                    updateMyRankCard(data, 'earners');
                }
                
                // Update prize label
                document.getElementById('prizeLabel').innerHTML = 
                    '<i class="fas fa-gift"></i> Monthly Prizes: 500 • 250 • 100 COINS';
                    
            } catch (err) {
                console.error('Top earners error:', err);
                document.getElementById('topEarnersList').innerHTML = 
                    '<div class="loading">Failed to load <button class="retry-btn" onclick="loadTopEarners()">Retry</button></div>';
            }
        }
        
        async function loadTopReferrers() {
            try {
                const data = await apiCall('/api/leaderboard/weekly-referrers');
                topReferrersData = data;
                
                if (currentTab === 'referrals') {
                    renderPodium(data, 'referrals');
                    renderLeaderboard('topReferrersList', data, 'referrals');
                    updateMyRankCard(data, 'referrals');
                }
            } catch (err) {
                console.error('Top referrers error:', err);
                document.getElementById('topReferrersList').innerHTML = 
                    '<div class="loading">Failed to load <button class="retry-btn" onclick="loadTopReferrers()">Retry</button></div>';
            }
        }
        
        function switchTab(tab) {
            currentTab = tab;
            
            // Update tab active states
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
            
            // Show/hide content
            document.getElementById('earnersContent').style.display = tab === 'earners' ? 'block' : 'none';
            document.getElementById('referralsContent').style.display = tab === 'referrals' ? 'block' : 'none';
            
            // Update prize label
            if (tab === 'earners') {
                document.getElementById('prizeLabel').innerHTML = 
                    '<i class="fas fa-gift"></i> Monthly Prizes: 500 • 250 • 100 COINS';
            } else {
                document.getElementById('prizeLabel').innerHTML = 
                    '<i class="fas fa-gift"></i> Weekly Prizes: 100 • 50 • 25 COINS';
            }
            
            // Render appropriate data
            if (tab === 'earners' && topEarnersData.length) {
                renderPodium(topEarnersData, 'earners');
                renderLeaderboard('topEarnersList', topEarnersData, 'earners');
                updateMyRankCard(topEarnersData, 'earners');
            } else if (tab === 'referrals' && topReferrersData.length) {
                renderPodium(topReferrersData, 'referrals');
                renderLeaderboard('topReferrersList', topReferrersData, 'referrals');
                updateMyRankCard(topReferrersData, 'referrals');
            }
        }
        
        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                switchTab(tab.dataset.tab);
            });
        });
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🏆 Leaderboard loading...');
            loadTopEarners();
            loadTopReferrers();
        });
    </script>
</body>
            </html>

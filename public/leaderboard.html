<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Leaderboard - YzemanBot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #4CAF50;
            --secondary: #2196F3;
            --warning: #FF9800;
            --danger: #f44336;
            --dark: #1a1a2e;
            --darker: #16213e;
            --light: #ffffff;
            --gray: #888888;
            --gold: #FFD700;
            --silver: #C0C0C0;
            --bronze: #CD7F32;
            --success: #00c853;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--dark) 0%, #0f0f1a 100%);
            color: var(--light);
            min-height: 100vh;
            padding-bottom: 80px;
            overflow-x: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            padding: 20px 15px 25px;
            border-radius: 0 0 30px 30px;
            text-align: center;
            position: relative;
            border-bottom: 1px solid rgba(255,215,0,0.2);
        }
        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
            background: linear-gradient(135deg, var(--gold), #FFA000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header h1 i { color: var(--gold); -webkit-text-fill-color: var(--gold); }
        .header p { color: var(--gray); font-size: 12px; margin-bottom: 8px; }
        
        .back-btn-header {
            position: absolute; top: 18px; left: 18px;
            color: white; font-size: 20px;
            text-decoration: none; z-index: 10;
            background: rgba(0,0,0,0.3);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Prize Banner - COLLAPSIBLE */
        .prize-banner {
            background: linear-gradient(135deg, rgba(255,215,0,0.12), rgba(255,160,0,0.08));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 16px;
            margin: 12px 15px;
            overflow: hidden;
        }
        
        .prize-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
            cursor: pointer;
            background: rgba(0,0,0,0.2);
        }
        
        .prize-header h3 {
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--gold);
        }
        
        .toggle-icon {
            font-size: 14px;
            color: var(--gray);
            transition: transform 0.3s;
        }
        
        .prize-header.collapsed .toggle-icon {
            transform: rotate(180deg);
        }
        
        .prize-content {
            padding: 12px 15px;
            max-height: 200px;
            overflow: hidden;
            transition: max-height 0.3s ease, padding 0.3s ease;
        }
        
        .prize-content.collapsed {
            max-height: 0;
            padding: 0 15px;
        }
        
        .prize-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        
        .prize-card {
            background: linear-gradient(135deg, rgba(0,0,0,0.3), rgba(0,0,0,0.1));
            border-radius: 12px;
            padding: 10px 5px;
            text-align: center;
        }
        
        .prize-position { font-size: 24px; margin-bottom: 3px; }
        .prize-amount { font-size: 14px; font-weight: bold; color: var(--gold); }
        .prize-label { font-size: 8px; opacity: 0.7; margin-top: 2px; }
        
        .reward-info {
            background: rgba(33,150,243,0.1);
            border-left: 3px solid var(--secondary);
            border-radius: 12px;
            padding: 10px 12px;
            margin: 0 15px 12px;
            font-size: 11px;
            color: var(--gray);
        }
        .reward-info i { color: var(--secondary); margin-right: 6px; }
        
        /* Button Row */
        .button-row {
            display: flex;
            gap: 10px;
            padding: 0 15px 12px;
        }
        .action-btn {
            flex: 1;
            background: var(--darker);
            color: var(--gray);
            border: none;
            padding: 10px 8px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .action-btn i { font-size: 14px; }
        .action-btn.active {
            background: linear-gradient(135deg, var(--primary), #2E7D32);
            color: white;
            box-shadow: 0 2px 10px rgba(76,175,80,0.3);
        }
        
        /* Tier Selector */
        .tier-selector {
            padding: 0 15px 12px;
            display: none;
        }
        .tier-selector.show { display: block; }
        .tier-select-btn {
            background: var(--darker);
            color: white;
            border: 1px solid var(--gray);
            padding: 10px 15px;
            border-radius: 30px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }
        .tier-dropdown-menu {
            background: var(--darker);
            border: 1px solid var(--gray);
            border-radius: 15px;
            margin-top: 5px;
            display: none;
        }
        .tier-dropdown-menu.show { display: block; }
        .tier-option {
            padding: 12px 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
        .tier-option:hover { background: rgba(255,255,255,0.1); }
        .tier-option.active { background: var(--primary); color: white; }
        .tier-icon { width: 10px; height: 10px; border-radius: 50%; }
        
        /* Leaderboard Container */
        .leaderboard-container {
            padding: 0 15px 20px;
        }
        .section-title {
            font-size: 14px;
            font-weight: 600;
            margin: 10px 0 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--gray);
        }
        .section-title i { color: var(--gold); font-size: 16px; }
        
        .leaderboard-list {
            max-height: 450px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .leaderboard-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            background: rgba(22, 33, 62, 0.8);
            backdrop-filter: blur(5px);
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .leaderboard-item.current-user {
            background: linear-gradient(135deg, rgba(76,175,80,0.2), rgba(0,200,83,0.1));
            border: 1px solid var(--gold);
        }
        
        .rank-badge {
            width: 38px;
            font-size: 15px;
            font-weight: bold;
            text-align: center;
            margin-right: 8px;
            flex-shrink: 0;
        }
        .medal-badge {
            font-size: 24px;
            width: 38px;
            text-align: center;
            margin-right: 8px;
            flex-shrink: 0;
        }
        
        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            margin-right: 10px;
            color: white;
            font-weight: bold;
            flex-shrink: 0;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        
        .info {
            flex: 1;
            min-width: 0;
        }
        .name-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 3px;
            flex-wrap: wrap;
        }
        .name {
            font-weight: 600;
            font-size: 13px;
        }
        .tier-badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 8px;
            font-weight: 600;
            color: var(--dark);
        }
        .you-badge {
            background: var(--gold);
            color: var(--dark);
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 8px;
            font-weight: bold;
        }
        .tier-Fresher .tier-badge { background: #888; }
        .tier-Brute .tier-badge { background: #FF9800; }
        .tier-Silver .tier-badge { background: #C0C0C0; }
        .tier-Gold .tier-badge { background: #FFD700; }
        .tier-Platinum .tier-badge { background: #E5E4E2; }
        
        .stats-row {
            display: flex;
            gap: 12px;
            font-size: 9px;
            color: var(--gray);
        }
        .stats-row i { margin-right: 2px; width: 12px; }
        
        .score {
            font-weight: bold;
            color: var(--gold);
            font-size: 13px;
            text-align: right;
            min-width: 65px;
            flex-shrink: 0;
        }
        .score small {
            font-size: 8px;
            color: var(--gray);
            font-weight: normal;
        }
        
        /* My Rank Card - STICKY */
        .sticky-rank-container {
            position: sticky;
            top: 0;
            z-index: 50;
            margin: 0 15px 12px;
        }
        .my-rank-card {
            background: linear-gradient(135deg, var(--secondary), #0D47A1);
            border-radius: 16px;
            padding: 12px 16px;
            box-shadow: 0 4px 15px rgba(33,150,243,0.3);
            border: 1px solid rgba(255,255,255,0.15);
        }
        .my-rank-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .my-rank-icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .my-rank-info h4 {
            font-size: 11px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 3px;
        }
        .my-rank-value {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, var(--gold), #FFA000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .my-rank-right {
            margin-left: auto;
            text-align: right;
        }
        .my-rank-coins {
            font-size: 20px;
            font-weight: bold;
        }
        .my-rank-label {
            font-size: 10px;
            color: rgba(255,255,255,0.7);
        }
        
        .loading, .empty-state { text-align: center; padding: 30px; color: var(--gray); }
        .retry-btn {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(22, 33, 62, 0.95);
            backdrop-filter: blur(10px);
            display: flex; padding: 8px 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }
        .nav-item {
            flex: 1; text-align: center; color: var(--gray);
            text-decoration: none; font-size: 10px; padding: 5px;
            border-radius: 8px;
        }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 2px; }
        .nav-item.active { color: var(--primary); background: rgba(76,175,80,0.12); }
        
        .notification {
            position: fixed; bottom: 80px; left: 15px; right: 15px;
            background: var(--success); color: white; padding: 12px 16px;
            border-radius: 12px; text-align: center; display: none; z-index: 1000;
            font-size: 12px;
        }
        .notification.error { background: var(--danger); }
        
        /* Tier border colors */
        .leaderboard-item.tier-Fresher { border-left: 3px solid #888; }
        .leaderboard-item.tier-Brute { border-left: 3px solid #FF9800; }
        .leaderboard-item.tier-Silver { border-left: 3px solid #C0C0C0; }
        .leaderboard-item.tier-Gold { border-left: 3px solid #FFD700; }
        .leaderboard-item.tier-Platinum { border-left: 3px solid #E5E4E2; }
    </style>
</head>
<body>
    <a href="/" class="back-btn-header"><i class="fas fa-arrow-left"></i></a>
    
    <div class="header">
        <h1><i class="fas fa-trophy"></i> Leaderboard</h1>
        <p>Compete globally and climb the ranks!</p>
    </div>
    
    <!-- Collapsible Prize Banner -->
    <div class="prize-banner" id="prizeBanner">
        <div class="prize-header" id="prizeToggle">
            <h3 id="prizeTitle"><i class="fas fa-crown"></i> Monthly Prizes</h3>
            <i class="fas fa-chevron-up toggle-icon" id="toggleIcon"></i>
        </div>
        <div class="prize-content" id="prizeContent">
            <div class="prize-grid" id="prizeGrid">
                <div class="prize-card">
                    <div class="prize-position">🥇</div>
                    <div class="prize-amount">5,000</div>
                    <div class="prize-label">COINS</div>
                </div>
                <div class="prize-card">
                    <div class="prize-position">🥈</div>
                    <div class="prize-amount">3,000</div>
                    <div class="prize-label">COINS</div>
                </div>
                <div class="prize-card">
                    <div class="prize-position">🥉</div>
                    <div class="prize-amount">1,000</div>
                    <div class="prize-label">COINS</div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="reward-info" id="rewardInfo">
        <i class="fas fa-info-circle"></i>
        <span id="rewardInfoText">Distributed on the 1st of every month to top 3 earners</span>
    </div>
    
    <!-- Button Row -->
    <div class="button-row">
        <button class="action-btn active" data-view="earnings"><i class="fas fa-coins"></i> Top Earnings</button>
        <button class="action-btn" data-view="referrals"><i class="fas fa-users"></i> Top Referrals</button>
        <button class="action-btn" data-view="tier"><i class="fas fa-layer-group"></i> Tier</button>
    </div>
    
    <!-- Tier Selector -->
    <div class="tier-selector" id="tierSelector">
        <button class="tier-select-btn" id="tierSelectBtn">
            <span><i class="fas fa-filter"></i> <span id="selectedTierText">All Tiers</span></span>
            <i class="fas fa-chevron-down"></i>
        </button>
        <div class="tier-dropdown-menu" id="tierDropdown">
            <div class="tier-option active" data-tier="all"><span class="tier-icon" style="background: var(--gold);"></span> All Tiers</div>
            <div class="tier-option" data-tier="Fresher"><span class="tier-icon" style="background: #888;"></span> Fresher</div>
            <div class="tier-option" data-tier="Brute"><span class="tier-icon" style="background: #FF9800;"></span> Brute</div>
            <div class="tier-option" data-tier="Silver"><span class="tier-icon" style="background: #C0C0C0;"></span> Silver</div>
            <div class="tier-option" data-tier="Gold"><span class="tier-icon" style="background: #FFD700;"></span> Gold</div>
            <div class="tier-option" data-tier="Platinum"><span class="tier-icon" style="background: #E5E4E2;"></span> Platinum</div>
        </div>
    </div>
    
    <!-- Leaderboard Container -->
    <div class="leaderboard-container">
        <div class="section-title" id="listTitle">
            <i class="fas fa-list-ol"></i> Monthly Rankings
        </div>
        <div class="leaderboard-list" id="leaderboardList">
            <div class="loading">Loading rankings...</div>
        </div>
    </div>
    
    <!-- My Rank Card - STICKY -->
    <div class="sticky-rank-container" id="stickyRankContainer">
        <div id="myRankContainer"></div>
    </div>
    
    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="/" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="/daily.html" class="nav-item"><i class="fas fa-calendar-check"></i><span>Daily</span></a>
        <a href="/wheel.html" class="nav-item"><i class="fas fa-dharmachakra"></i><span>Wheel</span></a>
        <a href="/leaderboard.html" class="nav-item active"><i class="fas fa-trophy"></i><span>Ranks</span></a>
        <a href="/team.html" class="nav-item"><i class="fas fa-users"></i><span>Team</span></a>
    </div>
    
    <div class="notification" id="notification"></div>
    
    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }

        let currentView = 'earnings';
        let currentTier = 'all';
        let topEarnersData = [];
        let topReferrersData = [];
        
        // Collapsible banner state
        let prizeBannerCollapsed = localStorage.getItem('leaderboardBannerCollapsed') === 'true';

        // Helper: Get user's local date
        function getLocalDate() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function getLocalMonthStart() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            return `${year}-${month}-01`;
        }

        function showNotification(msg, isError = false) {
            const notif = document.getElementById('notification');
            notif.textContent = msg;
            notif.className = 'notification' + (isError ? ' error' : '');
            notif.style.display = 'block';
            setTimeout(() => notif.style.display = 'none', 3000);
        }

        // Format number with commas
        function formatNumberWithCommas(num) {
            if (num === undefined || num === null) return '0';
            const number = parseFloat(num);
            if (isNaN(number)) return '0';
            if (number >= 1000000) return (number / 1000000).toFixed(2) + 'M';
            if (number >= 1000) return (number / 1000).toFixed(1) + 'K';
            return number.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        function formatCoinsDetailed(num) {
            if (num === undefined || num === null) return '0.00';
            const number = parseFloat(num);
            if (isNaN(number)) return '0.00';
            const parts = number.toFixed(2).split('.');
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            return parts.join('.');
        }

        async function apiCall(endpoint, extraData = null) {
            if (!tg?.initData) throw new Error('Not in Telegram');
            const body = {
                initData: tg.initData,
                localDate: getLocalDate(),
                localMonthStart: getLocalMonthStart(),
                ...extraData
            };
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            if (!res.ok) throw new Error(await res.text());
            return res.json();
        }

        // Toggle prize banner
        function togglePrizeBanner() {
            prizeBannerCollapsed = !prizeBannerCollapsed;
            localStorage.setItem('leaderboardBannerCollapsed', prizeBannerCollapsed);
            
            const prizeContent = document.getElementById('prizeContent');
            const prizeHeader = document.getElementById('prizeToggle');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (prizeBannerCollapsed) {
                prizeContent.classList.add('collapsed');
                prizeHeader.classList.add('collapsed');
                toggleIcon.classList.remove('fa-chevron-up');
                toggleIcon.classList.add('fa-chevron-down');
            } else {
                prizeContent.classList.remove('collapsed');
                prizeHeader.classList.remove('collapsed');
                toggleIcon.classList.remove('fa-chevron-down');
                toggleIcon.classList.add('fa-chevron-up');
            }
        }

        function updatePrizeDisplay() {
            const prizeTitle = document.getElementById('prizeTitle');
            const prizeGrid = document.getElementById('prizeGrid');
            const rewardInfoText = document.getElementById('rewardInfoText');
            
            if (currentView === 'earnings') {
                prizeTitle.innerHTML = '<i class="fas fa-crown"></i> Monthly Prizes';
                prizeGrid.innerHTML = `
                    <div class="prize-card"><div class="prize-position">🥇</div><div class="prize-amount">5,000</div><div class="prize-label">COINS</div></div>
                    <div class="prize-card"><div class="prize-position">🥈</div><div class="prize-amount">3,000</div><div class="prize-label">COINS</div></div>
                    <div class="prize-card"><div class="prize-position">🥉</div><div class="prize-amount">1,000</div><div class="prize-label">COINS</div></div>
                `;
                rewardInfoText.innerHTML = 'Distributed on the 1st of every month to top 3 earners';
            } else if (currentView === 'referrals') {
                prizeTitle.innerHTML = '<i class="fas fa-crown"></i> Weekly Prizes';
                prizeGrid.innerHTML = `
                    <div class="prize-card"><div class="prize-position">🥇</div><div class="prize-amount">3,500</div><div class="prize-label">COINS</div></div>
                    <div class="prize-card"><div class="prize-position">🥈</div><div class="prize-amount">2,000</div><div class="prize-label">COINS</div></div>
                    <div class="prize-card"><div class="prize-position">🥉</div><div class="prize-amount">1,000</div><div class="prize-label">COINS</div></div>
                `;
                rewardInfoText.innerHTML = 'Distributed every Sunday to top 3 referrers';
            } else {
                prizeTitle.innerHTML = '<i class="fas fa-layer-group"></i> Tier Rankings';
                prizeGrid.innerHTML = `
                    <div class="prize-card"><div class="prize-position">🏆</div><div class="prize-amount">Top 3</div><div class="prize-label">Per Tier</div></div>
                    <div class="prize-card"><div class="prize-position">📊</div><div class="prize-amount">Rankings</div><div class="prize-label">By Tier</div></div>
                    <div class="prize-card"><div class="prize-position">🎯</div><div class="prize-amount">Compete</div><div class="prize-label">Within Tier</div></div>
                `;
                rewardInfoText.innerHTML = 'See how you rank within your tier. Climb the leaderboard!';
            }
        }

        function filterByTier(data, tier) {
            return tier === 'all' ? data : data.filter(u => (u.tier || 'Fresher') === tier);
        }

        function getRankDisplay(rank) {
            if (rank === 1) return '🥇';
            if (rank === 2) return '🥈';
            if (rank === 3) return '🥉';
            return `#${rank}`;
        }

        function getAvatarInitials(name) {
            if (!name) return '👤';
            return name.charAt(0).toUpperCase();
        }

        function escapeHtml(str) {
            if (!str) return 'User';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function renderLeaderboard(data, type) {
            const container = document.getElementById('leaderboardList');
            const currentUserId = tg?.initDataUnsafe?.user?.id;
            
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-users"></i><p>No users yet.</p></div>';
                return;
            }
            
            const filtered = filterByTier(data, currentTier);
            if (!filtered.length) {
                container.innerHTML = `<div class="empty-state"><p>No users in ${currentTier} tier</p></div>`;
                return;
            }
            
            // Sort by appropriate field
            let sorted = [...filtered];
            if (type === 'referrals') {
                sorted.sort((a, b) => (b.referral_count || 0) - (a.referral_count || 0));
            } else {
                sorted.sort((a, b) => (parseFloat(b.monthly_coins) || 0) - (parseFloat(a.monthly_coins) || 0));
            }

            container.innerHTML = sorted.map((user, idx) => {
                const rank = idx + 1;
                const rankDisplay = getRankDisplay(rank);
                const tierClass = 'tier-' + (user.tier || 'Fresher');
                const displayName = user.first_name || 'Anonymous User';
                const shortName = displayName.length > 15 ? displayName.substring(0, 12) + '...' : displayName;
                const avatarInitial = getAvatarInitials(displayName);
                const isCurrentUser = currentUserId && user.telegram_id == currentUserId;
                const currentUserClass = isCurrentUser ? 'current-user' : '';
                
                let score, scoreLabel;
                if (type === 'referrals') {
                    score = (user.referral_count || 0).toLocaleString();
                    scoreLabel = 'refs';
                } else {
                    const monthlyCoins = parseFloat(user.monthly_coins) || 0;
                    score = formatNumberWithCommas(monthlyCoins);
                    scoreLabel = 'COINS';
                }
                
                const totalCoins = parseFloat(user.coins) || parseFloat(user.total_coins) || 0;
                
                return `
                    <div class="leaderboard-item ${tierClass} ${currentUserClass}">
                        <div class="${rank <= 3 ? 'medal-badge' : 'rank-badge'}">${rankDisplay}</div>
                        <div class="avatar">
                            ${user.photo_url ? `<img src="${user.photo_url}" alt="${escapeHtml(shortName)}">` : avatarInitial}
                        </div>
                        <div class="info">
                            <div class="name-row">
                                <span class="name">${escapeHtml(shortName)}</span>
                                <span class="tier-badge">${user.tier || 'Fresher'}</span>
                                ${isCurrentUser ? '<span class="you-badge">YOU</span>' : ''}
                            </div>
                            <div class="stats-row">
                                <span><i class="fas fa-user-plus"></i> ${(user.referrals || 0).toLocaleString()}</span>
                                <span><i class="fas fa-coins"></i> ${formatNumberWithCommas(totalCoins)}</span>
                            </div>
                        </div>
                        <div class="score">${score} <small>${scoreLabel}</small></div>
                    </div>
                `;
            }).join('');
        }

        // FIXED: updateMyRankCard - Now correctly shows rank number
        function updateMyRankCard(data, type) {
            const userId = tg?.initDataUnsafe?.user?.id;
            const myRankContainer = document.getElementById('myRankContainer');
            
            if (!userId || !myRankContainer) return;
            
            const filtered = filterByTier(data, currentTier);
            // Sort same as renderLeaderboard
            let sorted = [...filtered];
            if (type === 'referrals') {
                sorted.sort((a, b) => (b.referral_count || 0) - (a.referral_count || 0));
            } else {
                sorted.sort((a, b) => (parseFloat(b.monthly_coins) || 0) - (parseFloat(a.monthly_coins) || 0));
            }
            
            const myIndex = sorted.findIndex(u => u.telegram_id == userId);
            
            if (myIndex !== -1) {
                const myData = sorted[myIndex];
                const rank = myIndex + 1;
                const rankDisplay = getRankDisplay(rank); // This returns 🥇, 🥈, 🥉, or #4, #5, etc.
                
                let score, scoreLabel;
                if (type === 'referrals') {
                    score = (myData.referral_count || 0).toLocaleString();
                    scoreLabel = 'REFERRALS';
                } else {
                    const monthlyCoins = parseFloat(myData.monthly_coins) || 0;
                    score = formatCoinsDetailed(monthlyCoins);
                    scoreLabel = 'COINS (This Month)';
                }
                
                myRankContainer.innerHTML = `
                    <div class="my-rank-card">
                        <div class="my-rank-left">
                            <div class="my-rank-icon"><i class="fas fa-user"></i></div>
                            <div class="my-rank-info">
                                <h4>YOUR RANK</h4>
                                <div class="my-rank-value" style="font-size: 32px;">${rankDisplay}</div>
                            </div>
                        </div>
                        <div class="my-rank-right">
                            <div class="my-rank-coins">${score}</div>
                            <div class="my-rank-label">${scoreLabel}</div>
                        </div>
                    </div>
                `;
            } else {
                myRankContainer.innerHTML = '';
            }
        }

        function refreshDisplay() {
            const tierSelector = document.getElementById('tierSelector');
            const listTitle = document.getElementById('listTitle');
            
            updatePrizeDisplay();
            
            if (currentView === 'earnings') {
                listTitle.innerHTML = '<i class="fas fa-list-ol"></i> Monthly Rankings';
                tierSelector.classList.remove('show');
                if (topEarnersData.length) {
                    renderLeaderboard(topEarnersData, 'earnings');
                    updateMyRankCard(topEarnersData, 'earnings');
                }
            } else if (currentView === 'referrals') {
                listTitle.innerHTML = '<i class="fas fa-list-ol"></i> Weekly Referral Rankings';
                tierSelector.classList.remove('show');
                if (topReferrersData.length) {
                    renderLeaderboard(topReferrersData, 'referrals');
                    updateMyRankCard(topReferrersData, 'referrals');
                }
            } else {
                listTitle.innerHTML = '<i class="fas fa-list-ol"></i> Rankings by Tier';
                tierSelector.classList.add('show');
                if (topEarnersData.length) {
                    renderLeaderboard(topEarnersData, 'earnings');
                    updateMyRankCard(topEarnersData, 'earnings');
                }
            }
        }

        async function loadTopEarners() {
            try {
                const data = await apiCall('/api/leaderboard/top-earners');
                console.log('Top earners loaded:', data?.length || 0);
                topEarnersData = data || [];
                if (currentView === 'earnings' || currentView === 'tier') refreshDisplay();
            } catch (err) {
                console.error('Top earners error:', err);
                if (currentView === 'earnings') {
                    document.getElementById('leaderboardList').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>Failed to load</p><button class="retry-btn" onclick="location.reload()">Retry</button></div>`;
                }
            }
        }

        async function loadTopReferrers() {
            try {
                const data = await apiCall('/api/leaderboard/weekly-referrers');
                console.log('Top referrers loaded:', data?.length || 0);
                topReferrersData = data || [];
                if (currentView === 'referrals') refreshDisplay();
            } catch (err) {
                console.error('Top referrers error:', err);
                if (currentView === 'referrals') {
                    document.getElementById('leaderboardList').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>Failed to load</p><button class="retry-btn" onclick="location.reload()">Retry</button></div>`;
                }
            }
        }

        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.action-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.view === view) btn.classList.add('active');
            });
            refreshDisplay();
        }

        function switchTier(tier) {
            currentTier = tier;
            document.querySelectorAll('.tier-option').forEach(opt => {
                opt.classList.remove('active');
                if (opt.dataset.tier === tier) opt.classList.add('active');
            });
            document.getElementById('selectedTierText').textContent = tier === 'all' ? 'All Tiers' : tier;
            document.getElementById('tierDropdown').classList.remove('show');
            refreshDisplay();
        }

        // Event listeners
        document.querySelectorAll('.action-btn').forEach(btn => {
            btn.addEventListener('click', () => switchView(btn.dataset.view));
        });
        
        document.getElementById('tierSelectBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            document.getElementById('tierDropdown').classList.toggle('show');
        });
        
        document.querySelectorAll('.tier-option').forEach(opt => {
            opt.addEventListener('click', (e) => {
                e.stopPropagation();
                switchTier(opt.dataset.tier);
            });
        });
        
        document.addEventListener('click', () => {
            document.getElementById('tierDropdown').classList.remove('show');
        });
        
        // Prize banner toggle
        const prizeToggle = document.getElementById('prizeToggle');
        if (prizeToggle) {
            prizeToggle.addEventListener('click', togglePrizeBanner);
            if (prizeBannerCollapsed) {
                const prizeContent = document.getElementById('prizeContent');
                const toggleIcon = document.getElementById('toggleIcon');
                prizeContent.classList.add('collapsed');
                prizeToggle.classList.add('collapsed');
                toggleIcon.classList.remove('fa-chevron-up');
                toggleIcon.classList.add('fa-chevron-down');
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('🏆 Leaderboard loading...');
            await Promise.all([loadTopEarners(), loadTopReferrers()]);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leaderboard - YzemanBot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #4CAF50; --secondary: #2196F3; --dark: #1a1a2e; --darker: #16213e; --light: #ffffff; --gray: #888888; --gold: #FFD700; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--dark); color: var(--light); min-height: 100vh; padding-bottom: 80px; overflow-x: hidden; }
        
        /* Refresh Indicator */
        .refresh-indicator {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 10px;
            font-size: 12px;
            transform: translateY(-100%);
            transition: transform 0.3s ease;
            z-index: 1000;
        }
        .refresh-indicator.show { transform: translateY(0); }
        .refresh-indicator i { margin-right: 5px; }
        
        .header { background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 100%); padding: 20px 15px 25px; border-radius: 0 0 30px 30px; text-align: center; position: relative; }
        .header h1 { font-size: 26px; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .header h1 i { color: var(--gold); }
        .header p { color: var(--gray); font-size: 14px; }
        .back-btn-header { position: absolute; top: 20px; left: 20px; color: white; font-size: 24px; text-decoration: none; z-index: 10; }
        .prize-label { background: linear-gradient(135deg, var(--gold) 0%, #FFA000 100%); color: var(--dark); padding: 10px 20px; border-radius: 30px; font-size: 14px; font-weight: bold; display: inline-block; margin-top: 12px; }
        .reward-info { background: rgba(255,215,0,0.1); border: 1px solid var(--gold); border-radius: 15px; padding: 12px 15px; margin: 15px 15px 0; font-size: 13px; color: var(--gray); }
        .reward-info i { color: var(--gold); margin-right: 8px; }
        .reward-info strong { color: var(--light); }
        .button-row { display: flex; gap: 10px; padding: 20px 15px; }
        .action-btn { flex: 1; background: var(--darker); color: var(--gray); border: none; padding: 14px 10px; border-radius: 15px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .action-btn i { font-size: 16px; }
        .action-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3); }
        .tier-selector { padding: 0 15px 15px; display: none; }
        .tier-selector.show { display: block; }
        .tier-select-btn { background: var(--darker); color: white; border: 1px solid var(--gray); padding: 12px 20px; border-radius: 15px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .tier-dropdown-menu { background: var(--darker); border: 1px solid var(--gray); border-radius: 15px; margin-top: 5px; display: none; }
        .tier-dropdown-menu.show { display: block; }
        .tier-option { padding: 14px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .tier-option:hover { background: rgba(255,255,255,0.1); }
        .tier-option.active { background: var(--primary); color: white; }
        .tier-icon { width: 10px; height: 10px; border-radius: 50%; }
        .leaderboard-container { padding: 0 15px 20px; }
        .section-title { font-size: 15px; font-weight: 600; margin: 15px 0 10px; color: var(--gray); }
        .section-title i { color: var(--gold); margin-right: 8px; }
        .leaderboard-list { max-height: 400px; overflow-y: auto; }
        .leaderboard-item { display: flex; align-items: center; padding: 12px 15px; background: var(--darker); border-radius: 15px; margin-bottom: 8px; }
        .rank-badge { width: 40px; font-size: 18px; font-weight: bold; text-align: center; margin-right: 10px; }
        .medal-badge { font-size: 24px; width: 40px; text-align: center; margin-right: 10px; }
        .avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 18px; margin-right: 12px; color: white; overflow: hidden; font-weight: bold; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .info { flex: 1; }
        .name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .name { font-weight: 600; font-size: 14px; }
        .tier-badge { padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; color: var(--dark); }
        .tier-Fresher .tier-badge { background: #888; }
        .tier-Brute .tier-badge { background: #FF9800; }
        .tier-Silver .tier-badge { background: #C0C0C0; }
        .tier-Gold .tier-badge { background: #FFD700; }
        .tier-Platinum .tier-badge { background: #E5E4E2; }
        .stats-row { display: flex; gap: 15px; font-size: 11px; color: var(--gray); }
        .stats-row i { margin-right: 3px; }
        .score { font-weight: bold; color: var(--gold); font-size: 15px; text-align: right; min-width: 70px; }
        .score small { font-size: 10px; color: var(--gray); font-weight: normal; }
        .my-rank-card { background: linear-gradient(135deg, var(--secondary) 0%, #1976D2 100%); border-radius: 20px; padding: 18px 20px; margin: 20px 15px; display: flex; align-items: center; justify-content: space-between; }
        .my-rank-left { display: flex; align-items: center; gap: 15px; }
        .my-rank-icon { width: 50px; height: 50px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .my-rank-info h4 { font-size: 14px; color: rgba(255,255,255,0.8); margin-bottom: 5px; }
        .my-rank-value { font-size: 28px; font-weight: bold; }
        .my-rank-right { text-align: right; }
        .my-rank-coins { font-size: 22px; font-weight: bold; }
        .my-rank-label { font-size: 12px; color: rgba(255,255,255,0.7); }
        
        /* Skeleton Loading Styles */
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
            background-size: 200% 100%;
            animation: skeleton-wave 1.5s infinite;
            border-radius: 8px;
        }
        @keyframes skeleton-wave { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        .skeleton-leaderboard-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: var(--darker);
            border-radius: 15px;
            margin-bottom: 8px;
        }
        .skeleton-rank { width: 40px; height: 24px; background: rgba(255,255,255,0.08); border-radius: 4px; margin-right: 10px; }
        .skeleton-avatar { width: 42px; height: 42px; background: rgba(255,255,255,0.08); border-radius: 50%; margin-right: 12px; }
        .skeleton-info { flex: 1; }
        .skeleton-name { width: 50%; height: 14px; background: rgba(255,255,255,0.08); border-radius: 4px; margin-bottom: 6px; }
        .skeleton-stats { width: 35%; height: 11px; background: rgba(255,255,255,0.06); border-radius: 4px; }
        .skeleton-score { width: 60px; height: 16px; background: rgba(255,255,255,0.08); border-radius: 4px; }
        
        .skeleton-my-rank-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 18px 20px;
            margin: 20px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .skeleton-my-rank-left { display: flex; align-items: center; gap: 15px; }
        .skeleton-my-rank-icon { width: 50px; height: 50px; background: rgba(255,255,255,0.08); border-radius: 50%; }
        .skeleton-my-rank-info { flex: 1; }
        .skeleton-my-rank-title { width: 60px; height: 12px; background: rgba(255,255,255,0.08); border-radius: 4px; margin-bottom: 6px; }
        .skeleton-my-rank-value { width: 40px; height: 28px; background: rgba(255,255,255,0.08); border-radius: 4px; }
        .skeleton-my-rank-coins { width: 60px; height: 22px; background: rgba(255,255,255,0.08); border-radius: 4px; }
        .skeleton-my-rank-label { width: 40px; height: 11px; background: rgba(255,255,255,0.06); border-radius: 4px; margin-top: 4px; }
        
        .loading { text-align: center; padding: 40px; color: var(--gray); }
        .empty-state { text-align: center; padding: 40px; color: var(--gray); }
        .retry-btn { background: var(--secondary); color: white; border: none; padding: 10px 20px; border-radius: 20px; font-size: 14px; cursor: pointer; margin-top: 15px; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--darker); display: flex; padding: 10px 20px; border-top: 1px solid rgba(255,255,255,0.1); z-index: 100; }
        .nav-item { flex: 1; text-align: center; color: var(--gray); text-decoration: none; font-size: 12px; padding: 8px; border-radius: 10px; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .nav-item.active { color: var(--primary); background: rgba(76, 175, 80, 0.1); }
        
        .notification { position: fixed; bottom: 90px; left: 20px; right: 20px; background: #00c853; color: white; padding: 15px 20px; border-radius: 12px; text-align: center; display: none; z-index: 1000; }
        .leaderboard-item.tier-Fresher { border-left: 4px solid #888; }
        .leaderboard-item.tier-Brute { border-left: 4px solid #FF9800; }
        .leaderboard-item.tier-Silver { border-left: 4px solid #C0C0C0; }
        .leaderboard-item.tier-Gold { border-left: 4px solid #FFD700; }
        .leaderboard-item.tier-Platinum { border-left: 4px solid #E5E4E2; }
    </style>
</head>
<body>
    <!-- Refresh Indicator -->
    <div class="refresh-indicator" id="refreshIndicator">
        <i class="fas fa-arrow-down"></i> Pull to refresh
    </div>
    
    <a href="/" class="back-btn-header"><i class="fas fa-arrow-left"></i></a>
    <div class="header">
        <h1><i class="fas fa-trophy"></i> Leaderboard</h1>
        <p>Compete with others and climb the ranks!</p>
        <div class="prize-label" id="prizeLabel">
            <span><i class="fas fa-gift"></i> Monthly Prizes: 🥇5000 • 🥈3000 • 🥉1000 COINS</span>
        </div>
    </div>
    <div class="reward-info" id="rewardInfo">
        <i class="fas fa-info-circle"></i>
        <span id="rewardInfoText"><strong>Monthly Rewards:</strong> Distributed on the 1st of every month to top 3 earners.</span>
    </div>
    <div class="button-row">
        <button class="action-btn active" data-view="earnings"><i class="fas fa-coins"></i> Top Earnings</button>
        <button class="action-btn" data-view="referrals"><i class="fas fa-users"></i> Top Referrals</button>
        <button class="action-btn" data-view="tier"><i class="fas fa-layer-group"></i> Tier</button>
    </div>
    <div class="tier-selector" id="tierSelector">
        <button class="tier-select-btn" id="tierSelectBtn">
            <span><i class="fas fa-filter"></i> <span id="selectedTierText">All Tiers</span></span>
            <i class="fas fa-chevron-down"></i>
        </button>
        <div class="tier-dropdown-menu" id="tierDropdown">
            <div class="tier-option active" data-tier="all"><span class="tier-icon" style="background: var(--gold);"></span> All Tiers</div>
            <div class="tier-option" data-tier="Fresher"><span class="tier-icon" style="background: #888;"></span> Fresher</div>
            <div class="tier-option" data-tier="Brute"><span class="tier-icon" style="background: #FF9800;"></span> Brute</div>
            <div class="tier-option" data-tier="Silver"><span class="tier-icon" style="background: #C0C0C0;"></span> Silver</div>
            <div class="tier-option" data-tier="Gold"><span class="tier-icon" style="background: #FFD700;"></span> Gold</div>
            <div class="tier-option" data-tier="Platinum"><span class="tier-icon" style="background: #E5E4E2;"></span> Platinum</div>
        </div>
    </div>
    <div class="leaderboard-container">
        <div class="section-title"><i class="fas fa-list-ol"></i><span id="listTitle">Monthly Rankings</span></div>
        <div id="leaderboardList"></div>
    </div>
    <div id="myRankContainer"></div>
    <div class="bottom-nav">
        <a href="/" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="/daily.html" class="nav-item"><i class="fas fa-calendar-check"></i><span>Daily</span></a>
        <a href="/wheel.html" class="nav-item"><i class="fas fa-dharmachakra"></i><span>Wheel</span></a>
        <a href="/leaderboard.html" class="nav-item active"><i class="fas fa-trophy"></i><span>Ranks</span></a>
        <a href="/team.html" class="nav-item"><i class="fas fa-users"></i><span>Team</span></a>
    </div>
    <div class="notification" id="notification"></div>
    
    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }

        let currentView = 'earnings', currentTier = 'all';
        let topEarnersData = [], topReferrersData = [];
        let isRefreshing = false;
        let touchStartY = 0;
        const refreshIndicator = document.getElementById('refreshIndicator');

        function getLocalDate() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function getLocalMonthStart() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            return `${year}-${month}-01`;
        }

        function showNotification(msg, isError = false) {
            const notif = document.getElementById('notification');
            notif.textContent = msg;
            notif.style.background = isError ? '#f44336' : '#00c853';
            notif.style.display = 'block';
            setTimeout(() => notif.style.display = 'none', 3000);
        }

        async function apiCall(endpoint, extraData = null) {
            if (!tg?.initData) throw new Error('Not in Telegram');
            const localDate = getLocalDate();
            const localMonthStart = getLocalMonthStart();
            const body = { initData: tg.initData, localDate: localDate, localMonthStart: localMonthStart, ...extraData };
            const res = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            if (!res.ok) throw new Error(await res.text());
            return res.json();
        }

        function filterByTier(data, tier) { return tier === 'all' ? data : data.filter(u => u.tier === tier); }
        function getMedalForRank(r) { return r === 1 ? '🥇' : r === 2 ? '🥈' : r === 3 ? '🥉' : '#' + r; }
        
        function formatCoins(coins) {
            const num = parseFloat(coins) || 0;
            if (num >= 1000000) return (num / 1000000).toFixed(2) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(2) + 'K';
            return num.toFixed(2);
        }

        // ============================================
        // SKELETON LOADING FUNCTIONS
        // ============================================
        
        function showLeaderboardSkeleton() {
            const container = document.getElementById('leaderboardList');
            let skeletonItems = '';
            for (let i = 0; i < 5; i++) {
                skeletonItems += `
                    <div class="skeleton-leaderboard-item">
                        <div class="skeleton-rank"></div>
                        <div class="skeleton-avatar"></div>
                        <div class="skeleton-info">
                            <div class="skeleton-name"></div>
                            <div class="skeleton-stats"></div>
                        </div>
                        <div class="skeleton-score"></div>
                    </div>
                `;
            }
            container.innerHTML = skeletonItems;
        }
        
        function showMyRankSkeleton() {
            const container = document.getElementById('myRankContainer');
            container.innerHTML = `
                <div class="skeleton-my-rank-card">
                    <div class="skeleton-my-rank-left">
                        <div class="skeleton-my-rank-icon"></div>
                        <div class="skeleton-my-rank-info">
                            <div class="skeleton-my-rank-title"></div>
                            <div class="skeleton-my-rank-value"></div>
                        </div>
                    </div>
                    <div class="skeleton-my-rank-right">
                        <div class="skeleton-my-rank-coins"></div>
                        <div class="skeleton-my-rank-label"></div>
                    </div>
                </div>
            `;
        }

        function renderLeaderboard(data, type) {
            const container = document.getElementById('leaderboardList');
            if (!data || data.length === 0) { 
                container.innerHTML = '<div class="empty-state"><i class="fas fa-users"></i><p>No users yet.</p></div>'; 
                return; 
            }
            const filtered = filterByTier(data, currentTier);
            if (!filtered.length) { 
                container.innerHTML = `<div class="empty-state"><p>No users in ${currentTier} tier</p></div>`; 
                return; 
            }
            container.innerHTML = filtered.map((user, idx) => {
                const rank = idx + 1;
                const rankDisplay = getMedalForRank(rank);
                const tierClass = 'tier-' + (user.tier || 'Fresher');
                const initial = (user.first_name || user.username || 'U')[0].toUpperCase();
                let score, scoreLabel;
                if (type === 'referrals') {
                    score = user.referral_count || 0;
                    scoreLabel = 'refs';
                } else {
                    const monthlyCoins = parseFloat(user.monthly_coins) || 0;
                    score = formatCoins(monthlyCoins);
                    scoreLabel = 'COINS';
                }
                const totalCoins = parseFloat(user.coins) || parseFloat(user.total_coins) || 0;
                return `<div class="leaderboard-item ${tierClass}">
                    <div class="${rank <= 3 ? 'medal-badge' : 'rank-badge'}">${rankDisplay}</div>
                    <div class="avatar">${user.photo_url ? `<img src="${user.photo_url}" alt="${user.first_name}">` : initial}</div>
                    <div class="info">
                        <div class="name-row"><span class="name">${user.first_name || user.username || 'User'}</span><span class="tier-badge">${user.tier || 'Fresher'}</span></div>
                        <div class="stats-row"><span><i class="fas fa-user-plus"></i> ${user.referrals || 0}</span><span><i class="fas fa-coins"></i> ${formatCoins(totalCoins)}</span></div>
                    </div>
                    <div class="score">${score} <small>${scoreLabel}</small></div>
                </div>`;
            }).join('');
        }

        function updateMyRankCard(data, type) {
            const container = document.getElementById('myRankContainer');
            const userId = tg?.initDataUnsafe?.user?.id;
            if (!userId) { container.innerHTML = ''; return; }
            const filtered = filterByTier(data, currentTier);
            const myData = filtered.find(u => u.telegram_id == userId);
            if (myData) {
                const rank = filtered.findIndex(u => u.telegram_id == userId) + 1;
                let coinsDisplay, label;
                if (type === 'earnings') {
                    const monthlyCoins = parseFloat(myData.monthly_coins) || 0;
                    coinsDisplay = formatCoins(monthlyCoins);
                    label = 'COINS (This Month)';
                } else {
                    coinsDisplay = myData.referral_count || 0;
                    label = 'REFERRALS';
                }
                container.innerHTML = `
                    <div class="my-rank-card">
                        <div class="my-rank-left">
                            <div class="my-rank-icon"><i class="fas fa-user"></i></div>
                            <div class="my-rank-info"><h4>Your Rank</h4><div class="my-rank-value">${getMedalForRank(rank)}</div></div>
                        </div>
                        <div class="my-rank-right">
                            <div class="my-rank-coins">${coinsDisplay}</div>
                            <div class="my-rank-label">${label}</div>
                        </div>
                    </div>
                `;
            } else {
                container.innerHTML = '';
            }
        }

        function refreshDisplay() {
            const tierSel = document.getElementById('tierSelector');
            const listTitle = document.getElementById('listTitle');
            const rewardInfo = document.getElementById('rewardInfoText');
            if (currentView === 'earnings') {
                document.getElementById('prizeLabel').innerHTML = '<span><i class="fas fa-gift"></i> Monthly Prizes: 🥇5000 • 🥈3000 • 🥉1000 COINS</span>';
                rewardInfo.innerHTML = '<strong>Monthly Rewards:</strong> Distributed on the 1st of every month to top 3 earners.';
                listTitle.innerHTML = '<i class="fas fa-list-ol"></i> Monthly Rankings';
                tierSel.classList.remove('show');
                if (topEarnersData.length) { 
                    renderLeaderboard(topEarnersData, 'earnings'); 
                    updateMyRankCard(topEarnersData, 'earnings'); 
                }
            } else if (currentView === 'referrals') {
                document.getElementById('prizeLabel').innerHTML = '<span><i class="fas fa-gift"></i> Weekly Prizes: 🥇3500 • 🥈2000 • 🥉1000 COINS</span>';
                rewardInfo.innerHTML = '<strong>Weekly Rewards:</strong> Distributed every Sunday to top 3 referrers.';
                listTitle.innerHTML = '<i class="fas fa-list-ol"></i> Weekly Referral Rankings';
                tierSel.classList.remove('show');
                if (topReferrersData.length) { 
                    renderLeaderboard(topReferrersData, 'referrals'); 
                    updateMyRankCard(topReferrersData, 'referrals'); 
                }
            } else {
                document.getElementById('prizeLabel').innerHTML = '<span><i class="fas fa-layer-group"></i> Tier Rankings</span>';
                rewardInfo.innerHTML = '<strong>Tier Rankings:</strong> See how you rank within your tier.';
                listTitle.innerHTML = '<i class="fas fa-list-ol"></i> Rankings by Tier';
                tierSel.classList.add('show');
                const data = topEarnersData.length ? topEarnersData : [];
                if (data.length) { 
                    renderLeaderboard(data, 'earnings'); 
                    updateMyRankCard(data, 'earnings'); 
                }
            }
        }

        async function loadTopEarners(showSkeleton = true) {
            if (showSkeleton) showLeaderboardSkeleton();
            try {
                const data = await apiCall('/api/leaderboard/top-earners');
                topEarnersData = data;
                if (currentView === 'earnings' || currentView === 'tier') refreshDisplay();
            } catch (err) {
                console.error('Top earners error:', err);
                document.getElementById('leaderboardList').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>Failed to load</p><button class="retry-btn" onclick="loadTopEarners()">Retry</button></div>`;
            }
        }

        async function loadTopReferrers(showSkeleton = true) {
            if (showSkeleton && currentView === 'referrals') showLeaderboardSkeleton();
            try {
                const data = await apiCall('/api/leaderboard/weekly-referrers');
                topReferrersData = data;
                if (currentView === 'referrals') refreshDisplay();
            } catch (err) {
                console.error('Top referrers error:', err);
                if (currentView === 'referrals') {
                    document.getElementById('leaderboardList').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>Failed to load</p><button class="retry-btn" onclick="loadTopReferrers()">Retry</button></div>`;
                }
            }
        }

        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.action-btn').forEach(b => { b.classList.remove('active'); if (b.dataset.view === view) b.classList.add('active'); });
            refreshDisplay();
            if (view === 'referrals' && !topReferrersData.length) loadTopReferrers();
        }

        function switchTier(tier) {
            currentTier = tier;
            document.querySelectorAll('.tier-option').forEach(o => { o.classList.remove('active'); if (o.dataset.tier === tier) o.classList.add('active'); });
            document.getElementById('selectedTierText').textContent = tier === 'all' ? 'All Tiers' : tier;
            document.getElementById('tierDropdown').classList.remove('show');
            if (currentView === 'tier') refreshDisplay();
        }

        // ============================================
        // PULL TO REFRESH
        ============================================
        function showRefreshIndicator(text, isError = false) {
            refreshIndicator.textContent = text;
            refreshIndicator.style.background = isError ? 'var(--danger)' : 'var(--primary)';
            refreshIndicator.classList.add('show');
            setTimeout(() => refreshIndicator.classList.remove('show'), 1500);
        }
        
        async function refreshData() {
            if (isRefreshing) return;
            isRefreshing = true;
            showRefreshIndicator('<i class="fas fa-spinner fa-spin"></i> Refreshing...');
            try {
                await loadTopEarners(false);
                await loadTopReferrers(false);
                showRefreshIndicator('<i class="fas fa-check-circle"></i> Updated!');
                showNotification('Leaderboard refreshed!', false);
            } catch (err) {
                showRefreshIndicator('<i class="fas fa-exclamation-circle"></i> Failed to refresh', true);
            } finally {
                isRefreshing = false;
            }
        }
        
        document.addEventListener('touchstart', (e) => {
            if (window.scrollY === 0) touchStartY = e.touches[0].clientY;
        });
        document.addEventListener('touchmove', (e) => {
            if (window.scrollY === 0 && !isRefreshing) {
                const diff = e.touches[0].clientY - touchStartY;
                if (diff > 60) { e.preventDefault(); refreshData(); }
            }
        });

        document.querySelectorAll('.action-btn').forEach(b => b.addEventListener('click', () => switchView(b.dataset.view)));
        document.getElementById('tierSelectBtn').addEventListener('click', e => { e.stopPropagation(); document.getElementById('tierDropdown').classList.toggle('show'); });
        document.querySelectorAll('.tier-option').forEach(o => o.addEventListener('click', e => { e.stopPropagation(); switchTier(o.dataset.tier); }));
        document.addEventListener('click', () => document.getElementById('tierDropdown').classList.remove('show'));

        document.addEventListener('DOMContentLoaded', () => {
            console.log('🏆 Leaderboard loading...');
            showLeaderboardSkeleton();
            showMyRankSkeleton();
            loadTopEarners(false);
            loadTopReferrers(false);
        });
    </script>
</body>
</html>

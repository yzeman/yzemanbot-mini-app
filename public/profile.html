<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Profile - YzemanBot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root {
            --primary: #4CAF50;
            --secondary: #2196F3;
            --warning: #FF9800;
            --danger: #f44336;
            --dark: #1a1a2e;
            --darker: #16213e;
            --light: #ffffff;
            --gray: #888888;
            --gold: #FFD700;
            --success: #00c853;
            --online: #4CAF50;
            --offline: #888888;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--dark) 0%, #0f0f1a 100%);
            color: var(--light);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            padding: 15px 15px 20px;
            border-radius: 0 0 30px 30px;
            text-align: center;
            position: relative;
            border-bottom: 1px solid rgba(255,215,0,0.2);
        }
        .header h1 {
            font-size: 22px;
            margin-bottom: 0;
            background: linear-gradient(135deg, var(--gold), #FFA000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .back-btn-header {
            position: absolute; top: 14px; left: 18px;
            color: white; font-size: 18px;
            text-decoration: none; z-index: 10;
            background: rgba(0,0,0,0.3);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .profile-card {
            background: rgba(22, 33, 62, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 16px;
            margin: 15px 15px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .profile-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 10px;
            color: white;
            overflow: hidden;
        }
        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .profile-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .profile-tier {
            display: inline-block;
            background: var(--gold);
            color: var(--dark);
            padding: 3px 12px;
            border-radius: 15px;
            font-size: 10px;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 0;
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: var(--gold);
        }
        .stat-label {
            font-size: 9px;
            color: var(--gray);
        }
        
        .private-card {
            background: rgba(22, 33, 62, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px 20px;
            margin: 15px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .private-icon {
            font-size: 48px;
            color: var(--gray);
            margin-bottom: 10px;
        }
        .private-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .private-text {
            font-size: 11px;
            color: var(--gray);
            margin-bottom: 15px;
        }
        
        .trust-section {
            background: rgba(22, 33, 62, 0.8);
            border-radius: 16px;
            padding: 12px;
            margin: 0 15px 15px;
            border-left: 3px solid var(--gold);
        }
        .trust-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .trust-score {
            font-size: 22px;
            font-weight: bold;
            color: var(--gold);
        }
        .trust-bar {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
            margin: 8px 0;
        }
        .trust-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--success), var(--gold));
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s;
        }
        .trust-warning {
            font-size: 10px;
            color: var(--warning);
            margin-top: 6px;
        }
        
        .tabs {
            display: flex;
            background: rgba(22, 33, 62, 0.8);
            padding: 4px;
            border-radius: 30px;
            margin: 0 15px 12px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 8px;
            border-radius: 25px;
            font-size: 11px;
            font-weight: 600;
            color: var(--gray);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .tab i { font-size: 12px; }
        .tab.active {
            background: linear-gradient(135deg, var(--primary), #2E7D32);
            color: white;
        }
        .tab-content {
            display: none;
            padding: 12px;
        }
        .tab-content.active {
            display: block;
        }
        
        .request-item, .friend-item {
            display: flex;
            align-items: center;
            padding: 10px;
            background: rgba(22, 33, 62, 0.6);
            border-radius: 14px;
            margin-bottom: 8px;
        }
        .request-avatar, .friend-avatar {
            position: relative;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin-right: 10px;
            font-weight: bold;
            flex-shrink: 0;
            cursor: pointer;
            overflow: hidden;
        }
        .request-avatar img, .friend-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .online-indicator {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid var(--darker);
            background-color: var(--offline);
        }
        .online-indicator.online {
            background-color: var(--online);
            box-shadow: 0 0 5px var(--online);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.6; transform: scale(0.9); }
        }
        
        .last-seen {
            font-size: 9px;
            color: var(--gray);
            margin-top: 2px;
        }
        .last-seen.online {
            color: var(--online);
        }
        
        .request-info, .friend-info {
            flex: 1;
            cursor: pointer;
        }
        .request-name, .friend-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 2px;
        }
        .request-tier {
            font-size: 9px;
            color: var(--gray);
        }
        .trust-badge {
            font-size: 9px;
            padding: 2px 5px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 3px;
        }
        .trust-badge.warning {
            background: rgba(244,67,54,0.2);
            color: var(--danger);
        }
        
        .last-message {
            font-size: 9px;
            color: var(--gray);
            margin-top: 2px;
            max-width: 150px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .request-actions, .friend-actions {
            display: flex;
            gap: 6px;
            position: relative;
        }
        .action-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .action-icon.accept { background: var(--success); color: white; }
        .action-icon.reject { background: var(--danger); color: white; }
        .action-icon.block { background: var(--warning); color: white; }
        .action-icon.chat { background: var(--secondary); color: white; }
        .action-icon:active { transform: scale(0.95); }
        
        .message-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            min-width: 16px;
            height: 16px;
            font-size: 9px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 3px;
            box-shadow: 0 0 3px rgba(0,0,0,0.3);
        }
        .message-badge.hidden {
            display: none;
        }
        
        .friend-btn {
            padding: 8px 20px;
            border-radius: 25px;
            border: none;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin: 0 4px;
        }
        .friend-btn.primary {
            background: linear-gradient(135deg, var(--primary), #2E7D32);
            color: white;
        }
        .friend-btn.danger {
            background: var(--danger);
            color: white;
        }
        .friend-btn.secondary {
            background: var(--gray);
            color: white;
        }
        
        .empty-state {
            text-align: center;
            padding: 25px;
            color: var(--gray);
            font-size: 12px;
        }
        
        .search-box {
            padding: 0 0 12px 0;
        }
        .search-input {
            width: 100%;
            padding: 10px 15px;
            border-radius: 25px;
            border: 1px solid var(--gray);
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 13px;
            outline: none;
        }
        .search-input:focus {
            border-color: var(--primary);
        }
        
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(22, 33, 62, 0.95);
            backdrop-filter: blur(10px);
            display: flex; padding: 8px 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }
        .nav-item {
            flex: 1; text-align: center; color: var(--gray);
            text-decoration: none; font-size: 10px; padding: 5px;
            border-radius: 8px;
        }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 2px; }
        .nav-item.active { color: var(--primary); background: rgba(76,175,80,0.12); }
        
        .notification {
            position: fixed; bottom: 80px; left: 15px; right: 15px;
            background: var(--success); color: white; padding: 10px 14px;
            border-radius: 10px; text-align: center; display: none; z-index: 1000;
            font-size: 11px;
        }
        .notification.error { background: var(--danger); }
        
        .loading { text-align: center; padding: 25px; color: var(--gray); font-size: 12px; }
        
        .tabs-wrapper.hidden {
            display: none;
        }
        
        .friend-action-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <a href="/" class="back-btn-header"><i class="fas fa-arrow-left"></i></a>
    
    <div class="header">
        <h1><i class="fas fa-user-circle"></i> <span id="headerTitle">Profile</span></h1>
    </div>
    
    <div id="profileContainer"></div>
    
    <div id="tabsWrapper" class="tabs-wrapper">
        <div class="tabs">
            <div class="tab active" data-tab="friends"><i class="fas fa-users"></i> Friends</div>
            <div class="tab" data-tab="requests"><i class="fas fa-user-plus"></i> Requests</div>
            <div class="tab" data-tab="search"><i class="fas fa-search"></i> Find</div>
        </div>
        
        <div class="tab-content active" id="friendsTab">
            <div id="friendsList"></div>
        </div>
        
        <div class="tab-content" id="requestsTab">
            <div id="requestsList"></div>
        </div>
        
        <div class="tab-content" id="searchTab">
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="Search by name...">
            </div>
            <div id="searchResults"></div>
        </div>
    </div>
    
    <div class="bottom-nav">
        <a href="/" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="/daily.html" class="nav-item"><i class="fas fa-calendar-check"></i><span>Daily</span></a>
        <a href="/wheel.html" class="nav-item"><i class="fas fa-dharmachakra"></i><span>Wheel</span></a>
        <a href="/leaderboard.html" class="nav-item"><i class="fas fa-trophy"></i><span>Ranks</span></a>
        <a href="/team.html" class="nav-item"><i class="fas fa-users"></i><span>Team</span></a>
    </div>
    
    <div class="notification" id="notification"></div>
    
    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }
        
        let currentUser = null;
        let viewedUserId = null;
        let isOwnProfile = true;
        let viewedUserProfile = null;
        let statusSocket = null;
        let onlineStatusMap = {};
        let currentFriends = [];
        
        const urlParams = new URLSearchParams(window.location.search);
        const targetUserId = urlParams.get('userId');
        
        function showNotification(msg, isError = false) {
            const notif = document.getElementById('notification');
            notif.textContent = msg;
            notif.className = 'notification' + (isError ? ' error' : '');
            notif.style.display = 'block';
            setTimeout(() => notif.style.display = 'none', 3000);
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function getInitials(name) {
            if (!name) return '👤';
            return name.charAt(0).toUpperCase();
        }
        
        function getFirstName(fullName) {
            if (!fullName) return 'User';
            return fullName.split(' ')[0];
        }
        
        function formatNumber(num) {
            if (num === undefined) return '0';
            const n = parseFloat(num);
            if (n >= 1000000) return (n / 1000000).toFixed(2) + 'M';
            if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
            return n.toFixed(0);
        }
        
        function formatLastSeen(lastSeen) {
            if (!lastSeen) return 'recently';
            const last = new Date(lastSeen);
            const now = new Date();
            const diff = Math.floor((now - last) / 1000 / 60);
            
            if (diff < 1) return 'just now';
            if (diff < 60) return `${diff} min ago`;
            if (diff < 1440) return `${Math.floor(diff / 60)} hours ago`;
            return `${Math.floor(diff / 1440)} days ago`;
        }
        
        function updateFriendOnlineStatus(friendId, isOnline) {
            const friendElement = document.querySelector(`.friend-item[data-user-id="${friendId}"]`);
            if (friendElement) {
                const indicator = friendElement.querySelector('.online-indicator');
                const lastSeenSpan = friendElement.querySelector('.last-seen');
                if (indicator) {
                    if (isOnline) {
                        indicator.classList.add('online');
                        if (lastSeenSpan) lastSeenSpan.textContent = 'Online now';
                        lastSeenSpan?.classList.add('online');
                    } else {
                        indicator.classList.remove('online');
                        if (lastSeenSpan) lastSeenSpan.textContent = 'Offline';
                        lastSeenSpan?.classList.remove('online');
                    }
                }
            }
        }
        
        function connectStatusWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const socketUrl = `${protocol}//${window.location.host}`;
            
            statusSocket = io(socketUrl, {
                auth: { initData: tg?.initData },
                transports: ['websocket']
            });
            
            statusSocket.on('connect', () => {
                console.log('Status WebSocket connected');
                statusSocket.emit('join-status', { userId: currentUser?.id });
            });
            
            statusSocket.on('friend-online', (data) => {
                console.log('Friend online:', data);
                onlineStatusMap[data.userId] = true;
                updateFriendOnlineStatus(data.userId, true);
                showNotification(`${getFirstName(data.firstName)} is now online!`, false);
            });
            
            statusSocket.on('friend-offline', (data) => {
                console.log('Friend offline:', data);
                onlineStatusMap[data.userId] = false;
                updateFriendOnlineStatus(data.userId, false);
            });
            
            statusSocket.on('disconnect', () => {
                console.log('Status WebSocket disconnected');
                setTimeout(connectStatusWebSocket, 3000);
            });
        }
        
        async function loadOnlineStatus() {
            try {
                const data = await apiCall('/api/friends/online-status');
                onlineStatusMap = data.online_status || {};
                
                document.querySelectorAll('.friend-item').forEach(item => {
                    const friendId = parseInt(item.dataset.userId);
                    if (onlineStatusMap[friendId]) {
                        const indicator = item.querySelector('.online-indicator');
                        const lastSeenSpan = item.querySelector('.last-seen');
                        if (indicator) indicator.classList.add('online');
                        if (lastSeenSpan) {
                            lastSeenSpan.textContent = 'Online now';
                            lastSeenSpan.classList.add('online');
                        }
                    }
                });
            } catch (err) {
                console.error('Failed to load online status:', err);
            }
        }
        
        async function apiCall(endpoint, data = null) {
            if (!tg?.initData) throw new Error('Not in Telegram');
            const options = { method: 'POST', headers: { 'Content-Type': 'application/json' } };
            options.body = JSON.stringify(data ? { ...data, initData: tg.initData } : { initData: tg.initData });
            const response = await fetch(endpoint, options);
            const text = await response.text();
            try {
                const json = JSON.parse(text);
                if (!response.ok) throw new Error(json.error || 'Request failed');
                return json;
            } catch (e) {
                if (e instanceof SyntaxError) throw new Error('Invalid server response');
                throw e;
            }
        }
        
        function getAvatarHtml(photoUrl, firstName, size = '44px') {
            if (photoUrl && photoUrl.startsWith('http')) {
                return `<img src="${photoUrl}" alt="${escapeHtml(firstName)}" style="width:100%;height:100%;object-fit:cover;">`;
            }
            return escapeHtml(getInitials(firstName));
        }
        
        async function loadProfile() {
            try {
                const user = await apiCall('/api/user');
                currentUser = user;
                
                apiCall('/api/user/last-seen').catch(() => {});
                
                if (targetUserId && parseInt(targetUserId) !== currentUser.id) {
                    isOwnProfile = false;
                    viewedUserId = parseInt(targetUserId);
                    document.getElementById('headerTitle').textContent = 'User Profile';
                    
                    const relationship = await apiCall('/api/friends/relationship', { friendId: viewedUserId });
                    
                    if (relationship.is_friend) {
                        viewedUserProfile = await apiCall('/api/user/profile', { userId: viewedUserId });
                        renderOtherUserProfile(viewedUserProfile, relationship);
                        document.getElementById('tabsWrapper').classList.add('hidden');
                    } else {
                        renderPrivateProfile(relationship);
                        document.getElementById('tabsWrapper').classList.add('hidden');
                    }
                } else {
                    isOwnProfile = true;
                    document.getElementById('headerTitle').textContent = 'My Profile';
                    renderOwnProfile(user);
                    document.getElementById('tabsWrapper').classList.remove('hidden');
                    loadFriends();
                    loadRequests();
                    setupTabs();
                    setupSearch();
                    
                    connectStatusWebSocket();
                    
                    setInterval(() => {
                        apiCall('/api/user/last-seen').catch(() => {});
                    }, 60000);
                }
            } catch (err) {
                console.error('Profile error:', err);
                showNotification('Failed to load profile', true);
            }
        }
        
        function renderOwnProfile(user) {
            const container = document.getElementById('profileContainer');
            const avatarHtml = getAvatarHtml(user.photo_url, user.first_name || user.username || 'U', '70px');
            const tier = user.tier || 'Fresher';
            const trustScore = calculateTrustScore(user);
            const trustPercent = Math.min((trustScore / 100) * 100, 100);
            const friendsCount = user.total_friends || 0;
            
            container.innerHTML = `
                <div class="profile-card">
                    <div class="profile-avatar">${avatarHtml}</div>
                    <div class="profile-name">${escapeHtml(user.first_name || user.username || 'User')}</div>
                    <div class="profile-tier">${escapeHtml(tier)} Tier</div>
                    <div class="profile-stats">
                        <div class="stat">
                            <div class="stat-value">${formatNumber(user.coins)}</div>
                            <div class="stat-label">COINS</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value">${user.referrals || 0}</div>
                            <div class="stat-label">Referrals</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value">${friendsCount}</div>
                            <div class="stat-label">Friends</div>
                        </div>
                    </div>
                </div>
                <div class="trust-section">
                    <div class="trust-header">
                        <i class="fas fa-shield-alt" style="color: var(--gold);"></i>
                        <strong>Trust Score</strong>
                        <span class="trust-score">${trustScore}</span>
                    </div>
                    <div class="trust-bar">
                        <div class="trust-fill" style="width: ${trustPercent}%;"></div>
                    </div>
                    ${trustScore < 30 ? '<div class="trust-warning"><i class="fas fa-exclamation-triangle"></i> Low trust score. Be respectful to improve!</div>' : ''}
                    ${trustScore >= 70 ? '<div class="trust-warning" style="color:var(--success);"><i class="fas fa-check-circle"></i> High trust score! Great community member!</div>' : ''}
                </div>
            `;
        }
        
        function renderOtherUserProfile(user, relationship) {
            const container = document.getElementById('profileContainer');
            const avatarHtml = getAvatarHtml(user.photo_url, user.first_name || user.username || 'U', '70px');
            const tier = user.tier || 'Fresher';
            const trustScore = calculateTrustScore(user);
            const trustPercent = Math.min((trustScore / 100) * 100, 100);
            
            container.innerHTML = `
                <div class="profile-card">
                    <div class="profile-avatar">${avatarHtml}</div>
                    <div class="profile-name">${escapeHtml(user.first_name || user.username || 'User')}</div>
                    <div class="profile-tier">${escapeHtml(tier)} Tier</div>
                    <div class="profile-stats">
                        <div class="stat">
                            <div class="stat-value">${formatNumber(user.coins)}</div>
                            <div class="stat-label">COINS</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value">${user.referrals || 0}</div>
                            <div class="stat-label">Referrals</div>
                        </div>
                    </div>
                </div>
                <div class="trust-section">
                    <div class="trust-header">
                        <i class="fas fa-shield-alt" style="color: var(--gold);"></i>
                        <strong>Trust Score</strong>
                        <span class="trust-score">${trustScore}</span>
                    </div>
                    <div class="trust-bar">
                        <div class="trust-fill" style="width: ${trustPercent}%;"></div>
                    </div>
                    ${trustScore < 30 ? '<div class="trust-warning"><i class="fas fa-exclamation-triangle"></i> Low trust score. Be respectful to improve!</div>' : ''}
                    ${trustScore >= 70 ? '<div class="trust-warning" style="color:var(--success);"><i class="fas fa-check-circle"></i> High trust score! Great community member!</div>' : ''}
                </div>
                <div class="friend-action-buttons">
                    <button class="friend-btn primary" onclick="startChat(${user.id}, '${escapeHtml(getFirstName(user.first_name || 'User'))}')">
                        <i class="fas fa-comment"></i> Message
                    </button>
                    <button class="friend-btn danger" onclick="blockUser(${user.id})">
                        <i class="fas fa-ban"></i> Block
                    </button>
                </div>
            `;
        }
        
        function renderPrivateProfile(relationship) {
            const container = document.getElementById('profileContainer');
            let actionButton = '';
            
            if (relationship.status === 'pending_sent') {
                actionButton = '<button class="friend-btn secondary" disabled><i class="fas fa-clock"></i> Request Pending</button>';
            } else if (relationship.status === 'pending_received') {
                actionButton = `
                    <button class="friend-btn primary" onclick="acceptRequest(${viewedUserId})"><i class="fas fa-check"></i> Accept</button>
                    <button class="friend-btn danger" onclick="rejectRequest(${viewedUserId})"><i class="fas fa-times"></i> Decline</button>
                `;
            } else if (relationship.status === 'blocked') {
                actionButton = '<button class="friend-btn secondary" disabled><i class="fas fa-ban"></i> Blocked</button>';
            } else {
                actionButton = '<button class="friend-btn primary" onclick="sendFriendRequest(' + viewedUserId + ')"><i class="fas fa-user-plus"></i> Add Friend</button>';
            }
            
            container.innerHTML = `
                <div class="private-card">
                    <div class="private-icon"><i class="fas fa-lock"></i></div>
                    <div class="private-title">Profile Private</div>
                    <div class="private-text">This profile is only visible to friends. Send a friend request to view their profile.</div>
                    <div class="friend-action-buttons">
                        ${actionButton}
                        <button class="friend-btn danger" onclick="blockUser(${viewedUserId})"><i class="fas fa-ban"></i> Block</button>
                    </div>
                </div>
            `;
        }
        
        function calculateTrustScore(user) {
            let score = 50;
            
            if (user.referrals >= 50) score += 20;
            else if (user.referrals >= 20) score += 10;
            else if (user.referrals >= 5) score += 5;
            
            if (user.total_coins_earned >= 10000) score += 15;
            else if (user.total_coins_earned >= 5000) score += 8;
            
            if (user.tier === 'Platinum') score += 20;
            else if (user.tier === 'Gold') score += 15;
            else if (user.tier === 'Silver') score += 10;
            else if (user.tier === 'Brute') score += 5;
            
            const blocksReceived = user.total_blocks_received || 0;
            score -= blocksReceived * 5;
            
            return Math.max(0, Math.min(100, score));
        }
        
        // Format time for display
        function formatMessageTime(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);
            
            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return `${diffMins}m ago`;
            if (diffHours < 24) return `${diffHours}h ago`;
            return `${diffDays}d ago`;
        }
        
        async function loadFriends() {
            const container = document.getElementById('friendsList');
            container.innerHTML = '<div class="loading">Loading friends...</div>';
            
            try {
                const [friendsData, unreadData, lastMessages] = await Promise.all([
                    apiCall('/api/friends/list'),
                    apiCall('/api/private/messages/unread-by-friend').catch(() => ({ unread_counts: {} })),
                    apiCall('/api/private/messages/last-messages').catch(() => ({}))
                ]);
                currentFriends = friendsData.friends || [];
                
                // Sort friends by last message time (newest first)
                const friendsWithLastMessage = currentFriends.map(friend => ({
                    ...friend,
                    lastMessageTime: lastMessages[friend.id]?.last_message_time || null,
                    lastMessageText: lastMessages[friend.id]?.last_message || '',
                    lastMessageDirection: lastMessages[friend.id]?.direction || ''
                }));
                
                // Sort: online first, then by last message time
                friendsWithLastMessage.sort((a, b) => {
                    // Online status first
                    const aOnline = onlineStatusMap[a.id] || false;
                    const bOnline = onlineStatusMap[b.id] || false;
                    if (aOnline !== bOnline) return bOnline - aOnline;
                    
                    // Then by last message time (newest first)
                    const aTime = a.lastMessageTime ? new Date(a.lastMessageTime).getTime() : 0;
                    const bTime = b.lastMessageTime ? new Date(b.lastMessageTime).getTime() : 0;
                    return bTime - aTime;
                });
                
                renderFriends(friendsWithLastMessage, unreadData.unread_counts || {});
                await loadOnlineStatus();
            } catch (err) {
                console.error('Load friends error:', err);
                container.innerHTML = '<div class="empty-state">Failed to load friends</div>';
            }
        }
        
        function renderFriends(friends, unreadCounts) {
            const container = document.getElementById('friendsList');
            if (!friends || friends.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-users"></i><p>No friends yet. Add some friends!</p></div>';
                return;
            }
            
            container.innerHTML = friends.map(friend => {
                const avatarHtml = getAvatarHtml(friend.photo_url, friend.first_name || friend.username || 'U');
                const firstName = getFirstName(friend.first_name || 'User');
                const unreadCount = unreadCounts[friend.id] || 0;
                const badgeHtml = unreadCount > 0 ? `<span class="message-badge">${unreadCount > 9 ? '9+' : unreadCount}</span>` : '';
                const isOnline = onlineStatusMap[friend.id] || false;
                const onlineClass = isOnline ? 'online' : '';
                const lastSeenText = isOnline ? 'Online now' : (friend.last_seen ? `Last seen ${formatLastSeen(friend.last_seen)}` : 'Offline');
                
                // Show last message preview
                let lastMessageHtml = '';
                if (friend.lastMessageText) {
                    const directionIcon = friend.lastMessageDirection === 'sent' ? '📤 ' : '📥 ';
                    const messagePreview = friend.lastMessageText.length > 25 ? friend.lastMessageText.substring(0, 22) + '...' : friend.lastMessageText;
                    lastMessageHtml = `<div class="last-message">${directionIcon} ${escapeHtml(messagePreview)}</div>`;
                }
                
                return `
                    <div class="friend-item" data-user-id="${friend.id}" onclick="viewUserProfile(${friend.id})">
                        <div class="friend-avatar">
                            ${avatarHtml}
                            <div class="online-indicator ${onlineClass}"></div>
                        </div>
                        <div class="friend-info">
                            <div class="friend-name">${escapeHtml(firstName)}</div>
                            <div class="request-tier">${friend.tier || 'Fresher'} Tier</div>
                            <div class="last-seen ${onlineClass}">${lastSeenText}</div>
                            ${lastMessageHtml}
                        </div>
                        <div class="friend-actions" onclick="event.stopPropagation()">
                            <div class="action-icon chat" onclick="startChat(${friend.id}, '${escapeHtml(firstName)}')">
                                <i class="fas fa-comment"></i>
                                ${badgeHtml}
                            </div>
                            <div class="action-icon block" onclick="blockUser(${friend.id})">
                                <i class="fas fa-ban"></i>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        async function loadRequests() {
            const container = document.getElementById('requestsList');
            container.innerHTML = '<div class="loading">Loading requests...</div>';
            
            try {
                const data = await apiCall('/api/friends/requests');
                // Sort requests by created_at (newest first)
                const sortedRequests = (data.requests || []).sort((a, b) => {
                    return new Date(b.created_at) - new Date(a.created_at);
                });
                renderRequests(sortedRequests);
            } catch (err) {
                container.innerHTML = '<div class="empty-state">Failed to load requests</div>';
            }
        }
        
        function renderRequests(requests) {
            const container = document.getElementById('requestsList');
            if (!requests || requests.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-user-plus"></i><p>No pending friend requests</p></div>';
                return;
            }
            
            container.innerHTML = requests.map(req => {
                const avatarHtml = getAvatarHtml(req.photo_url, req.first_name || req.username || 'U');
                const firstName = getFirstName(req.first_name || 'User');
                const blocksReceived = req.total_blocks_received || 0;
                const blockWarning = blocksReceived >= 5 ? '<div class="trust-badge warning"><i class="fas fa-ban"></i> Blocked by ' + blocksReceived + ' users</div>' : '';
                const requestTime = formatMessageTime(req.created_at);
                
                return `
                    <div class="request-item">
                        <div class="request-avatar" onclick="viewUserProfile(${req.id})">${avatarHtml}</div>
                        <div class="request-info" onclick="viewUserProfile(${req.id})">
                            <div class="request-name">${escapeHtml(firstName)}</div>
                            <div class="request-tier">${req.tier || 'Fresher'} Tier</div>
                            <div class="last-message" style="color:var(--gold);">Requested ${requestTime}</div>
                            ${blockWarning}
                        </div>
                        <div class="request-actions">
                            <div class="action-icon accept" onclick="event.stopPropagation(); acceptRequest(${req.id})">
                                <i class="fas fa-check"></i>
                            </div>
                            <div class="action-icon reject" onclick="event.stopPropagation(); rejectRequest(${req.id})">
                                <i class="fas fa-times"></i>
                            </div>
                            <div class="action-icon block" onclick="event.stopPropagation(); blockUser(${req.id})">
                                <i class="fas fa-ban"></i>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        async function loadSearch(query) {
            const container = document.getElementById('searchResults');
            if (!query || query.length < 2) {
                container.innerHTML = '<div class="empty-state">Type at least 2 characters to search</div>';
                return;
            }
            
            container.innerHTML = '<div class="loading">Searching...</div>';
            
            try {
                const data = await apiCall('/api/users/search', { query });
                renderSearchResults(data.users);
            } catch (err) {
                container.innerHTML = '<div class="empty-state">Search failed</div>';
            }
        }
        
        function renderSearchResults(users) {
            const container = document.getElementById('searchResults');
            if (!users || users.length === 0) {
                container.innerHTML = '<div class="empty-state">No users found</div>';
                return;
            }
            
            container.innerHTML = users.map(user => {
                const avatarHtml = getAvatarHtml(user.photo_url, user.first_name || user.username || 'U');
                const firstName = getFirstName(user.first_name || 'User');
                const relationship = user.relationship || 'none';
                let actionButton = '';
                
                if (relationship === 'friends') {
                    actionButton = '<div class="action-icon chat" onclick="startChat(' + user.id + ', \'' + escapeHtml(firstName) + '\')"><i class="fas fa-comment"></i></div>';
                } else if (relationship === 'pending_sent') {
                    actionButton = '<div class="action-icon" style="background:var(--gray);"><i class="fas fa-clock"></i></div>';
                } else if (relationship === 'pending_received') {
                    actionButton = '<div class="action-icon accept" onclick="acceptRequest(' + user.id + ')"><i class="fas fa-check"></i></div><div class="action-icon reject" onclick="rejectRequest(' + user.id + ')"><i class="fas fa-times"></i></div>';
                } else if (relationship === 'blocked') {
                    actionButton = '<div class="action-icon" style="background:var(--danger);"><i class="fas fa-ban"></i></div>';
                } else {
                    actionButton = '<div class="action-icon accept" onclick="sendFriendRequest(' + user.id + ')"><i class="fas fa-user-plus"></i></div>';
                }
                
                return `
                    <div class="request-item">
                        <div class="request-avatar" onclick="viewUserProfile(${user.id})">${avatarHtml}</div>
                        <div class="request-info" onclick="viewUserProfile(${user.id})">
                            <div class="request-name">${escapeHtml(firstName)}</div>
                            <div class="request-tier">${user.tier || 'Fresher'} Tier</div>
                        </div>
                        <div class="request-actions" onclick="event.stopPropagation()">
                            ${actionButton}
                            <div class="action-icon block" onclick="blockUser(${user.id})"><i class="fas fa-ban"></i></div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function viewUserProfile(userId) {
            window.location.href = `/profile.html?userId=${userId}`;
        }
        
        async function sendFriendRequest(userId) {
            try {
                const result = await apiCall('/api/friends/request', { friendId: userId });
                showNotification(result.message || 'Friend request sent!');
                if (!isOwnProfile) {
                    window.location.reload();
                } else {
                    loadSearch(document.getElementById('searchInput')?.value || '');
                }
            } catch (err) {
                showNotification(err.message, true);
            }
        }
        
        async function acceptRequest(userId) {
            try {
                const result = await apiCall('/api/friends/accept', { friendId: userId });
                showNotification(result.message || 'Friend request accepted!');
                loadRequests();
                loadFriends();
                const user = await apiCall('/api/user');
                renderOwnProfile(user);
            } catch (err) {
                showNotification(err.message, true);
            }
        }
        
        async function rejectRequest(userId) {
            try {
                const result = await apiCall('/api/friends/reject', { friendId: userId });
                showNotification(result.message || 'Friend request rejected');
                loadRequests();
            } catch (err) {
                showNotification(err.message, true);
            }
        }
        
        async function blockUser(userId) {
            if (!confirm('Block this user? They will not be able to send you friend requests or messages.')) return;
            try {
                const result = await apiCall('/api/friends/block', { friendId: userId });
                showNotification(result.message || 'User blocked');
                if (!isOwnProfile) {
                    window.location.href = '/';
                } else {
                    loadFriends();
                    loadRequests();
                    loadSearch(document.getElementById('searchInput')?.value || '');
                    const user = await apiCall('/api/user');
                    renderOwnProfile(user);
                }
            } catch (err) {
                showNotification(err.message, true);
            }
        }
        
        function startChat(userId, userName) {
            window.location.href = `/private-chat.html?userId=${userId}&userName=${encodeURIComponent(userName)}`;
        }
        
        function setupTabs() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    const tabName = tab.dataset.tab;
                    document.getElementById(tabName + 'Tab').classList.add('active');
                    
                    if (tabName === 'friends') loadFriends();
                    if (tabName === 'requests') loadRequests();
                });
            });
        }
        
        function setupSearch() {
            let searchTimeout;
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    clearTimeout(searchTimeout);
                    searchTimeout = setTimeout(() => {
                        loadSearch(e.target.value);
                    }, 500);
                });
            }
        }
        
        document.addEventListener('DOMContentLoaded', async () => {
            await loadProfile();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Wheel of Fortune - YzemanBot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6a11cb;
            --secondary: #2575fc;
            --success: #00c853;
            --warning: #ffab00;
            --dark: #1a1b25;
            --darker: #12131a;
            --gray: #6c757d;
            --card-bg: #252836;
            --card-border: #2d3343;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: linear-gradient(135deg, var(--darker), var(--dark)); color: var(--light); min-height: 100vh; padding: 20px; padding-bottom: 80px; }
        .container { max-width: 500px; margin: 0 auto; text-align: center; }
        .header h1 { font-size: 28px; background: linear-gradient(to right, #ff9a9e, #fad0c4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .wheel-container { margin: 30px 0; position: relative; }
        canvas { max-width: 100%; height: auto; background: var(--card-bg); border-radius: 50%; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .spin-btn { background: linear-gradient(45deg, #FF9800, #FF5722); color: white; border: none; border-radius: 50px; padding: 18px 40px; font-size: 20px; font-weight: bold; cursor: pointer; margin: 20px 0; transition: transform 0.2s; }
        .spin-btn:active { transform: scale(0.95); }
        .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .info-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; padding: 20px; margin-top: 20px; }
        .timer { font-size: 32px; font-weight: bold; color: var(--warning); margin: 10px 0; }
        .last-reward { color: var(--success); font-size: 18px; margin-top: 10px; }
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; background: var(--card-bg); border-top: 1px solid var(--card-border);
            display: flex; justify-content: space-around; padding: 12px 16px; z-index: 100;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--gray); text-decoration: none; font-size: 10px; padding: 8px 12px; border-radius: 12px; }
        .nav-item i { font-size: 20px; }
        .nav-item.active { color: var(--secondary); background: rgba(37, 117, 252, 0.1); }
        .loading { text-align: center; padding: 40px; color: var(--gray); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-circle-notch"></i> Wheel of Fortune</h1>
            <p style="color: var(--gray);">Spin every 3 days to win up to 10,000 points!</p>
        </div>

        <div class="wheel-container">
            <canvas id="wheelCanvas" width="400" height="400"></canvas>
        </div>

        <button class="spin-btn" id="spinBtn">🎡 SPIN THE WHEEL 🎡</button>

        <div class="info-card" id="infoCard">
            <div id="statusText">Loading...</div>
            <div class="timer" id="timerText"></div>
            <div class="last-reward" id="lastRewardText"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="leaderboard.html" class="nav-item"><i class="fas fa-trophy"></i><span>Leaderboard</span></a>
        <a href="achievements.html" class="nav-item"><i class="fas fa-medal"></i><span>Achievements</span></a>
        <a href="tournament.html" class="nav-item"><i class="fas fa-fist-raised"></i><span>Tournament</span></a>
        <a href="team.html" class="nav-item"><i class="fas fa-users"></i><span>Teams</span></a>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.expand(); tg.ready(); }

        const SEGMENTS = [
            { label: "100", value: 100, color: "#FF6B6B" },
            { label: "250", value: 250, color: "#4ECDC4" },
            { label: "500", value: 500, color: "#45B7D1" },
            { label: "1000", value: 1000, color: "#96CEB4" },
            { label: "2500", value: 2500, color: "#FFEAA7" },
            { label: "5000", value: 5000, color: "#DDA0DD" },
            { label: "7500", value: 7500, color: "#98D8C8" },
            { label: "10000", value: 10000, color: "#F7B05E" }
        ];

        let canvas = document.getElementById('wheelCanvas');
        let ctx = canvas.getContext('2d');
        let spinning = false;
        let currentAngle = 0;
        let animationFrame = null;

        function drawWheel() {
            const size = canvas.width;
            const center = size / 2;
            const radius = size / 2 - 10;
            const anglePerSegment = (Math.PI * 2) / SEGMENTS.length;
            
            for (let i = 0; i < SEGMENTS.length; i++) {
                const startAngle = currentAngle + i * anglePerSegment;
                const endAngle = startAngle + anglePerSegment;
                
                ctx.beginPath();
                ctx.fillStyle = SEGMENTS[i].color;
                ctx.moveTo(center, center);
                ctx.arc(center, center, radius, startAngle, endAngle);
                ctx.fill();
                
                ctx.save();
                ctx.translate(center, center);
                ctx.rotate(startAngle + anglePerSegment / 2);
                ctx.fillStyle = "#1a1a2e";
                ctx.font = "bold 16px 'Segoe UI'";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(SEGMENTS[i].label, radius * 0.65, 0);
                ctx.restore();
            }
            
            ctx.beginPath();
            ctx.fillStyle = "#FFD700";
            ctx.arc(center, center, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#1a1a2e";
            ctx.font = "bold 20px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("🎡", center, center);
        }

        function spinWheel() {
            if (spinning) return;
            
            const spinAngle = Math.random() * (Math.PI * 2 * 5) + (Math.PI * 2 * 3);
            const startTime = performance.now();
            const duration = 3000;
            
            spinning = true;
            document.getElementById('spinBtn').disabled = true;
            
            function animateSpin(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(1, elapsed / duration);
                const easeOut = 1 - Math.pow(1 - progress, 3);
                const angle = spinAngle * easeOut;
                currentAngle = (currentAngle + angle) % (Math.PI * 2);
                drawWheel();
                
                if (progress < 1) {
                    animationFrame = requestAnimationFrame(animateSpin);
                } else {
                    animationFrame = null;
                    const finalAngle = currentAngle % (Math.PI * 2);
                    const segmentIndex = Math.floor(((Math.PI * 2) - finalAngle) / ((Math.PI * 2) / SEGMENTS.length)) % SEGMENTS.length;
                    const prize = SEGMENTS[segmentIndex].value;
                    spinning = false;
                    submitSpin(prize);
                }
            }
            
            if (animationFrame) cancelAnimationFrame(animationFrame);
            animationFrame = requestAnimationFrame(animateSpin);
        }

        async function submitSpin(prize) {
            try {
                const response = await fetch('/api/wheel-spin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ initData: tg.initData })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error);
                }
                
                const result = await response.json();
                showNotification(result.message);
                loadStatus();
            } catch (err) {
                showNotification(err.message, true);
                drawWheel();
                document.getElementById('spinBtn').disabled = false;
            }
        }

        async function loadStatus() {
            try {
                const response = await fetch('/api/wheel-status', {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                
                const statusDiv = document.getElementById('statusText');
                const timerDiv = document.getElementById('timerText');
                const lastRewardDiv = document.getElementById('lastRewardText');
                
                if (data.can_spin) {
                    statusDiv.innerHTML = '<span style="color: var(--success);">✅ Ready to spin!</span>';
                    timerDiv.innerHTML = '';
                    document.getElementById('spinBtn').disabled = false;
                } else {
                    statusDiv.innerHTML = '<span style="color: var(--warning);">⏳ Next spin available in:</span>';
                    timerDiv.innerHTML = `${data.days_left} day${data.days_left !== 1 ? 's' : ''}`;
                    document.getElementById('spinBtn').disabled = true;
                }
                
                if (data.last_reward > 0) {
                    lastRewardDiv.innerHTML = `Last spin: ${data.last_reward.toLocaleString()} points!`;
                } else {
                    lastRewardDiv.innerHTML = 'No spins yet!';
                }
            } catch (err) {
                console.error(err);
            }
        }

        function showNotification(msg, isError = false) {
            const notif = document.createElement('div');
            notif.textContent = msg;
            notif.style.cssText = `position:fixed;top:20px;left:50%;transform:translateX(-50%);background:${isError ? '#ff5252' : '#00c853'};color:white;padding:12px 24px;border-radius:12px;z-index:1001;font-size:14px;`;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        document.getElementById('spinBtn').addEventListener('click', spinWheel);
        
        drawWheel();
        loadStatus();
    </script>
</body>
</html>

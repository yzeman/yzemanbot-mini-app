<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wheel of Fortune - YzemanBot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #4CAF50;
            --dark: #1a1a2e;
            --darker: #16213e;
            --light: #ffffff;
            --gray: #888888;
            --gold: #FFD700;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--dark);
            color: var(--light);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 80px;
        }
        
        .header {
            background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 100%);
            padding: 20px;
            border-radius: 30px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .debug-box {
            background: #000;
            color: #0f0;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 12px;
            margin: 20px 0;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            text-decoration: none;
            z-index: 10;
        }
        
        .notification {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: var(--primary);
            color: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    
    <div class="header">
        <h1><i class="fas fa-dharmachakra"></i> Wheel Debug</h1>
        <p>Testing connection to backend</p>
    </div>
    
    <div class="debug-box" id="debugLog">
        Ready to test...
    </div>
    
    <button class="btn" id="testConnectionBtn">🔌 Test Connection</button>
    <button class="btn" id="testStatusBtn">📊 Test Wheel Status</button>
    <button class="btn" id="testSpinBtn">🎡 Test Spin</button>
    
    <div class="notification" id="notification"></div>
    
    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }
        
        const debugEl = document.getElementById('debugLog');
        
        function log(message) {
            console.log(message);
            debugEl.textContent += '\n' + (typeof message === 'object' ? JSON.stringify(message, null, 2) : message);
            debugEl.scrollTop = debugEl.scrollHeight;
        }
        
        function showNotification(msg, isError = false) {
            const notif = document.getElementById('notification');
            notif.textContent = msg;
            notif.style.background = isError ? '#f44336' : '#4CAF50';
            notif.style.display = 'block';
            setTimeout(() => notif.style.display = 'none', 4000);
        }
        
        // Clear log
        log('=== WHEEL DEBUG STARTED ===');
        log('Time: ' + new Date().toLocaleString());
        log('Telegram WebApp: ' + (tg ? '✅ Available' : '❌ Not available'));
        
        if (tg) {
            log('User ID: ' + (tg.initDataUnsafe?.user?.id || 'Not available'));
            log('InitData: ' + (tg.initData ? '✅ Present' : '❌ Missing'));
        }
        
        // Test connection
        document.getElementById('testConnectionBtn').addEventListener('click', async () => {
            log('\n--- Testing Connection ---');
            
            try {
                const response = await fetch('/health');
                const data = await response.json();
                log('✅ Health check: ' + JSON.stringify(data));
                showNotification('Backend is online!');
            } catch (err) {
                log('❌ Health check failed: ' + err.message);
                showNotification('Backend offline', true);
            }
        });
        
        // Test wheel status
        document.getElementById('testStatusBtn').addEventListener('click', async () => {
            log('\n--- Testing Wheel Status ---');
            
            if (!tg?.initData) {
                log('❌ No Telegram initData');
                showNotification('Open from Telegram', true);
                return;
            }
            
            try {
                log('Sending request to /api/wheel-status...');
                log('InitData length: ' + tg.initData.length);
                
                const response = await fetch('/api/wheel-status', {
                    method: 'GET',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-Telegram-Init-Data': tg.initData
                    },
                    body: JSON.stringify({ initData: tg.initData })
                });
                
                log('Response status: ' + response.status);
                
                const text = await response.text();
                log('Raw response: ' + text);
                
                try {
                    const data = JSON.parse(text);
                    log('✅ Parsed data: ' + JSON.stringify(data, null, 2));
                    showNotification('Status loaded!');
                } catch (e) {
                    log('❌ Failed to parse JSON: ' + e.message);
                    showNotification('Invalid response', true);
                }
                
            } catch (err) {
                log('❌ Request failed: ' + err.message);
                showNotification('Request failed', true);
            }
        });
        
        // Test spin
        document.getElementById('testSpinBtn').addEventListener('click', async () => {
            log('\n--- Testing Spin ---');
            
            if (!tg?.initData) {
                log('❌ No Telegram initData');
                showNotification('Open from Telegram', true);
                return;
            }
            
            try {
                log('Sending spin request...');
                
                const response = await fetch('/api/wheel-spin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ initData: tg.initData })
                });
                
                log('Response status: ' + response.status);
                
                const text = await response.text();
                log('Raw response: ' + text);
                
                try {
                    const data = JSON.parse(text);
                    log('✅ Spin result: ' + JSON.stringify(data, null, 2));
                    showNotification('Spin successful!');
                } catch (e) {
                    log('❌ Failed to parse JSON: ' + e.message);
                    showNotification('Invalid response', true);
                }
                
            } catch (err) {
                log('❌ Request failed: ' + err.message);
                showNotification('Request failed', true);
            }
        });
        
        log('\n✅ Debug page ready. Click buttons to test.');
    </script>
</body>
</html>
